<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f4f5f7;--surface:rgba(255,255,255,0.85);--text:#1a1a2e;--text-sub:#666;--accent:#6c5ce7;--accent2:#00cec9;--accent-soft:rgba(108,92,231,0.1);--border:rgba(0,0,0,0.08);--radius:16px;--radius-sm:10px;--shadow:0 4px 24px rgba(0,0,0,0.06);--glass:rgba(255,255,255,0.6);--transition:0.3s cubic-bezier(0.4,0,0.2,1)}

.scroll-progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));z-index:999;transition:width 0.1s linear;width:0}

.hero-particle{position:absolute;border-radius:50%;background:var(--accent);opacity:0;pointer-events:none;animation:particleRise var(--dur,3s) ease-in infinite;animation-delay:var(--delay,0s);width:var(--sz,6px);height:var(--sz,6px)}
@keyframes particleRise{0%{transform:translateY(0) scale(0);opacity:0}10%{opacity:0.4}90%{opacity:0.2}100%{transform:translateY(-180px) scale(1);opacity:0}}

.icon-badge.ann{background:rgba(231,76,60,0.12)}.icon-badge.qa{background:rgba(108,92,231,0.12)}.icon-badge.ins{background:rgba(0,206,201,0.12)}.icon-badge.link{background:rgba(9,132,227,0.12)}.icon-badge.tl{background:rgba(253,203,110,0.12)}.icon-badge.gloss{background:rgba(162,155,254,0.12)}.icon-badge.stat{background:rgba(108,92,231,0.12)}.icon-badge.faq{background:rgba(255,118,117,0.12)}.icon-badge.zoom{background:rgba(0,130,250,0.12)}.icon-badge.ans{background:rgba(108,92,231,0.12)}.icon-badge.sol{background:rgba(0,206,201,0.12)}.icon-badge.summary{background:rgba(108,92,231,0.12)}
.ann-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:10px;backdrop-filter:blur(10px)}

.ann-content{font-size:0.9em;line-height:1.6;color:var(--text)}.ann-meta{font-size:0.75em;color:var(--text-sub);margin-top:6px}

.timeline{position:relative;padding-left:30px}.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--accent)}
.tl-item{position:relative;margin-bottom:16px}.tl-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);position:absolute;left:-26px;top:4px;transition:transform 0.3s,box-shadow 0.3s}

.tl-time{font-size:0.78em;font-weight:700;color:var(--accent);margin-bottom:2px}.tl-content{font-size:0.88em;line-height:1.5;color:var(--text-sub)}.tl-tag{display:inline-block;font-size:0.68em;font-weight:600;padding:1px 6px;border-radius:6px;margin-left:6px;background:var(--accent-soft);color:var(--accent)}

.qa-preview-text{flex:1;color:var(--text);font-weight:500}.qa-count{background:var(--accent);color:white;border-radius:20px;padding:2px 10px;font-size:0.8em;font-weight:700;white-space:nowrap}
.qa-goto-faq{display:block;width:100%;padding:12px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent);border-radius:var(--radius-sm);font-weight:700;font-size:0.9em;cursor:pointer;text-align:center;transition:var(--transition)}.qa-goto-faq:hover{background:var(--accent);color:#fff}

.faq-filter-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:var(--surface);color:var(--text);font-size:0.82em;font-weight:600;cursor:pointer;transition:var(--transition)}.faq-filter-btn:hover{border-color:var(--accent);color:var(--accent)}.faq-filter-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.faq-chart{margin-top:16px;margin-bottom:24px}
.faq-bar-item{display:flex;align-items:center;gap:10px;margin-bottom:10px;position:relative}.faq-bar-label{font-size:0.85em;font-weight:600;min-width:120px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.faq-bar-track{flex:1;height:10px;background:var(--border);border-radius:10px;overflow:visible;position:relative}.faq-bar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width 1s cubic-bezier(0.16,1,0.3,1)}.faq-bar-count{font-size:0.8em;font-weight:700;color:var(--accent);min-width:28px}
.faq-tooltip{position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.75);color:#fff;font-size:0.75em;font-weight:700;padding:3px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:10}.faq-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:rgba(0,0,0,0.75)}.faq-bar-item:hover .faq-tooltip{opacity:1}
.faq-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px;cursor:pointer;transition:var(--transition);backdrop-filter:blur(10px);overflow:hidden}.faq-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.faq-card-header{display:flex;align-items:flex-start;gap:10px}.faq-q-icon{width:28px;height:28px;background:var(--accent);color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.85em;flex-shrink:0}.faq-question{flex:1;font-weight:700;font-size:0.95em;color:var(--text);line-height:1.4}.faq-meta-wrap{display:flex;gap:6px;align-items:center;flex-shrink:0}.faq-category-badge{font-size:0.68em;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--accent-soft);color:var(--accent);white-space:nowrap}.faq-count-badge{background:var(--accent);color:#fff;border-radius:20px;padding:2px 10px;font-size:0.78em;font-weight:700;white-space:nowrap}

.faq-answer-label,.faq-solution-label{display:flex;align-items:center;gap:6px;font-weight:700;font-size:0.85em;color:var(--text);margin-bottom:8px}.faq-answered-by{font-size:0.75em;font-weight:600;padding:2px 8px;border-radius:8px;background:rgba(108,92,231,0.1);color:var(--accent)}

.zoom-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;backdrop-filter:blur(10px);position:relative}.zoom-card.past{opacity:0.45}.zoom-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}.zoom-date{font-size:0.8em;color:var(--text-sub);font-weight:600}.zoom-title{font-size:1em;font-weight:700}.zoom-desc{font-size:0.88em;color:var(--text-sub);line-height:1.5;margin-bottom:12px}.zoom-info-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:0.82em}.zoom-info-item{background:var(--accent-soft);color:var(--accent);border-radius:8px;padding:4px 10px;font-weight:600}.zoom-past-stamp{position:absolute;top:16px;right:16px;background:rgba(150,150,150,0.15);color:#999;font-size:0.72em;font-weight:800;letter-spacing:1px;padding:3px 10px;border-radius:8px;border:1px solid rgba(150,150,150,0.2)}
.fade-in{opacity:0;transform:translateY(20px);transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1),transform 0.6s cubic-bezier(0.16,1,0.3,1)}.fade-in.visible{opacity:1;transform:translateY(0)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#fff;padding:10px 20px;border-radius:var(--radius-sm);font-size:0.85em;font-weight:600;opacity:0;transition:opacity 0.3s,transform 0.3s;z-index:300;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti-particle{position:fixed;pointer-events:none;z-index:9999;font-size:1.4em;animation:confettiFall var(--dur,0.8s) ease-out forwards}
@keyframes confettiFall{0%{transform:translate(0,0) rotate(0deg);opacity:1}100%{transform:translate(var(--tx,60px),var(--ty,-120px)) rotate(var(--rot,360deg));opacity:0}}

.footer{text-align:center;padding:32px 16px;font-size:0.78em;color:var(--text-sub);border-top:1px solid var(--border);margin-top:32px}

천. 사양 고민은 오토위키 공지의 최소/권장 사양을 클로드에 붙여넣고 구매 조건 질문하면 됨.","answeredBy":"강사","tags":["노트북","모니터","포터블모니터","장비세팅"]},{"id":"qa-3","question":"캡컷 유료 버전이 필요한가요? 브루(Vrew)는 필요한가요?","frequency":2,"answer":"캡컷 무료 버전으로도 사용 가능. 브루(Vrew)는 이번 강의 필수 도구 목록에 없음—기존 연결제 이용 중이라면 해지 고려 가능.","answeredBy":"조교","tags":["캡컷","브루","Vrew","도구","유료여부"]},{"id":"qa-4","question":"줌(Zoom) 강의 참여 시 결제가 필요한가요?","frequency":1,"answer":"줌은 무료. 강의 전 공지방에 링크가 올라오면 해당 링크로 입장하면 됨.","answeredBy":"조교","tags":["줌","강의참여","무료"]},{"id":"qa-5","question":"유튜브 채널을 미리 만들어 두어야 하나요? 기존 구글 계정에 만들어야 하나요?","frequency":2,"answer":"강의 전에 채널 1개 만들어 두면 좋음. 기존 유튜브 프리미엄 계정과 분리해 새 구글 계정으로 개설 권장. 목표 채널 수만큼 계정 생성은 이후 단계별로 진행. 카페의 유스타터 강의 선행 권장.","answeredBy":"강사","tags":["유튜브채널","구글계정","채널개설"]},{"id":"qa-6","question":"클로드 프로 한도(사용량 초과)는 어떻게 관리하나요? Opus vs Sonnet 어떻게 써야 하나요?","frequency":4,"answer":"연습·개발 단계에서는 Sonnet 사용 권장(비용 절감). Opus는 품질이 높지만 5시간 한도 소진이 빠름. 529 에러는 서버 장애, 사용량 초과와 구분 필요. 맥스 요금제는 한도가 더 넓음. 다른 AI(Gemini 등)로 초벌 작업 후 클로드에서 중요 작업에 집중하는 혼용 전략 유효.","answeredBy":"조교","tags":["클로드","사용량","Opus","Sonnet","요금제"]},{"id":"qa-7","question":"클로드 코드로 크롬 확장 프로그램을 만들 수 있나요?","frequency":1,"answer":"클로드 코드로 크롬 확장 프로그램 제작 가능.","answeredBy":"조교","tags":["클로드코드","크롬확장","바이브코딩"]},{"id":"qa-8","question":"세컨드 브레인 노션은 별도 구매가 필요한가요?","frequency":1,"answer":"노션은 별도 구매 불필요. 강의에서는 노션과 로컬 파일 시스템을 병행 활용할 예정. 기존 노션 계정이 있으면 그대로 사용 가능.","answeredBy":"강사","tags":["노션","세컨드브레인","도구"]}],"insights":[{"id":"ins-1","content":"클로드와 마이크로 음성 대화 활용: 타이핑 없이 마이크로 지시하면 직원 쓰듯 효율적으로 작업 가능. 카페 공지 사양 텍스트를 그대로 붙여넣고 '이 조건에 맞는 데스크탑 추천해줘'라고 물으면 전문가 수준 답변 즉시 확인 가능.","author":"박@미(마리맘) / 개발남 노씨(오토워커)","category":"도구추천"},{"id":"ins-2","content":"컴퓨터 신규 구매보다 포터블 모니터 우선 추천: 기존 노트북 사양이 문제 없다면 27인치 외부 모니터 1대 추가(~10만 원 초반)로 듀얼 화면 구성 시 작업 효율 체감 상승. 태블릿 구형 모델도 무선 듀얼 모니터로 활용 가능.","author":"디하클 스태프 둘리 / 김@윤(엄마치킨이먹고싶어요)","category":"도구추천"},{"id":"ins-3","content":"클로드 사용량 절약 전략: 연습 시 Sonnet 모델로 시작, 실제 제작·완성 단계에서만 Opus 투입. Gemini 등 타 AI로 초벌 작업 후 클로드에 최종 작업 집중하면 한도 소진을 최소화할 수 있음.","author":"조교 나물쓰 / 김@윤(엄마치킨이먹고싶어요)","category":"전략"},{"id":"ins-4","content":"카톡방 벽타기 대신 오토위키 활용: 강사가 카톡방 대화 내용을 오토위키에 주기적으로 정리 업로드. 수백 건 대화 소급 확인 없이 위키에서 핵심 정보 즉시 검색 가능.","author":"개발남 노씨(오토워커)","category":"전략"},{"id":"ins-5","content":"카톡방 내용 정리 자동화: 카카오톡 '대화 내보내기'로 텍스트 파일 추출 후 Gemini 또는 클로드에 업로드하면 수백 건 대화도 즉시 요약 정리 가능. 벽타기 스트레스 해소에 직결.","author":"이@린(보부상)","category":"도구추천"},{"id":"ins-6","content":"네이버 카페 가입은 반드시 채널톡 초대 링크 경유: 공지방 링크로 직접 접속 시 '멤버 아님' 오류 발생. 채널톡에서 발송된 초대장 링크(naver.me/xsZACT0D)로 가입 신청 후 운영진 순차 승인 대기 필요.","author":"디하클 스태프 둘리","category":"문제해결"}],"links":[{"id":"link-1","url":"https://wiki.autoworkers.ai/","title":"오토워커 1기 공식 위키 - 공지사항·컴퓨터 사양 안내·카톡방 정리","category":"reference","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-2","url":"https://cafe.naver.com/aut","title":"오토워커 1기 네이버 카페","category":"reference","sharedBy":"공지 자동게시","status":"active"},{"id":"link-3","url":"https://naver.me/xsZACT0D","title":"오토워커 1기 네이버 카페 초대장 링크","category":"reference","sharedBy":"디하클 스태프 둘리","status":"active"},{"id":"link-4","url":"https://youtu.be/g1uVZMIvy1M?si=ejyUy4ZBGdd0D0og","title":"포터블 모니터 추천 유튜브 영상","category":"tutorial","sharedBy":"이@헌(충사마)","status":"active"},{"id":"link-5","url":"https://m.danawa.com/product/product.html?code=58845818&cateCode=112756","title":"다나와 데스크탑 후보 1 (최@영(달씨) 검토)","category":"reference","sharedBy":"최@영(달씨)","status":"active"},{"id":"link-6","url":"https://m.danawa.com/product/product.html?code=108355517&cateCode=11236094","title":"다나와 데스크탑 후보 2 (최@영(달씨) 검토)","category":"reference","sharedBy":"최@영(달씨)","status":"active"},{"id":"link-7","url":"https://m.danawa.com/product/product.html?code=79084673&cateCode=11236094","title":"다나와 데스크탑 후보 3 (최@영(달씨) 검토)","category":"reference","sharedBy":"최@영(달씨)","status":"active"},{"id":"link-8","url":"https://cafe.naver.com/f-e/cafes/31687042/menus/12?viewType=L","title":"오토워커 카페 Q&A 질문 게시판","category":"reference","sharedBy":"공지 자동게시","status":"active"}],"timeline":[{"time":"오후 2:32~3:10","summary":"개강 첫날 입장 러시. 렌더링 방식(로컬 처리)·캡컷 동시 내보내기 불가 안내, RAM 최소 8GB 권장 사양 논의 시작. 클로드 마이크 음성 대화 팁 공유(마리맘). 포터블 모니터 첫 언급 및 추천.","topicTag":"학습"},{"time":"오후 3:40~4:30","summary":"오토위키(wiki.autoworkers.ai) 오픈 공지 및 컴퓨터 사양 페이지 안내. 강의 커리큘럼 확인 요청·1주차 스토리형/2주차 정보형 에이전트 구분 정리. 조교 나물쓰 부방장 취임. AI 서버 비용 결제 방식 및 캡컷 유무료 문의 집중.","topicTag":"공지"},{"time":"오후 4:50~6:45","summary":"신규 수강생 대거 입장 및 환영 인사. 초고사양 PC(RTX 5090, RAM 128GB, 57인치 모니터) 인증으로 분위기 고조. 노트북 구매 상담 및 다나와 링크 검토. 네이버 카페 가입 오류(초대장 링크 필요) 반복 해결. 수냉·공랭 쿨링 주제로 자유 토크.","topicTag":"일상"},{"time":"오후 7:00~8:10","summary":"카톡 벽타기 고충 토로 및 오토위키 대안 재안내. 세컨드 브레인 노션 활용 여부 질문·강사 답변(별도 구매 불필요). PPT 자료 수령 방법 문의. 카톡 내용 AI로 정리하는 팁(대화 내보내기→Gemini/Claude) 공유.","topicTag":"질문"},{"time":"오후 9:10~10:00","summary":"강의 난이도 우려 및 격려 분위기. 클로드 코드 바이브코딩 기대감 표출. 채널 탐색기 엔터키 기능 개선 요청→강사 3주차 때 반영 약속. 유튜브 채널 개설 및 계정 분리 전략 안내. 클로드 프로 Opus 사용량 초과 문제 본격 등장.","topicTag":"학습"},{"time":"오후 10:00~11:09","summary":"클로드 서버 529 에러(일시 서버 장애) 신고 다수. Opus vs Sonnet vs 맥스 요금제 비교 논의. 안티그래비티 울트라 요금제 전환 고민. WQHD 와이드 모니터 업무 효율 팁 공유. 스킬 사용 시 컨텍스트 소진 빠른 현상 확인. 클로드 스킬 활용 후기로 마감.","topicTag":"질문"}],"glossary":[{"id":"term-1","term":"캡컷","definition":"영상 렌더링에 사용되는 편집 프로그램. 채팅에서는 로컬에서 렌더링을 수행하는 도구로 언급되며, 동시 내보내기는 불가하고 순차 처리만 가능. 무료 버전으로도 사용 가능하다고 안내됨.","category":"tool","aliases":["CapCut"]},{"id":"term-2","term":"오토위키","definition":"강사가 카톡방 대화 내용과 공지사항(컴퓨터 사양 안내 등)을 정리하여 게시하는 위키 사이트(wiki.autoworkers.ai). 벽타기 대신 핵심 정보를 검색할 수 있는 대안으로 제시됨.","category":"tool","aliases":["오토 위키"]},{"id":"term-3","term":"벽타기","definition":"카카오톡 채팅방에서 밀린 수백 건의 대화를 위로 스크롤하며 소급 확인하는 행위. 채팅방에서 고충으로 자주 언급되며, 오토위키나 AI 요약이 대안으로 제시됨.","category":"community","aliases":[]},{"id":"term-4","term":"클로드 코드","definition":"Anthropic의 Claude AI를 활용한 코딩 도구. 채팅에서는 크롬 확장 프로그램 제작이 가능한 바이브코딩 도구로 언급됨. 3주차 강의에서 채널 탐색기를 만드는 과정에 사용 예정.","category":"tool","aliases":["클코","Claude Code"]},{"id":"term-5","term":"바이브코딩","definition":"채팅에서 클로드 코드를 활용하여 코딩하는 방식으로 언급됨. 유튜브 자동화와 함께 강의에서 다룰 핵심 주제 중 하나.","category":"concept","aliases":["바이브 코딩"]},{"id":"term-6","term":"Opus","definition":"클로드의 최상위 AI 모델. 품질이 높지만 5시간 한도 소진이 빠르며, 로직까지 상세히 그려주는 장점이 있음. 실제 제작·완성 단계에서 사용 권장.","category":"concept","aliases":["오푸스"]},{"id":"term-7","term":"Sonnet","definition":"클로드의 중간 등급 AI 모델. Opus 대비 사용량 소진이 적어 연습·개발 단계에서 권장됨. 다만 수정이 안 된 부분이 발견되는 등 품질 차이가 있다고 언급됨.","category":"concept","aliases":["소넷","쏘넷"]},{"id":"term-8","term":"스킬","definition":"클로드에서 특정 작업을 자동화하기 위해 만드는 기능 단위. 채팅에서는 Opus로 스킬을 만들면 컨텍스트 소진이 빠르다는 경험이 공유됨.","category":"concept","aliases":[]},{"id":"term-9","term":"세컨드 브레인","definition":"노션 등을 활용하여 정보를 체계적으로 정리·저장하는 시스템. 강의에서는 노션과 로컬 파일 시스템을 병행 활용할 예정이며, 별도 구매는 불필요하다고 안내됨.","category":"concept","aliases":["세컨드브레인"]},{"id":"term-10","term":"안티그래비티","definition":"클로드 AI를 사용할 수 있는 서드파티 플랫폼. 울트라 요금제(월 18만 원)로 Opus를 여유 있게 사용 가능하며, 아이디를 돌려가며 쓸 수 있다고 언급됨. 입뮨, 울트라 등 요금제 구분이 존재.","category":"tool","aliases":["안티"]},{"id":"term-11","term":"채널 탐색기","definition":"유튜브 채널을 탐색·분석하는 도구. 3주차 강의에서 직접 만드는 과정을 다룰 예정. 엔터키로 탐색 시작이 되도록 기능 개선 요청이 있었음.","category":"tool","aliases":[]},{"id":"term-12","term":"브루","definition":"영상 편집 도구. 이번 오토워커 강의 필수 도구 목록에는 포함되지 않는다고 안내되어, 기존 연결제 이용자는 해지 고려 가능.","category":"tool","aliases":["Vrew"]},{"id":"term-13","term":"휴먼터치","definition":"자동화 과정에서 사람이 직접 개입하여 자유도를 높이는 것. 렌더링을 로컬 캡컷에서 수행하는 이유 중 하나로 강사가 언급함.","category":"concept","aliases":[]},{"id":"term-14","term":"유스타터","definition":"네이버 카페에 게시된 유튜브 시작 가이드 강의. 강사가 유튜브 채널 개설 전에 선행 학습으로 권장함.","category":"community","aliases":[]}]},"2026-03-19":{"meta":{"date":"2026-03-19","dayOfWeek":"목요일","totalMessages":296,"totalAnswered":28,"activeHours":"오전 12:15~오후 11:04","mvpContributors":[{"nickname":"개발남 노씨(오토워커)","role":"강사","contributionCount":32},{"nickname":"조교 나물쓰","role":"조교","contributionCount":8},{"nickname":"디하클 스태프 둘리","role":"조교","contributionCount":6},{"nickname":"한@철(힉스)","role":"일반","contributionCount":18},{"nickname":"박@영(퍼펙트)","role":"일반","contributionCount":6},{"nickname":"임@진(후파)","role":"일반","contributionCount":7}]},"announcements":[{"id":"ann-1","content":"프리미엄반 카톡방은 프반 전용 피드백·과제 공지 및 질문용이며, 일반 사담/질문은 사담방에서 진행 요망","author":"개발남 노씨(오토워커)","time":"오전 9:12","priority":"high"},{"id":"ann-2","content":"정규강의 1강은 오후 7시 Zoom 진행. 줌 링크: https://us06web.zoom.us/j/84893604275?pwd=O05KB949s4G7FkOcDCO2GI4NSZKhFX.1 / 회의ID: 848 9360 4275 / 암호: 629075","author":"크리스(디하클스태프)","time":"오후 6:54","priority":"high"},{"id":"ann-3","content":"오늘 강의 전 대부분의 사전 질문은 7시 강의에서 일괄 답변 예정. 질문을 미리 준비해 달라","author":"개발남 노씨(오토워커)","time":"오후 3:48","priority":"high"},{"id":"ann-4","content":"강의 녹화본은 다음날 점심 12시에 카페 업로드","author":"개발남 노씨(오토워커)","time":"오전 9:59","priority":"medium"},{"id":"ann-5","content":"강의 자료(노션): https://hypnotic-concrete-dcf.notion.site/328c8b66674081b7a416f5f49154a721","author":"개발남 노씨(오토워커)","time":"오후 6:32","priority":"medium"},{"id":"ann-6","content":"닉네임 형식 미준수 수강생은 등급 미처리. 공지 닉네임 양식에 맞게 수정 필요","author":"조교 나물쓰","time":"오후 8:04","priority":"medium"}],"topQA":[{"id":"qa-1","question":"이용 기간(3개월)은 크레딧 이월 없이 만 3개월로 계산되는가?","frequency":2,"answer":"모든 것은 합리적으로 처리되며, 만 3개월 기준으로 적용된다","answeredBy":"강사","tags":["이용기간","크레딧","구독"]},{"id":"qa-2","question":"강의 못 들었을 때 녹화본은 언제 업로드되나?","frequency":3,"answer":"다음날 점심 12시에 카페에 업로드된다","answeredBy":"강사","tags":["녹화본","다시보기","강의"]},{"id":"qa-3","question":"클로드(Claude) 구독은 연결제 vs 월결제 어느 것이 좋은가?","frequency":3,"answer":"AI 판은 변화가 빠르므로 연결제는 지양하고 월 20달러 월결제를 권장한다","answeredBy":"강사","tags":["클로드","구독","결제"]},{"id":"qa-4","question":"VS Code를 한국어로 전환하는 방법은?","frequency":2,"answer":"Ctrl+Shift+P → 'Configure Display Language' 입력 → 한국어 선택 → Restart 적용","answeredBy":"경험자","tags":["VSCode","한국어","설치설정"]},{"id":"qa-5","question":"수업 전에 Claude 외에 미리 결제하거나 준비할 것이 있는가?","frequency":4,"answer":"일단 Claude만 결제하면 충분하며, API 발급 등 나머지는 강의 시간에 안내한다","answeredBy":"강사","tags":["사전준비","클로드","API"]},{"id":"qa-6","question":"클로드(끌루)에서 URL·영상·파일 분석이 가능한가?","frequency":2,"answer":"영상 분석은 Gemini API 연동 시 가능하며, 클로드는 파이썬 코드로 대부분 처리 가능하다. 세팅 방법은 수업에서 설명 예정","answeredBy":"강사","tags":["클로드","영상분석","파이썬","Gemini"]},{"id":"qa-7","question":"플레이리스트(플리) 자동화가 가능한가?","frequency":2,"answer":"현재는 불가능하며 완전히 다른 방식이 필요하다. 추후 별도 검토 예정","answeredBy":"강사","tags":["플레이리스트","자동화","유튜브"]},{"id":"qa-8","question":"강의 수강 장비는 어떻게 구성하면 좋은가? (노트북 2대 또는 노트북+데스크탑)","frequency":2,"answer":"실제 작업할 메인 기기로 실습하고, 다른 기기로 강의를 시청하는 방식을 권장한다","answeredBy":"강사","tags":["수강환경","노트북","데스크탑","실습"]},{"id":"qa-9","question":"그록(Grok)이 유료화되었나?","frequency":2,"answer":"그록이 유료화되었으며 현재 3일 무료 후 월 30달러 플랜으로 전환된다","answeredBy":"조교","tags":["그록","Grok","유료화","AI도구"]},{"id":"qa-10","question":"VS Code 대신 Cursor AI 또는 다른 편집기를 써도 되는가?","frequency":1,"answer":"좋은 질문이며 본강의에서 상세히 답변 예정","answeredBy":"강사","tags":["VSCode","Cursor","편집기","도구선택"]}],"insights":[{"id":"ins-1","content":"AI 구독은 연결제를 피하고 월결제로 유지하라. AI 업계의 판도가 단기간에 바뀌므로 장기 약정은 손해로 이어질 수 있다","author":"개발남 노씨(오토워커)","category":"수익화"},{"id":"ins-2","content":"카카오톡 '대화 내보내기' 기능으로 txt를 추출한 뒤 AI에 입력하면 채팅방 내용을 자동 정리할 수 있다","author":"개발남 노씨(오토워커)","category":"도구추천"},{"id":"ins-3","content":"영상 대본과 이미지를 함께 AI에 입력하면 영상 분석 정확도가 높아진다. 클로드로 영상 20장 이미지 추출 → 대본과 병합하는 방식이 실용적","author":"이@인(스톤)","category":"도구추천"},{"id":"ins-4","content":"20분 영상 기준 약 100씬의 이미지 컷이 생성된다. 대본 스크립트만 넣으면 프로그램이 자동으로 컷을 나눠준다","author":"개발남 노씨(오토워커)","category":"수익화"},{"id":"ins-5","content":"모르는 것은 클로드에게 직접 질문하는 습관을 들여라. VS Code 한국어 설정, 노트북 사양 적합성 등 기술적 문제는 AI가 즉시 해결해준다","author":"개발남 노씨(오토워커)","category":"전략"},{"id":"ins-6","content":"일레븐랩스(ElevenLabs)는 타입캐스트보다 자연스러운 음성을 제공한다. 쇼츠는 타입캐스트 강세, 롱폼은 일레븐랩스 병행 전략이 효과적","author":"김@호(17)","category":"도구추천"},{"id":"ins-7","content":"커리큘럼 외 SUNO AI·플레이리스트 등 옵션에 분산되지 말고 본 커리큘럼에 집중하는 것이 초기 성과를 높인다","author":"최@원(리마인드)","category":"전략"},{"id":"ins-8","content":"야담 채널은 허위 콘텐츠 정책 위반으로 대규모 삭제 조치를 받고 있다. 수익화 카테고리 선정 시 저작권·콘텐츠 정책을 반드시 고려해야 한다","author":"김@은(다람)","category":"문제해결"}],"links":[{"id":"link-1","url":"https://wiki.autoworkers.ai/","title":"오토워커 위키 (강의 전 준비사항 체크리스트 포함)","category":"reference","sharedBy":"임@진(후파) [오토봇]","status":"active"},{"id":"link-2","url":"https://hypnotic-concrete-dcf.notion.site/328c8b66674081b7a416f5f49154a721","title":"오토워커 1기 강의 자료 노션 페이지","category":"tutorial","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-3","url":"https://us06web.zoom.us/j/84893604275?pwd=O05KB949s4G7FkOcDCO2GI4NSZKhFX.1","title":"오토워커 1기 정규강의 1강 Zoom 링크 (ID: 848 9360 4275 / 암호: 629075)","category":"zoom","sharedBy":"크리스(디하클스태프)","status":"expired"}],"timeline":[{"time":"오전 12:15~오전 9:00","summary":"자정 이후 심야 채팅: 이용 기간 계산(만 3개월) 확인, 강사 강의 준비 중 실시간 응답. 초보 수강생 클로드 활용 첫 성공 후기 공유","topicTag":"질문"},{"time":"오전 9:00~오전 11:00","summary":"강의 전 환경 세팅 집중 논의: VS Code 한국어 설정, 클로드의 URL·영상 분석 가능 여부, 실습 장비 구성(노트북·데스크탑), 플레이리스트 자동화 불가 확인","topicTag":"학습"},{"time":"오전 11:00~오후 2:00","summary":"Zoom 수강 방식 문의 집중: 퇴근 후 입장 가능 여부, 핸드폰으로 라디오 청취 팁 공유. 오토봇 명령어 체계 소개 및 사용법 안내","topicTag":"공지"},{"time":"오후 2:00~오후 5:00","summary":"그록(Grok) 유료화 이슈 화두. 클로드 결제 방식(월결제 권장), API 사전 발급 불필요 확인. 유튜브 채널 고급 인증 필요성(롱폼 15분 초과 업로드 조건) 안내","topicTag":"학습"},{"time":"오후 5:00~오후 7:00","summary":"강의 직전 마지막 준비: Zoom 링크 공유(6:54), 노션 자료 링크 재공유, 클로드 로그인 오류 해결, 닉네임 미준수 수강생 개별 안내. 수강생들의 기대감 고조","topicTag":"공지"},{"time":"오후 7:00~오후 11:04","summary":"정규강의 1강 Zoom 진행. 강의 중 채팅 최소화. 자정 직전 늦게 입장한 수강생에게 노션 자료 링크 재안내로 마무리","topicTag":"이벤트"}],"glossary":[{"id":"term-1","term":"오토봇","definition":"카카오톡 채팅방에서 정해진 키워드(오토위키, 로그, 롱타임, 닉네임양식 등)에 자동으로 응답하는 봇. 후파님이 제작하였으며, '/질문' 등의 명령어로 학습된 명령어 목록을 확인할 수 있음.","category":"tool","aliases":[]},{"id":"term-2","term":"그록","definition":"AI 도구. 채팅에서 유료화 소식이 화제가 되었으며, 3일 무료 이후 월 30달러 과금으로 전환된다고 언급됨.","category":"tool","aliases":["Grok"]},{"id":"term-3","term":"일레븐랩스","definition":"AI 음성 합성 서비스. 채팅에서 타입캐스트보다 훨씬 자연스러운 음성을 제공한다고 평가됨. 롱폼 영상 제작 시 활용 추천.","category":"tool","aliases":["ElevenLabs","일레븐"]},{"id":"term-4","term":"타입캐스트","definition":"AI 음성 합성 서비스. 채팅에서 쇼츠에서는 강세이지만 일레븐랩스와 비교하여 자연스러움이 떨어진다고 언급됨.","category":"tool","aliases":[]},{"id":"term-5","term":"VS Code","definition":"코드 편집기. 오토워커 강의에서 기본 개발 도구로 사용됨. 한국어 전환(Ctrl+Shift+P → Configure Display Language)이 가능하며, Add to PATH는 기본 설치 시 디폴트 체크되어 있음.","category":"tool","aliases":["VSCode","비에스코드"]},{"id":"term-6","term":"끌루","definition":"클로드(Claude)를 채팅방에서 부르는 애칭. 파이썬 코드를 장착하여 다양한 작업이 가능하다고 강사가 설명함.","category":"community","aliases":["클로드","Claude"]},{"id":"term-7","term":"SUNO AI","definition":"AI 음악 생성 도구. 채팅에서 플레이리스트 병렬 운영과 수익 극대화 전략의 일부로 언급되었으나, 본 커리큘럼에는 포함되지 않음.","category":"tool","aliases":["수노"]},{"id":"term-8","term":"플리","definition":"플레이리스트의 줄임말. 음악 관련 유튜브 콘텐츠 형식. 현재 강사의 자동화 프로그램으로는 불가능하며, 완전히 다른 방식이 필요하다고 답변됨.","category":"concept","aliases":["플레이리스트"]},{"id":"term-9","term":"야담채널","definition":"유튜브에서 야담(이야기) 콘텐츠를 다루는 채널 유형. 허위 콘텐츠 정책 위반으로 대규모 삭제 조치를 받고 있다고 채팅에서 경고됨.","category":"concept","aliases":["야담"]},{"id":"term-10","term":"고급 인증","definition":"유튜브 채널의 고급 기능 활성화를 위한 인증 단계. 전화번호 인증을 완료해야 15분 초과 롱폼 업로드, 커스텀 썸네일, 실시간 스트리밍이 가능하다고 설명됨.","category":"concept","aliases":["고급 기능","표준 기능 + 전화번호 인증"]},{"id":"term-11","term":"커서 AI","definition":"VS Code 대안으로 언급된 코드 편집기. 일부 수강생이 선호한다고 언급되었으나, 강사는 VS Code를 기본으로 사용하는 이유를 본강의에서 설명하겠다고 답변함.","category":"tool","aliases":["Cursor AI","커서"]}]},"2026-03-20":{"meta":{"date":"2026-03-20","dayOfWeek":"금요일","totalMessages":710,"totalAnswered":47,"activeHours":"오전 2:12~오후 11:59","mvpContributors":[{"nickname":"개발남 노씨(오토워커)","role":"강사","contributionCount":28},{"nickname":"조교 나물쓰","role":"조교","contributionCount":55},{"nickname":"디하클 스태프 둘리","role":"조교","contributionCount":18},{"nickname":"[조교] 대국밥","role":"조교","contributionCount":2},{"nickname":"구@기(쇼츠코인)","role":"일반","contributionCount":22}]},"announcements":[{"id":"ann-1","content":"전날 라이브 오류 사후 공지: (1) 대본 특수문자 문제 수정 완료, (2) 크롬 확장프로그램 오설치로 인한 그록 오류 수정 완료. 내일(3/21) 오후 7시부터 복습 완료자 순으로 사이트(영상제작 툴) 순차 배부 예정. 클로드 서버 일시 과부하가 사이트 속도에 영향을 미친 것으로, 월 1~2회 발생 수준.","author":"개발남 노씨(오토워커)","time":"오전 3:58","priority":"high"},{"id":"ann-2","content":"3/20 주요 공지사항 노션 페이지 공개. 수업 미수강자도 흐름 파악 가능. URL: https://hypnotic-concrete-dcf.notion.site/3-20-329c8b66674080649962f5b1c1edaa0c","author":"개발남 노씨(오토워커)","time":"오후 12:10","priority":"high"},{"id":"ann-3","content":"수업 관련 노션 및 자료 통합 위키 공개: https://wiki.autoworkers.ai/ — 이후 모든 자료는 이곳에서 확인.","author":"개발남 노씨(오토워커)","time":"오후 5:18","priority":"high"},{"id":"ann-4","content":"튜브워커(오토워커 영상제작 프로그램) 배포 시작. 카페(https://cafe.naver.com/autoworker1/17)에서 다운로드 후 압축해제, Claude Code로 폴더 선택 후 '유튜브 영상 만들어줘 [카테고리] 10분영상으로 [유튜브링크]' 형식으로 사용. 세부 설명 VOD 추가 예정.","author":"개발남 노씨(오토워커)","time":"오후 7:21","priority":"high"},{"id":"ann-5","content":"과제 제출자에게 튜브워커 이메일 발송 시작. 과제 내용: 스킬로 만든 대본 카페 과제제출 게시판에 업로드. 과제 미제출자는 대기. 세부 제출 방식 추가 공지 예정.","author":"개발남 노씨(오토워커)","time":"오후 11:05","priority":"high"},{"id":"ann-6","content":"이번 주 토요일(초보~중수), 일요일(고수) 추가 수업 진행 예정. 다시보기 제공.","author":"주원(마케터 제이J)","time":"오전 3:49","priority":"medium"}],"topQA":[{"id":"qa-1","question":"클로드 프로 vs 맥스 — 어떤 플랜을 써야 하나요? 스킬 제작·대본 생성 시 프로로 충분한가요?","frequency":12,"answer":"프로는 Opus 사용 시 5시간 롤링 한도·1주일 한도로 스킬 1~2개 만들면 금방 소진됩니다. 맥스 x5가 중소기업 수준 사용량에 적합하며, x20은 동시 4개 이상 작업 시 해당합니다. 낮은 플랜으로 시작 후 사용량 파악 뒤 차액만 내고 업그레이드 권장. 업그레이드 시 잔여 기간 차액만 결제됩니다.","answeredBy":"강사","tags":["클로드플랜","맥스","토큰사용량","비용"]},{"id":"qa-2","question":"튜브워커(오토워커 프로그램) 신청·수령 방법은?","frequency":8,"answer":"스킬로 만든 대본을 카페 과제제출 게시판에 업로드하면, 과제 확인 후 이메일로 프로그램 접속 정보 발송. 과제 제출 전 신청 불가. 세부 VOD 별도 제공 예정.","answeredBy":"강사","tags":["튜브워커","과제","배포"]},{"id":"qa-3","question":"스킬 제작 및 대본 생성은 Claude Code에서 해야 하나요, 일반 Claude.ai에서 해도 되나요?","frequency":5,"answer":"기획·스킬 파일 작성·대본 생성 전 과정을 일반 Claude.ai(claude.ai)에서 진행하고, 완성된 스킬 파일을 다운로드해 Claude Code에 설치만 하는 방식이 토큰 효율이 높습니다. Claude Code에서 Opus로 직접 작업하면 내부 추론 사이클이 8회 이상 돌아 사용량이 3~5배 빨리 소진됩니다.","answeredBy":"경험자","tags":["클로드코드","토큰최적화","스킬제작"]},{"id":"qa-4","question":"그록(Grok)이 유료화되었는데 튜브워커 사용에 유료 결제가 필수인가요?","frequency":4,"answer":"현재 강사 측에서 더 나은 우회 방법을 검토 중이므로 당장 그록 유료 결제를 하지 말고 추가 공지를 기다리세요. 강의 시간에 소개된 것은 오토그록(Grok 사이트 없이 생성하는 우회 전략)이며, 본인 계정이 필요합니다.","answeredBy":"조교","tags":["그록","유료화","우회"]},{"id":"qa-5","question":"클로드 토큰 5시간 한도 — 다 쓰고 기다려야 하나요, 아니면 빨리 쓰는 게 나은가요?","frequency":4,"answer":"5시간 롤링 한도 외에 1주일 한도도 있습니다. 한도에 너무 집착해 무리하게 사용하면 1주일 한도가 막혀 며칠 대기해야 할 수 있습니다. 자연스럽게 작업하면서 부족하면 업그레이드하세요.","answeredBy":"조교","tags":["토큰한도","클로드사용량","5시간갱신"]},{"id":"qa-6","question":"구형 맥북에서 Claude Desktop 앱이 설치 안 됩니다. 터미널 + VSCode 조합으로 써도 되나요?","frequency":2,"answer":"터미널 + VSCode 조합으로 Claude Code CLI 사용에 문제 없습니다. 터미널이 더 편한 경우도 많습니다. Claude Desktop 앱에게 '클로드코드 cli 설치해줘'라고 지시하거나, Claude Desktop → 코드 탭에서 CLI 설치 가능합니다.","answeredBy":"조교","tags":["클로드코드설치","터미널","맥북"]},{"id":"qa-7","question":"유튜브 채널에 광고(유료 프로모션)를 돌려야 구독자·조회수가 오르나요?","frequency":2,"answer":"유튜브 숏폼·롱폼 모두 유료 광고 없이 알고리즘으로 조회수를 올리는 것이 일반적입니다. 광고는 제휴마케팅 등 특수 목적 외에는 효율이 낮습니다. 강사님도 일 95만원 달성 시 유료 광고를 돌리지 않으셨습니다.","answeredBy":"경험자","tags":["유튜브","알고리즘","광고","수익화"]}],"insights":[{"id":"ins-1","content":"Claude.ai 일반 대화창에서 스킬 기획·설계·파일 작성을 완료하고, 완성 파일을 다운로드해 Claude Code에 설치만 하면 Opus 사용량을 최대 3~5배 절감할 수 있다. Claude Code 내 Opus 직접 작업은 추론 사이클 반복으로 토큰 소진이 극단적으로 빠르다.","author":"경험자(노마지)","category":"문제해결"},{"id":"ins-2","content":"클로드 Pro 요금제에서 스킬 1개 + 대본 1개 작성 시 Opus 사용량이 거의 소진됩니다. 본격 영상 생산 단계에서는 맥스 x5 플랜이 실질적 최소 요건입니다. 업그레이드는 차액만 결제하므로 먼저 프로로 사용감을 확인 후 결정하세요.","author":"조교 나물쓰","category":"수익화"},{"id":"ins-3","content":"Genspark(젠스파크) 내 Claude Opus는 무제한 사용 가능하나 결과물 품질이 공식 Claude.ai보다 다소 낮습니다. 높은 퀄리티가 필요한 작업은 공식 Claude, 중간 품질로도 무방한 작업은 젠스파크 내 Claude를 병행 활용하면 비용을 절감할 수 있습니다.","author":"문@정(달빛)","category":"도구추천"},{"id":"ins-4","content":"배경음악은 오토워커 프로그램 생성 범위 밖입니다. CapCut에서 편집 시 별도로 삽입하는 것이 현재 가장 효율적인 워크플로우입니다.","author":"개발남 노씨(오토워커)","category":"문제해결"},{"id":"ins-5","content":"썸네일 제작에는 Gemini(나노바나나)를 활용합니다. 무료 플랜으로 최신 버전 2~3회 생성 후 제한이 걸리면 하위 모델로 전환되며 1~3일 대기. 제작 수량이 늘어날 때 유료 업그레이드를 고려하세요.","author":"개발남 노씨(오토워커)","category":"도구추천"},{"id":"ins-6","content":"Claude Desktop 앱에서 창을 최소화하면 화면이 하얗게 비는 버그가 있습니다. 전체화면 유지로 우회하거나, Claude Code에게 '이런 증상이 있는데 고쳐줘'라고 지시해 수정 가능합니다.","author":"조교 나물쓰","category":"문제해결"},{"id":"ins-7","content":"채널 초기 운영 시 1~2개 영상 업로드가 최적입니다. 많이 올리는 것이 무조건 유리하지 않으며, 채널 일관성을 먼저 잡는 것이 알고리즘 노출에 유리합니다.","author":"조교 나물쓰","category":"전략"},{"id":"ins-8","content":"클로드 비밀(시크릿) 모드에서는 스킬 작업이 연속성 없이 단절되어 실질적 활용이 어렵습니다. 스킬·대본 작업은 반드시 로그인 상태의 일반 창에서 진행하세요.","author":"조교 나물쓰","category":"문제해결"}],"links":[{"id":"link-1","url":"https://hypnotic-concrete-dcf.notion.site/3-20-329c8b66674080649962f5b1c1edaa0c","title":"3/20 주요 공지사항 노션 페이지","category":"reference","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-2","url":"https://wiki.autoworkers.ai/","title":"오토워커 통합 위키 (수업 자료 전체)","category":"reference","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-3","url":"https://cafe.naver.com/autoworker1","title":"오토워커 1기 네이버 카페 (VOD·과제제출)","category":"reference","sharedBy":"김@철(플랜PLAN)","status":"active"},{"id":"link-4","url":"https://cafe.naver.com/autoworker1/17","title":"튜브워커 프로그램 다운로드 (과제 제출자 대상)","category":"tool","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-5","url":"https://wiki.autoworkers.ai/329c8b6667408018b492d3bfff3a8967","title":"튜브워커 사용법 노션 페이지 (카페 미접속자용)","category":"tutorial","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-6","url":"https://remotedesktop.google.com/support/","title":"구글 크롬 원격 지원 (조교 원격 트러블슈팅용)","category":"tool","sharedBy":"조교 나물쓰","status":"active"},{"id":"link-7","url":"http://pf.kakao.com/_EJixlG","title":"디하클 1:1 고객센터 카카오채널","category":"reference","sharedBy":"디하클 스태프 둘리","status":"active"},{"id":"link-8","url":"https://www.youtube.com/watch?v=m_67BIzkN-w","title":"다크모드와 시력 문제 관련 의학 정보 (유튜브)","category":"reference","sharedBy":"김@수(배고픈 나그네)","status":"active"}],"timeline":[{"time":"오전 2:12~오전 6:28","summary":"전날 강의 마무리 후 피로감·아쉬움 공유. 강사가 특수문자·그록 확장프로그램 오류 원인을 공식 해명하고, 3/21 오후 7시 사이트 배부·토요일·일요일 추가 수업 계획을 공지. 수강생들이 서로 격려하며 마무리.","topicTag":"공지"},{"time":"오전 8:00~오전 11:59","summary":"카페 가입 승인·VOD 업로드 시각 문의로 시작. 네이버 카페 링크 공유, 그록 유무료 여부·오토그록 개념 혼선 해소. 유튜브 광고 필요성 질의에 경험자들이 '알고리즘 우선' 원칙을 공유. 스킬 제작 진행 중인 수강생들의 토큰 소진 고충 접수.","topicTag":"학습"},{"time":"오후 12:00~오후 2:30","summary":"강사가 통합 공지 노션 페이지 및 AI 툴 사용 가이드(브루·GPT 사용 중단, 제미나이는 썸네일 전용) 발표. Claude 플랜 선택(프로 vs 맥스) 논의가 집중 발생. Claude.ai vs Claude Code 토큰 효율 비교 실증 경험 활발히 공유.","topicTag":"질문"},{"time":"오후 3:00~오후 5:30","summary":"수강생들이 VOD 복습하며 스킬 제작 실습 재개. Claude Code·VSCode 폴더 설정 관련 초보 트러블슈팅 다수 발생. 조교 나물쓰가 크롬 원격 지원으로 개별 문제 해결. /status 명령어로 사용량 확인하는 팁 공유. Claude Desktop 창 축소 시 화면 공백 버그 보고·해결.","topicTag":"학습"},{"time":"오후 7:00~오후 8:30","summary":"강사가 튜브워커 프로그램을 카페에 공개 배포. 사용법(카테고리·유튜브 링크 입력 방식) 안내. 과제 제출 게시판 오픈 및 대본 과제 제출 시 이메일로 프로그램 제공 방식 확정. 수강생들이 강사 제공 스킬로 대본 생성 시작, 맥스 플랜 업그레이드 체감 공유.","topicTag":"이벤트"},{"time":"오후 9:00~오후 11:59","summary":"과제 제출자들에게 순차적으로 튜브워커 이메일 발송 시작. 프로그램 로그인 후 실제 영상 생성 시도. 채널명 'TEST' 입력 시 500 에러 발생 등 초기 버그 신고 및 즉각 수정. 일부 수강생이 완성된 영상(자막·TTS 싱크 포함)을 최초 확인하며 극찬. 강사가 VOD 별도 제작 약속.","topicTag":"이벤트"}],"glossary":[{"id":"term-1","term":"튜브워커","definition":"오토워커 강사가 개발한 유튜브 영상 자동 제작 프로그램. Claude Code에서 폴더를 선택한 뒤 '유튜브 영상 만들어줘 [카테고리] 10분영상으로 [유튜브링크]' 형식으로 사용. 과제 제출 후 이메일로 접속 정보를 발송받는 방식으로 배포됨.","category":"tool","aliases":["영상제작기","오토워커 프로그램"]},{"id":"term-2","term":"젠스파크","definition":"Claude Opus를 무제한으로 사용 가능한 서드파티 플랫폼. 채팅에서 공식 Claude.ai보다 결과물 품질이 다소 낮지만, 적당한 품질의 작업에 비용 절감 대안으로 활용 가능하다고 언급됨.","category":"tool","aliases":["Genspark"]},{"id":"term-3","term":"오토그록","definition":"그록 사이트에 직접 들어가지 않고도 이미지를 생성할 수 있게 하는 우회 전략. 유튜브에서 설치·사용법을 검색할 수 있으나, 강의에서 소개된 방식과는 다름. 본인 그록 계정이 필요함.","category":"tool","aliases":["AutoGrok"]},{"id":"term-4","term":"쿠키에디터","definition":"크롬 확장프로그램. 채팅에서 그록 이미지 생성 우회 시 사용하는 도구로 언급됨. 여러 종류가 있으며 설치에 10초 정도 소요된다고 안내됨.","category":"tool","aliases":["Cookie Editor"]},{"id":"term-5","term":"에이전트","definition":"클로드에서 스킬에 추가로 연결하여 복합적인 작업을 수행하게 하는 기능. 채팅에서 '에이전트를 잘 써야 한다', '에이전트 붙이려고 해도 프로는 벅차다'는 등 고급 활용 맥락으로 언급됨.","category":"concept","aliases":["에이션트"]},{"id":"term-6","term":"나노바나나","definition":"Gemini를 활용한 썸네일 제작 방식을 지칭하는 별칭. 강사가 썸네일 제작 시 유일하게 Gemini를 사용하며 나노바나나라고 언급함.","category":"tool","aliases":[]},{"id":"term-7","term":"RPM","definition":"Revenue Per Mille, 조회수 1,000회당 수익. 채팅에서 유튜브는 RPM이 카테고리별로 비슷비슷하여 유료 광고 효율이 낮다고 설명됨.","category":"concept","aliases":[]},{"id":"term-8","term":"/status","definition":"Claude Code에서 현재 토큰 사용량을 확인할 수 있는 명령어. 조교가 사용량 한도 관리 팁으로 안내함.","category":"tool","aliases":[]},{"id":"term-9","term":"/resume","definition":"Claude Code에서 이전에 중단된 작업 화면을 다시 불러오는 명령어. 토큰 한도로 중단된 스킬 제작을 이어서 진행할 때 사용.","category":"tool","aliases":[]},{"id":"term-10","term":"맥스 x5","definition":"클로드 맥스 요금제 중 5배 사용량 등급. 채팅에서 '중소기업 수준'이라 표현되었으며, 동시에 4개 이상 작업하지 않는다면 충분하다고 안내됨.","category":"concept","aliases":["x5"]},{"id":"term-11","term":"수창","definition":"유튜브 채널에서 수익 창출 조건을 달성하는 것. 구독자 수·시청 시간 등 유튜브 파트너 프로그램 기준 충족을 의미하며, 채팅에서 '수창해서 신형 맥북 사자' 등의 목표로 자주 언급됨.","category":"community","aliases":["수익창출"]},{"id":"term-12","term":"AB테스트","definition":"두 가지 버전(A/B)을 비교하여 더 나은 결과물을 선택하는 전략. 채팅에서 Opus와 Sonnet으로 각각 대본을 생성하여 품질을 비교하겠다는 맥락으로 언급됨.","category":"concept","aliases":["A/B 테스트"]}]},"2026-03-21":{"meta":{"date":"2026-03-21","dayOfWeek":"토요일","totalMessages":829,"totalAnswered":47,"activeHours":"오전 12:09~오후 9:01","mvpContributors":[{"nickname":"개발남 노씨(오토워커)","role":"강사","contributionCount":22},{"nickname":"조교 나물쓰","role":"조교","contributionCount":38},{"nickname":"[조교] 대국밥","role":"조교","contributionCount":29},{"nickname":"디하클 스태프 둘리","role":"조교","contributionCount":9},{"nickname":"이@헌(충사마)","role":"일반","contributionCount":14},{"nickname":"구@기(쇼츠코인)","role":"일반","contributionCount":18},{"nickname":"강@혜(온세상)","role":"일반","contributionCount":12}]},"announcements":[{"id":"ann-1","content":"1튜브워커 미수령자, 1강 미이수자 포함 전원 대상 내일(22일) 오후 2시 줌 라이브 보강 진행 예정. 그 전까지 질문 자제 요청. 강사 및 조교진이 답변 준비 후 일괄 해결 예정.","author":"개발남 노씨(오토워커)","time":"오전 12:16","priority":"high"},{"id":"ann-2","content":"오후 3:32 줌 보강수업 링크 공개: https://us04web.zoom.us/j/79089015138?pwd=wNiBErwX2M7VxwTAWvVLmMMJv6LXEs.1 — 정규강의 아님. ①스킬 다운로드 실습 ②대본→영상 제작(튜브워커) ③질의응답. 6시까지 진행.","author":"조교 나물쓰","time":"오후 3:32","priority":"high"},{"id":"ann-3","content":"튜브워커 이메일 순차 발송 예정. 발송 시 사담방·공지방 공지 예정. 오전 10시 이후 폼 제출자는 당일 메일 수령 가능.","author":"조교 나물쓰","time":"오후 2:05","priority":"high"},{"id":"ann-4","content":"그록(Grok) 유료화 전환으로 외부 연동이 불안정. 영상 생성이 됐다 안됐다 반복. 조교 대국밥이 해결책 모색 중.","author":"[조교] 대국밥","time":"오후 5:33","priority":"medium"},{"id":"ann-5","content":"강의 자료 위치 정리: 노션 = https://wiki.autoworkers.ai/ (오토위키), 강의 영상·과제 = 네이버 카페 자료실 https://cafe.naver.com/f-e/cafes/31687042/menus/7","author":"디하클 스태프 둘리","time":"오후 3:32","priority":"medium"}],"topQA":[{"id":"qa-1","question":"튜브워커 메일을 아직 못 받았는데 언제 받을 수 있나요?","frequency":5,"answer":"순차 발송 중. 오전 10시 이후 폼 제출자는 당일 메일 수령 완료. 발송 시 사담방·공지방에 공지.","answeredBy":"조교","tags":["튜브워커","이메일","접근권한"]},{"id":"qa-2","question":"클로드 리밋(사용량 제한)에 걸렸는데 어떻게 해야 하나요?","frequency":6,"answer":"클로드 Pro는 첫 사용 후 5시간 리밋. 맥스 요금제로 업그레이드하면 사용량 증가. 리밋 시 컴퓨터 재부팅 또는 계정 재로그인 시도 가능. 대본 생성 시 레퍼런스 영상 대본이 길수록 토큰 소모가 빠름.","answeredBy":"조교","tags":["클로드","리밋","토큰","맥스플랜"]},{"id":"qa-3","question":"스킬 폴더 다운로드 후 어떻게 클로드 코드에서 실행하나요?","frequency":8,"answer":"스킬 폴더를 바탕화면에 저장 후 클로드 코드(데스크탑 앱) 좌측 '폴더 열기'로 해당 폴더 지정. 이후 '이 폴더 분석하고 실행해줘' 명령. 클로드가 자동 세팅 진행. VS Code는 파일 보기 편의용이며 필수 아님.","answeredBy":"조교","tags":["스킬","클로드코드","설치","폴더설정"]},{"id":"qa-4","question":"그록(Grok) SSO·쿠키 연동을 해도 영상 생성이 안 됩니다.","frequency":7,"answer":"그록이 유료화되면서 외부 연동을 제한적으로 막아 됐다 안됐다 반복. 유료 가입해도 불안정. 이미지만 전부 생성 완료되면 프로젝트 싱크는 맞으므로 그록 영상 없이 캡컷 프로젝트 내보내기 진행 가능. 조교 대국밥이 해결 방안 모색 중.","answeredBy":"조교","tags":["그록","영상생성","연동오류","유료화"]},{"id":"qa-5","question":"캡컷에서 튜브워커 프로젝트 파일이 보이지 않습니다.","frequency":6,"answer":"튜브워커에서 다운로드한 프로젝트 압축 파일을 반드시 풀어야 함. 풀린 폴더를 캡컷 Draft 경로(윈도우: Local\\CapCut\\User Data\\Projects\\com.lveditor.draft)에 넣은 후 캡컷 재시작. 폴더 안에 같은 이름의 폴더가 중첩되어 있다면 내부 폴더를 꺼내야 함.","answeredBy":"조교","tags":["캡컷","프로젝트연동","파일경로","윈도우"]},{"id":"qa-6","question":"이미지와 자막 싱크가 맞지 않거나 이미지가 생성 실패합니다.","frequency":5,"answer":"이미지를 전부 생성 완료한 후 프로젝트 생성해야 싱크가 맞음. 이미지 생성 실패 시 해당 이미지만 재생성(크레딧 차감 없음). 사람 실사 이미지 거부 시 프롬프트에 '등장인물은 모두 허구의 인물'을 추가해 재생성. 움직임 효과는 캡컷 완성 단계에서 카메라 효과 설정 필요.","answeredBy":"조교","tags":["이미지생성","싱크","캡컷","프롬프트"]},{"id":"qa-7","question":"노션 링크가 안 열리거나 강의 자료를 어디서 봐야 하나요?","frequency":5,"answer":"노션은 wiki.autoworkers.ai (채팅방에서 /오토위키 입력). 강의 영상·과제는 네이버 카페 자료실. 카페 주소: https://cafe.naver.com/autoworker1/17 (스킬 설치) / /menus/7 (1주차 강의). 노션과 카페 내용이 동일하지 않으므로 노션 먼저, 과제·강의는 카페 확인.","answeredBy":"조교","tags":["노션","카페","자료위치","오토위키"]}],"insights":[{"id":"ins-1","content":"클로드 모델 분업 전략: 대본·스킬 초기 생성은 오푸스(Claude Opus), 수정·보완은 소넷(Sonnet), 단순 반복 작업은 하이쿠로 크레딧 절약. 기획 단계는 일반 LLM에서 미리 정리 후 오푸스 투입.","author":"권@연(오마토)","category":"전략"},{"id":"ins-2","content":"오류 해결 독립성 확보: 에러 화면을 캡처해 클로드에게 '왜 생성 실패하냐?'고 질문하면 스스로 해결책 제시. 모르는 부분은 '생전 처음 보는 사람에게 설명하듯 구체적으로 지시'하는 것이 핵심.","author":"김@호(17)","category":"문제해결"},{"id":"ins-3","content":"클로드 코드 활용 범위 확장: 폴더 내 파일 분류·정리를 '알아서 분류해줘' 한 마디로 처리 가능. 캡컷 연동 등 외부 프로그램 연동도 클로드에게 위임하면 파이썬 설치·실행 파일 연동까지 자동 처리.","author":"이@헌(충사마)","category":"도구추천"},{"id":"ins-4","content":"이미지 한국인 설정 방법: 커스텀 스타일 생성 단계에서 스타일 프롬프트에 '등장인물은 모두 한국인'을 명시하면 전체 이미지에 일괄 적용. 프로젝트 생성 후에는 각 장면별 수동 수정 필요.","author":"개발남 노씨(오토워커)","category":"문제해결"},{"id":"ins-5","content":"대본 생성 시간 최적화: 동시 다중 진행보다 하나씩 순차 실행이 리밋 방지에 유리. 7~10분 영상 대본 기준 약 30분 소요. 중간중간 클로드 확인 응답(엔터 입력)이 필요한 반자동 구조.","author":"김@수(온도도)","category":"전략"},{"id":"ins-6","content":"하이쿠·소넷으로도 대본 품질 충분: 오푸스 대비 소넷·하이쿠로 대본 생성 시 크레딧 절약되면서 퀄리티도 '본인이 직접 쓴 것보다 낫다'는 수강생 후기 다수. 비용 민감 구간에 소넷 활용 권장.","author":"권@연(오마토)","category":"수익화"}],"links":[{"id":"link-1","url":"https://wiki.autoworkers.ai/","title":"오토워커 공식 위키 (강의 노션)","category":"reference","sharedBy":"조교 나물쓰","status":"active"},{"id":"link-2","url":"https://cafe.naver.com/f-e/cafes/31687042/menus/7","title":"네이버 카페 1주차 강의 게시판","category":"tutorial","sharedBy":"조교 나물쓰","status":"active"},{"id":"link-3","url":"https://cafe.naver.com/autoworker1/17","title":"스킬 설치 및 과제 가이드 (카페 게시글 17)","category":"tutorial","sharedBy":"정@윤(융이)","status":"active"},{"id":"link-4","url":"https://us04web.zoom.us/j/79089015138?pwd=wNiBErwX2M7VxwTAWvVLmMMJv6LXEs.1","title":"3월 21일 오후 2시 보강수업 줌 링크","category":"zoom","sharedBy":"조교 나물쓰","status":"expired"},{"id":"link-5","url":"https://drive.google.com/drive/folders/1tMndyZyK14w4KdQHag0B4kipkRLZNh3F","title":"스킬 파일 구글 드라이브 다운로드","category":"tool","sharedBy":"김@구(오슴오)","status":"active"},{"id":"link-6","url":"https://claude.com/download","title":"클로드 데스크탑 앱 다운로드","category":"tool","sharedBy":"조교 나물쓰","status":"active"},{"id":"link-7","url":"https://cafe.naver.com/autoworker1/33","title":"과제 제출 방법 안내 (카페 게시글 33)","category":"tutorial","sharedBy":"정@윤(융이)","status":"active"}],"timeline":[{"time":"오전 12:09~오전 2:00","summary":"심야 자율 실습 세션. 수강생들이 스킬 설치·대본 생성 시도 중 캡컷 프로젝트 연동 오류, 토큰 리밋 등 다발 발생. 강사가 내일 오후 2시 줌 보강 공지 후 질문 자제 요청. 충사마가 캡컷 프로젝트 등록 방법 PDF 공유로 커뮤니티 자체 해결 분위기 조성.","topicTag":"학습"},{"time":"오전 7:41~오전 10:00","summary":"아침 복귀와 함께 초보 수강생 질문 폭증. VS Code 폴더 설정 오류, 노션·카페 링크 접근 불가, 스킬 파일 구조 불일치 등 환경 세팅 문제 집중. 쇼츠코인·융이 등 선행 수강생들이 조교 역할 대행하며 오토위키 링크와 구글 드라이브 다운로드 경로 안내.","topicTag":"질문"},{"time":"오전 10:00~오후 1:00","summary":"스킬 설치·실행 트러블슈팅 집중 구간. Google API 키 요구 여부, 일레븐랩스 키 필요성, 대본 생성 소요 시간(7~10분 영상 기준 약 30분) 확인. 조교 나물쓰·충사마가 적극 개입. 오후 2시 줌 보강 대기 분위기 형성.","topicTag":"학습"},{"time":"오후 2:00~오후 3:30","summary":"오후 2시 줌 보강수업 개시. 튜브워커 메일 순차 발송 시작. 클로드 데스크탑 앱 미설치로 코드 탭 미표시 문제 등 기초 환경 오류 실시간 해결. 대국밥 조교가 대량 삭제 메시지 발생(실수). 1주차 강의 위치 혼동 수강생 다수 정리.","topicTag":"공지"},{"time":"오후 3:30~오후 6:00","summary":"튜브워커·캡컷 연동 실습 본격화. 그록 유료화로 인한 영상 생성 불안정 이슈 공론화. 캡컷 프로젝트 경로 설정, 이중 폴더 구조 오류 해결, 씬 전환 미적용 문제 등 세부 편집 트러블슈팅. 수강생 간 노하우 공유 활성화.","topicTag":"학습"},{"time":"오후 6:00~오후 8:00","summary":"이미지 생성 실패(실사·폭력 소재 필터링), 싱크 불일치 원인 분석(이미지 미완성 상태 프로젝트 생성 오류), 카메라 효과 미적용 문제 집중 해결. 수강생들이 첫 완성 영상을 캡컷에서 확인하며 '미쳤네' 반응. 이미지 한국인 설정 팁, 모델별 크레딧 절약 전략 공유.","topicTag":"이벤트"},{"time":"오후 8:00~오후 9:01","summary":"마무리 실습 및 개인 완성 보고. 그록 영상 생성 부분 성공 사례 등장(오마토). 썸네일 생성 방법 문의 시작. 강사가 사담방으로 질문 유도하며 세션 마무리.","topicTag":"일상"}],"glossary":[{"id":"term-1","term":"리밋","definition":"클로드의 사용량 제한(limit). Pro 플랜 기준 5시간 롤링 한도로 Opus 사용 시 빠르게 소진됨. 맥스 플랜으로 업그레이드하거나 컴퓨터 재부팅·재로그인으로 일시 해결 가능하다고 안내됨.","category":"concept","aliases":["limit","사용량 제한","토큰 리밋"]},{"id":"term-2","term":"캡컷 Draft","definition":"캡컷 프로젝트 파일이 저장되는 로컬 경로. 윈도우 기준 'Local\\CapCut\\User Data\\Projects\\com.lveditor.draft'에 프로젝트 폴더를 넣어야 캡컷에서 인식됨. 압축 파일은 반드시 해제 후 이동해야 함.","category":"tool","aliases":["드래프트 경로","캡컷 프로젝트 경로"]},{"id":"term-3","term":"하이쿠","definition":"클로드의 경량 AI 모델(Claude Haiku). 채팅에서 단순 반복 작업에 적합하며 크레딧 소모가 가장 적다고 언급됨. 대본 품질도 '본인이 직접 쓴 것보다 낫다'는 후기가 공유됨.","category":"concept","aliases":["Haiku"]},{"id":"term-4","term":"SSO","definition":"Single Sign-On. 그록 유료화 이후 쿠키·SSO 연동이 불안정해지면서 영상 생성이 됐다 안됐다 반복하는 문제가 발생. 조교가 해결 방안을 모색 중이라고 안내됨.","category":"concept","aliases":[]},{"id":"term-5","term":"커스텀 스타일","definition":"튜브워커에서 이미지 생성 시 적용하는 맞춤 스타일 설정. 스타일 프롬프트에 '등장인물은 모두 한국인' 등을 명시하면 전체 이미지에 일괄 적용 가능.","category":"concept","aliases":[]},{"id":"term-6","term":"Google API 키","definition":"웹 검색 기능 활용에 필요한 인증 키. 채팅에서 스킬 실행 시 Google API 키 없이도 진행 가능하며, 비활성화 상태에서 사용하면 된다고 안내됨.","category":"concept","aliases":["구글 API 키"]},{"id":"term-7","term":"클로","definition":"클로드(Claude)를 친근하게 부르는 애칭. 채팅에서 '클로에게 시키면 다 된다', '클로 갈구기' 등의 표현으로 사용됨.","category":"community","aliases":["끌로"]},{"id":"term-8","term":"프로젝트 싱크","definition":"이미지·자막·음성이 캡컷 프로젝트 내에서 시간축으로 정렬되어 일치하는 상태. 이미지가 전부 생성 완료된 후에 프로젝트를 생성해야 싱크가 맞음. 미완성 상태에서 생성하면 불일치 발생.","category":"concept","aliases":["싱크"]},{"id":"term-9","term":"크레딧","definition":"튜브워커 이미지 생성 시 소모되는 사용량 단위. 이미지 생성 실패 시 해당 이미지를 재생성하면 크레딧이 추가 차감되지 않는다고 안내됨.","category":"concept","aliases":[]},{"id":"term-10","term":"보강수업","definition":"정규강의 외 별도로 진행하는 줌 라이브 추가 강의. 3/21 오후 2시에 1강 미이수자·튜브워커 미수령자를 포함한 전원 대상으로 스킬 다운로드 실습, 대본→영상 제작, Q&A를 다루는 보강이 진행됨.","category":"community","aliases":["추가 수업","보충수업"]},{"id":"term-11","term":"미리캔버스","definition":"이미지·디자인 편집 도구. 채팅에서 이미지 일부 텍스트 오류 수정 시 미리캔버스에서 도형을 입히고 글자를 수정하는 방식으로 토큰 절약 가능하다는 팁이 공유됨.","category":"tool","aliases":[]}]},"2026-03-22":{"meta":{"date":"2026-03-22","dayOfWeek":"일요일","totalMessages":922,"totalAnswered":18,"activeHours":"오전 2:10~오후 11:53","mvpContributors":[{"nickname":"조@욱(잼스)","role":"일반","contributionCount":95},{"nickname":"구@기(쇼츠코인)","role":"일반","contributionCount":62},{"nickname":"개발남 노씨(오토워커)","role":"강사","contributionCount":18},{"nickname":"조교 나물쓰","role":"조교","contributionCount":16},{"nickname":"디하클 스태프 둘리","role":"조교","contributionCount":14},{"nickname":"김@호(17)","role":"일반","contributionCount":28},{"nickname":"최@원(리마인드)","role":"일반","contributionCount":16}]},"announcements":[{"id":"ann-1","content":"오토위키 신규 URL 적용 완료. 공지방 및 오토노션 확인 필수. 오토봇(@all) 통해 https://wiki.autoworkers.ai/ 안내","author":"임@진(후파)","time":"오전 10:49","priority":"high"},{"id":"ann-2","content":"일요일 추가특강(고수방) 줌 링크 공지. 터미널 사용법 및 remote 원격 활용법 강의. VOD 녹화 제공 예정.","author":"조교 나물쓰","time":"오후 3:08","priority":"high"},{"id":"ann-3","content":"조교 온보딩 완료. 내일(월)부터 전 조교 투입 예정. 질문은 사담방, 잡담은 프반 허용.","author":"개발남 노씨(오토워커)","time":"오후 8:07","priority":"high"},{"id":"ann-4","content":"튜브워커 서버 점검 중(~오후 4:30). 튜브워커 접속 주소: http://ec2-43-203-100-223.ap-northeast-2.compute.amazonaws.com:8000/ — 아이디/비밀번호는 과제 제출 후 구글폼 작성 시 제공.","author":"조교 나물쓰 / 개발남 노씨(오토워커)","time":"오후 4:26","priority":"high"},{"id":"ann-5","content":"스킬 파일 재업로드 및 강의 영상 재촬영 예정(다음날). 현재 스킬 내 output·썸네일 프롬프트 누락 이슈 대응.","author":"개발남 노씨(오토워커)","time":"오후 11:48","priority":"medium"}],"topQA":[{"id":"qa-1","question":"VSCode에서 Claude Desktop 파일을 복사해 클로드에 붙여넣기가 안 되는 이유는?","frequency":4,"answer":"클로드 데스크탑은 파일 복사·붙여넣기가 직접 지원되지 않음. 먼저 Claude Desktop 설정에서 작업 경로(폴더)를 지정해야 하며, 코드 탭(탐색기 탭)에서 경로를 설정한 후 작업해야 함.","answeredBy":"조교","tags":["Claude Desktop","VSCode","파일 관리"]},{"id":"qa-2","question":"1강 과제 영상 길이는 얼마로 제출해야 하나요?","frequency":3,"answer":"강사 시연 영상 기준 7~10분. 10분으로 제출해도 자료 제공됨. 플랫폼 불안정 시 구글폼에 제출했다고 기재해도 인정.","answeredBy":"경험자","tags":["과제 제출","영상 길이","1강"]},{"id":"qa-3","question":"과제 제출 시 파일 업로드가 '서버에서 거부되었습니다' 오류 발생","frequency":2,"answer":"파일 업로드 필수 옵션을 해제 처리함. 첨부파일 없이 제출 버튼 클릭으로 제출 가능.","answeredBy":"강사","tags":["과제 제출","서버 오류","파일 업로드"]},{"id":"qa-4","question":"클로드 맥스 플랜의 주당 한도를 소진하면 목요일까지 사용 불가한가?","frequency":2,"answer":"맞음. 주당 한도 소진 시 다음 리셋일(목요일)까지 추가 사용 불가. 초기엔 토큰 낭비가 많으므로 맥스 플랜 사용 후 안정화되면 프로 플랜으로 전환 고려.","answeredBy":"경험자","tags":["Claude 요금제","토큰 한도","맥스 플랜"]},{"id":"qa-5","question":"자막 싱크가 안 맞을 때 해결 방법은?","frequency":3,"answer":"캡컷 자동캡션 대신, 캡컷에서 자막을 제거한 뒤 브루(Vrew)로 가져가 자막을 재생성하는 방법이 최선. 브루 자막 정확도가 높음.","answeredBy":"경험자","tags":["자막 싱크","캡컷","브루(Vrew)","영상 편집"]},{"id":"qa-6","question":"튜브워커 회원 등급이 '노말'로 표시되는데 정상인가요?","frequency":1,"answer":"공지방·오토노션에서 새 주소 및 등급 정보 확인 필요. 점검 후 재접속 시 정상 반영 예정.","answeredBy":"강사","tags":["튜브워커","회원 등급","접속"]},{"id":"qa-7","question":"그록(Grok) 브라우저 쿠키 요구 화면이 뜨는데 어떻게 하나요?","frequency":2,"answer":"쿠키에는 로그인 정보가 포함되어 외부 노출 위험. 훅 영상 생성 단계에서 '건너뛰기'로 넘어가면 됨.","answeredBy":"경험자","tags":["Grok","쿠키","보안","훅 영상"]}],"insights":[{"id":"ins-1","content":"Claude Code(Opus 4.6 모드)에게 워크플로우를 시각화한 '장르 에디터' 제작을 요청하면, 대본 스타일 변수(장르, 채널 특성)를 GUI로 수정 가능한 편집기를 자동 생성해 준다. 반복 타이핑 없이 스킬 파라미터를 편집할 수 있어 대본 고도화 효율이 크게 향상됨.","author":"조@욱(잼스)","category":"도구추천"},{"id":"ins-2","content":"벤치마킹 채널 스크립트를 유플레이어(YTD 등)로 수집 후 Claude Code에 역프롬프트를 요청하면 채널 고유 스크립트 지침서(SKILL.md)를 자동 생성할 수 있다. 제미나이(잼민이)로 유튜브 링크 2~3개를 끌어와 뼈대를 만들고, Claude로 완성하는 방식도 효과적.","author":"구@기(쇼츠코인)","category":"전략"},{"id":"ins-3","content":"Anthropic Claude 클코 토큰 한도 부족 시, Anthropic(안티)에 내장된 Gemini 2.1 무료 토큰과 Claude Opus 4.6 무료 토큰을 병행 사용하면 토큰 소모를 분산할 수 있다. 대본 분석처럼 최상위 모델이 불필요한 작업은 Gemini 할당.","author":"구@기(쇼츠코인)","category":"도구추천"},{"id":"ins-4","content":"파이프라인·워크플로우 결과물은 HTML 대시보드로 만들어 두면 에이전트 추가·대본 스킬 수정을 웹 UI에서 직접 편집 가능. 클로드에게 기존 워크플로우 스크린샷을 제공하며 '이런 대시보드 만들어줘'라고 하면 자동 생성됨.","author":"조@욱(잼스) / 구@기(쇼츠코인)","category":"도구추천"},{"id":"ins-5","content":"롱폼은 완전 자동화, 쇼츠는 반자동화 수준. 중복도 회피를 위해 벤치마킹 채널을 다르게 잡고 스크립트 스타일링을 채널마다 차별화하는 것이 조회수와 수익화에 직결됨. 여러 강의를 넘나드는 것보다 한 강의·한 방향에 집중하는 것이 성과로 이어짐.","author":"조@욱(잼스)","category":"전략"},{"id":"ins-6","content":"AI 시대에는 기술보다 기획력·취향이 경쟁력. 강사 개발남 노씨: '이젠 기획, 취향이 진짜 중요해지는 것 같다.' 바이브코딩에서도 본질은 텍스트(대본)이며 워크플로우를 언어로 설계하는 능력이 핵심.","author":"개발남 노씨(오토워커)","category":"수익화"},{"id":"ins-7","content":"일레븐랩스 TTS 부분 수정(특정 문장만 재생성 후 끼워넣기)은 현재 공식 지원 안 됨. 오류 있는 음성도 업로드 시 조회수에 큰 영향 없으나, 향후 정교화 예정. 음성 선택 시 '톡톡 꽂히는' 느낌의 목소리가 채널 성과에 유리.","author":"개발남 노씨(오토워커)","category":"문제해결"}],"links":[{"id":"link-1","url":"https://wiki.autoworkers.ai/","title":"오토워커 위키 (신규 주소)","category":"reference","sharedBy":"임@진(후파)","status":"active"},{"id":"link-2","url":"https://infobaz.com/%EA%B7%B8%EB%A1%9D-%EB%AC%B4%EB%A3%8C-%EC%B0%A8%EB%8B%A8-%ED%9B%84-%EC%B0%BE%EC%9D%80-%EB%B0%A9%EB%B2%95/","title":"그록 무료 차단 후 찾은 방법 (인포바즈 블로그)","category":"reference","sharedBy":"권@근(다행)","status":"active"},{"id":"link-3","url":"https://us06web.zoom.us/j/87000831084?pwd=U9duVajUaSrLq7mroclxhXox39y1AV.1","title":"일요일 추가특강 줌 링크 (고수방 — 터미널·원격 강의)","category":"zoom","sharedBy":"조교 나물쓰","status":"expired"},{"id":"link-4","url":"http://ec2-43-203-100-223.ap-northeast-2.compute.amazonaws.com:8000/","title":"튜브워커(TubeWorker) 서비스 접속 주소","category":"tool","sharedBy":"조교 나물쓰","status":"active"},{"id":"link-5","url":"https://discuss.pytorch.kr/t/claude-hud-claude-code-statusline/8690","title":"Claude HUD — Claude Code Statusline 플러그인 (PyTorch KR 포럼)","category":"tool","sharedBy":"조@욱(잼스)","status":"active"},{"id":"link-6","url":"https://youtu.be/TER4cdB9z80","title":"디하클 스태프 둘리 유튜브 영상 (자기소개/자랑)","category":"reference","sharedBy":"디하클 스태프 둘리","status":"active"},{"id":"link-7","url":"https://cafe.naver.com/f-e/cafes/31687042/menus/12?viewType=L","title":"오토워커 네이버 카페 — 공식 질문 게시판","category":"reference","sharedBy":"디하클 스태프 둘리","status":"active"},{"id":"link-8","url":"https://chat.qwen.ai/c/c2d91941-37c1-47db-b0a7-27458455b0af","title":"Qwen AI (중국) — 무료 영상 생성 서비스 (5초 고퀄 클립)","category":"tool","sharedBy":"윤@수(브리 노마드)","status":"active"}],"timeline":[{"time":"오전 2:10~오전 10:50","summary":"오토위키 신규 URL 봇 연동 작업. 임@진(후파)이 양쪽 방(프반·사담방)에 오토봇 /질문 커맨드 및 위키 링크 자동 응답 설정 완료.","topicTag":"공지"},{"time":"오전 11:00~오후 2:00","summary":"프반 운영 방침 정립. 강사: 질문은 사담방, 잡담은 프반 허용. 1강 과제 파일 업로드 오류 처리(필수 옵션 해제), 과제 영상 길이 안내(7~10분). 줌 인원 초과 이슈 대응.","topicTag":"공지"},{"time":"오후 2:00~오후 4:30","summary":"VSCode·Claude Desktop 파일 복사·붙여넣기 트러블슈팅(조교 나물쓰 응대). 튜브워커 서버 점검 공지 및 접속 주소·계정 발급 절차 안내. 그록 쿠키 이슈 문의.","topicTag":"질문"},{"time":"오후 7:00~오후 8:10","summary":"수강생 자유 토론 최고조: 잼스님 주도로 Claude Code 활용 장르 에디터·워크플로우 시각화(대시보드·HTML) 아이디어 공유. 캡컷 자막 싱크, 브루 활용, 롱폼 전략 집중 토론. 강사 조교 온보딩 완료 발표.","topicTag":"학습"},{"time":"오후 8:10~오후 9:50","summary":"심리학 바이브코딩·Remotion·블렌더·Meshy AI 등 확장 도구 정보 교류. 쇼츠코인님의 HTML 대시보드 공개. 오토워커 롱폼 수익화 비전 확인(강사: '롱폼으로 진짜 돈 벌자, 기능 전부 추가해 드리겠다').","topicTag":"학습"},{"time":"오후 9:50~오후 11:53","summary":"대본 지침서 제작 방법론 공유(유플레이어로 스크립트 수집 → 역프롬프트 → Claude 완성). 초보자 Python 환경 선택·스킬 실습 Q&A. 강사: 스킬 재업로드·강의 영상 재촬영 예고. 막바지 캡컷 이미지 이슈 문의로 마무리.","topicTag":"질문"}],"glossary":[{"id":"term-1","term":"장르 에디터","definition":"Claude Code에게 요청하여 만든 GUI 기반 편집기. 대본 스타일 변수(장르, 채널 특성 등)를 시각적으로 수정할 수 있어, 스킬 파라미터를 일일이 타이핑하지 않고도 대본 고도화가 가능함.","category":"tool","aliases":[]},{"id":"term-2","term":"Remotion","definition":"React를 사용해 프로그래밍 방식으로 영상을 만드는 오픈소스 프레임워크. 채팅에서는 코드로 영상을 완성한 사례로 언급됨.","category":"tool","aliases":["리모션"]},{"id":"term-3","term":"블렌더","definition":"무료 오픈소스 3D 애니메이션·모델링 프로그램. Meshy AI 등으로 만든 3D 모델을 불러와 움직임을 추가하는 용도로 언급됨. 롱폼 해외 채널에서 3D 영상으로 떡상한 사례가 많다고 소개됨.","category":"tool","aliases":["Blender"]},{"id":"term-4","term":"Meshy AI","definition":"AI 기반 3D 모델링 서비스. 이미지나 텍스트로 3D 모델을 생성해 주며, 생성된 모델을 블렌더로 가져와 애니메이션 작업에 활용할 수 있음.","category":"tool","aliases":[]},{"id":"term-5","term":"Qwen AI","definition":"중국 AI 플랫폼. 채팅에서는 무료로 5초 분량의 고퀄리티 영상 클립을 생성할 수 있는 서비스로 소개됨.","category":"tool","aliases":["큐웬"]},{"id":"term-6","term":"유플레이어","definition":"유튜브 영상 및 자막(스크립트) 다운로드 프로그램. 벤치마킹 채널의 스크립트를 수집하여 역프롬프트·대본 지침서 작성에 활용하는 용도로 언급됨.","category":"tool","aliases":["YTD"]},{"id":"term-7","term":"잼민이","definition":"Google Gemini AI를 지칭하는 채팅방 내 별칭. 영상·이미지 분석 능력이 뛰어나 유튜브 영상 분석이나 스크립트 뼈대 작성 시 활용됨.","category":"community","aliases":["제미나이","Gemini"]},{"id":"term-8","term":"프프","definition":"Adobe Premiere Pro의 줄임말. 자막 정확도가 높다고 평가되며, 컷백(Cutback) 기능과 함께 영상 편집 도구로 언급됨.","category":"tool","aliases":["프리미어 프로","Premiere Pro"]},{"id":"term-9","term":"역프롬프트","definition":"잘된 유튜브 채널의 완성된 스크립트를 AI에 넣어, 해당 스크립트를 만들어낸 원본 프롬프트(지침)를 역추출하는 기법. 채널 고유 대본 스타일(SKILL.md)을 자동 생성하는 데 활용.","category":"concept","aliases":[]},{"id":"term-10","term":"대시보드","definition":"워크플로우·에이전트·스킬 구성을 웹 UI(HTML)로 시각화한 관리 페이지. 클로드에게 스크린샷을 보여주며 요청하면 자동 생성해 주며, 웹에서 직접 스킬 수정도 가능.","category":"concept","aliases":[]},{"id":"term-11","term":"Claude HUD","definition":"Claude Code의 실행 상태를 터미널 statusline에 표시하는 플러그인. PyTorch KR 포럼에 소개된 도구로, 잼스님이 공유함.","category":"tool","aliases":["클로드 HUD"]},{"id":"term-12","term":"n8n","definition":"오픈소스 워크플로우 자동화 플랫폼. 유튜브 댓글 자동 작성, 반복 작업 자동화 등에 활용 가능. 채팅에서는 회사 내부 AI 강의에서 다루는 도구로 언급됨.","category":"tool","aliases":[]}]},"2026-03-23":{"meta":{"date":"2026-03-23","dayOfWeek":"월요일","totalMessages":547,"totalAnswered":38,"activeHours":"오전 12:05~오후 11:58","mvpContributors":[{"nickname":"개발남 노씨(오토워커)","role":"강사","contributionCount":52},{"nickname":"[조교] 대국밥","role":"조교","contributionCount":34},{"nickname":"조교 나물쓰","role":"조교","contributionCount":22},{"nickname":"버터떡(조교)","role":"조교","contributionCount":8},{"nickname":"비빔(조교)","role":"조교","contributionCount":6},{"nickname":"구@기(쇼츠코인)","role":"일반","contributionCount":28},{"nickname":"조@욱(잼스)","role":"일반","contributionCount":18}]},"announcements":[{"id":"ann-1","content":"튜브워커 서버 주소 변경 공지. 신규 주소: http://ec2-43-203-100-223.ap-northeast-2.compute.amazonaws.com:8000/ — 크레딧 시스템 개편(영상 길이 기준 → 대본 글자수 기준), 기존 크레딧 자동 10배 전환, 대본 글자수 1,000~30,000자 자유 입력, 영상설정 단계 제거, 음성(자막 싱크) 세밀화.","author":"[조교] 대국밥","time":"오전 11:48","priority":"high"},{"id":"ann-2","content":"[1주차 프반 특강 공지] 화요일 19:00~21:00 진행. ① 스킬 만드는 과정 시연 ② 공개 피드백. 피드백 희망자는 구글폼(https://forms.gle/8ZHuaetveHuKAdKN7)에 스킬 업로드 요망. 질문답변은 24:00까지 연장.","author":"개발남 노씨(오토워커)","time":"오후 9:45","priority":"high"},{"id":"ann-3","content":"카톡방 질의응답 정리본 카페 및 노션 매일 업로드 시작. 카페: https://cafe.naver.com/f-e/cafes/31687042/menus/31?viewType=L / 노션: https://www.notion.so/32cc8b6667408039b4cdd423058052f7 — 18·19일자 업로드 완료, 이후 일자도 순차 업로드 예정. 모닝 루틴으로 정독 권장.","author":"비빔(조교)","time":"오후 9:49","priority":"high"},{"id":"ann-4","content":"크레딧 구매 시 사용 아이디(닉네임 아닌 아이디, 예: autoworker00) 기재 필수. 현금영수증은 카드결제 모듈 추가 후 일괄 처리 예정.","author":"레몬버터(조교)","time":"오후 3:08","priority":"medium"},{"id":"ann-5","content":"튜브워커 사이트 오후 5시 4분부터 점검 돌입. 목요일 19시까지 점검 예정. 이미지 일관성 개선 및 기본 스타일(실사/시네마틱) 동양인 기본값 반영 업데이트 포함.","author":"개발남 노씨(오토워커)","time":"오후 5:04","priority":"high"}],"topQA":[{"id":"qa-1","question":"이미지에 외국인이 나오는데 한국인으로 뽑으려면 어떻게 해야 하나요?","frequency":5,"answer":"기본 스타일(실사/시네마틱) 사용 시 외국인이 나올 수 있음. 반드시 커스텀 스타일을 먼저 만들고 동양인(한국인)으로 명시한 뒤 이미지 생성. Claude Code에서 '동양인으로 그려달라'고 요청하는 방법도 가능. 기본 스타일 선택지에 동양인 기본값을 반영하는 업데이트 예정.","answeredBy":"강사","tags":["이미지생성","커스텀스타일","튜브워커"]},{"id":"qa-2","question":"스토리보드 생성 버튼을 두 번 누르면 크레딧이 두 번 차감되나요?","frequency":3,"answer":"스토리보드 생성 시 크레딧 차감 확인 경고창이 뜨며, '확인' 버튼을 눌러야 차감됨. 확인창 없이 실수로 두 번 누른 경우는 서버·네트워크 오류 여부 확인 후 복구 가능. 이미지 생성 단계는 크레딧 차감 없음.","answeredBy":"조교","tags":["크레딧","스토리보드","튜브워커"]},{"id":"qa-3","question":"튜브워커 접속이 안 됩니다. 주소가 바뀌었나요?","frequency":4,"answer":"공지방 상단에 새 주소 공지됨. http://ec2-43-203-100-223.ap-northeast-2.compute.amazonaws.com:8000/ 로 접속. 접속 불가 시 Ctrl+Shift+R(강제 새로고침) 시도.","answeredBy":"조교","tags":["튜브워커","접속","주소변경"]},{"id":"qa-4","question":"일레븐랩스 API 키 저장/연동이 안 됩니다.","frequency":3,"answer":"워크스페이스 ID와 API 키는 별개. 기존 API 키를 따로 저장해두지 않았다면 재복사 불가하므로 새 API 키 발급 후 튜브워커 설정에 입력. 설정 메뉴(좌측 하단 계정 프로필 → 설정)에서 직접 입력 가능. 튜브워커 내장 크레딧이 일레븐랩스 직접 구독보다 대량 구매 단가가 낮음.","answeredBy":"조교","tags":["일레븐랩스","API","음성생성"]},{"id":"qa-5","question":"Claude Code 스킬 폴더 지정 후 새 창에서 스킬이 인식 안 됩니다.","frequency":2,"answer":"새 창 열 때마다 스킬 분석·실행을 명시적으로 요청하거나, 스킬 폴더를 CLAUDE.md에 고정 참조되도록 설정 권장. 토큰 소모를 줄이려면 필요한 스킬 파일만 선택적으로 로드.","answeredBy":"일반","tags":["ClaudeCode","스킬","토큰"]},{"id":"qa-6","question":"VSCode 클로드 플러그인과 Claude Code(터미널)의 차이가 있나요?","frequency":2,"answer":"기능 차이보다 환경 차이. VSCode와 Antigravity(VS Code 기반 구글 IDE) 모두 탐색기 역할로 사용 가능. Antigravity는 AI 내장으로 토큰 여유가 있고 구글 MCP 연결이 편리하며 프론트엔드 UI 생성에 강점. 본 강의 내용과는 직접 상관 없음.","answeredBy":"일반","tags":["ClaudeCode","VSCode","Antigravity","도구선택"]}],"insights":[{"id":"ins-1","content":"대본 스킬은 조각내어 하나씩 개선하는 것이 효과적. 통합 프롬프트를 한 번에 수정하려다 방향을 잃는 것보다, 영역(장르·톤·후킹·서사 구조)별로 분리해 무한 수정을 반복하면 실력과 결과물 모두 향상됨.","author":"조@욱(잼스)","category":"전략"},{"id":"ins-2","content":"조회수를 올리는 핵심 공식: ① 조회수 잘 터지는 AI 롱폼 영상을 벤치마킹 → ② 좋은 퀄리티로 → ③ 마구 뽑아낸다. 이 세 단계를 스킬에 녹이는 것이 2주차 정규강의의 핵심이며, 성공 확률을 크게 높이는 전략.","author":"개발남 노씨(오토워커)","category":"수익화"},{"id":"ins-3","content":"Claude MAX 200달러 플랜도 무한정 사용 불가. 과도한 남용 시 한계 도달 후 강제 휴식. API 연동으로 일부 작업을 이어받거나, Claude Code + Gemini API 병행 사용으로 비용 분산 전략 필요.","author":"조@욱(잼스)","category":"도구추천"},{"id":"ins-4","content":"기획 단계에서 Claude Code(소통 비용 큼)보다 Gemini AI 스튜디오(무료, 대화형 기획 최적)를 먼저 활용해 아이디어를 구체화한 뒤 Claude Code에 기획서를 넘기는 워크플로우가 토큰 절약과 작업 효율 양면에서 유리.","author":"구@기(쇼츠코인)","category":"도구추천"},{"id":"ins-5","content":"구글 AI 스튜디오는 영상 분석(레퍼런스 구조 파악·말투 추출)에 강점. 분석 결과를 Claude Code 스킬에 넣으면 채널 고유 스타일(욕망형·직관형 등 여러 버전)이 반영된 대본 다중 생성이 가능.","author":"윤@수(브리 노마드)","category":"전략"},{"id":"ins-6","content":"캡컷 프로젝트 폴더 압축 해제 시 폴더가 이중으로 생성되는 경우가 있음. 캡컷이 인식하는 폴더(내부 폴더)를 한 단계 바깥으로 꺼내면 즉시 해결됨. 동일 오류 발생 시 Claude Code에 물어보기 전 폴더 구조 먼저 확인.","author":"김@철(플랜PLAN)","category":"문제해결"}],"links":[{"id":"link-1","url":"http://ec2-43-203-100-223.ap-northeast-2.compute.amazonaws.com:8000/","title":"튜브워커 (TubeWorker) 신규 서버 주소","category":"tool","sharedBy":"[조교] 대국밥","status":"active"},{"id":"link-2","url":"https://forms.gle/8ZHuaetveHuKAdKN7","title":"1주차 프반 특강 참가 신청 구글폼 (스킬 업로드 포함)","category":"reference","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-3","url":"https://docs.google.com/forms/d/e/1FAIpQLScMxJg-P95GzdV3M2_jx5sHjQ0oqnDWFC72wTFNsuOusUWfMw/viewform?usp=send_form","title":"크레딧 구매 / 오류 환급 신청 구글폼","category":"reference","sharedBy":"조교 나물쓰","status":"active"},{"id":"link-4","url":"https://devdesign-kr.notion.site/Claude-Code-329f8939a2c380aea382f44c7eacb77f","title":"Claude Code 노션 정리 문서 (조@욱 작성)","category":"reference","sharedBy":"조@욱(잼스)","status":"active"},{"id":"link-5","url":"https://cafe.naver.com/f-e/cafes/31687042/menus/31?viewType=L","title":"오토워커 카페 질의응답 정리 게시판","category":"reference","sharedBy":"비빔(조교)","status":"active"},{"id":"link-6","url":"https://www.notion.so/32cc8b6667408039b4cdd423058052f7?v=32cc8b666740809b8665000cdbe7c3a6&source=copy_link","title":"오토워커 질의응답 정리 노션 (18·19일자 업로드 완료)","category":"reference","sharedBy":"비빔(조교)","status":"active"},{"id":"link-7","url":"https://labs.google/fx/tools/whisk","title":"구글 Whisk (이미지 생성 도구, 쿠키 에디터 연동 필요)","category":"tool","sharedBy":"조교 나물쓰","status":"active"},{"id":"link-8","url":"https://infobaz.com/%EA%B7%B8%EB%A1%9D-%EB%AC%B4%EB%A3%8C-%EC%B0%A8%EB%8B%A8-%ED%9B%84-%EC%B0%BE%EC%9D%80-%EB%B0%A9%EB%B2%95/","title":"그록(Grok) 무료 차단 후 대체 사용 방법 아티클","category":"tutorial","sharedBy":"권@근(다행)","status":"active"},{"id":"link-9","url":"https://www.youtube.com/watch?v=6K2QFZNBvEs&list=RD6K2QFZNBvEs&start_radio=1","title":"AI 음악 + AI 영상 뮤직비디오 레퍼런스 (제작 기간 2개월)","category":"reference","sharedBy":"최@원(리마인드)","status":"active"}],"timeline":[{"time":"오전 12:05~오전 4:00","summary":"심야 자율학습 타임. 대본 파이프라인 스킬(youtube-pd agent) 공유 및 개선 논의, 과제 제출 방법(구글폼·카페 업로드) 문의 집중. Claude MAX 200달러 사용량 소진 사례 공유. Notion 정리 링크 배포.","topicTag":"학습"},{"time":"오전 7:00~오전 11:00","summary":"오전 활동 재개. 화요일 프반 수업 성격(특강 vs 피드백) 혼선 발생. 튜브워커 접속 주소 변경 관련 문의 급증. 스토리보드 크레딧 중복 차감 이슈·이미지 커스텀 버튼 비활성화 오류 조교 대응. 그록 영상 생성 차단 대응책 안내.","topicTag":"공지"},{"time":"오전 11:00~오후 1:30","summary":"기본 스타일(실사/시네마틱) 사용 시 외국인 이미지 생성 이슈 집중 토론. 강사가 커스텀 스타일 필수화 및 기본값 업데이트 예정 공지. 크레딧 환불·세금 처리(현금영수증) 문의. 1기 수강생 초기 운영 애로사항 공유.","topicTag":"질문"},{"time":"오후 1:30~오후 3:30","summary":"일레븐랩스 API 연동(워크스페이스 ID vs API 키 혼동) 트러블슈팅. 캡컷 프로젝트 폴더 인식 오류를 수강생 간 상호 해결. 과제 파일 업로드 서버 거부 오류 즉각 수정(필수값 해제). Whisk 쿠키 에디터 연동 방법 안내.","topicTag":"문제해결"},{"time":"오후 3:30~오후 6:00","summary":"Antigravity vs VSCode 차이 및 프론트·백엔드 분리 워크플로우 토론. Gemini AI 스튜디오 기획 단계 활용 전략 공유. 대본 스킬 자율 개선(구글 AI 스튜디오 영상 분석 연동, 다중 버전 생성) 사례 논의. 오후 5시 사이트 점검 돌입.","topicTag":"학습"},{"time":"오후 7:00~오후 10:00","summary":"프반 특강 공지 발표(화요일 19~21시, 스킬 제작 시연 + 공개 피드백). 질의응답 정리본 카페·노션 일일 업로드 시작 안내. 정규강의(사용법 중심) vs 프반(원리·확장·개선) 커리큘럼 방향 명확화.","topicTag":"공지"},{"time":"오후 10:00~오후 11:58","summary":"3주차 정규강의 콘텐츠 예고: 경제·심리·역사 3개 채널용 스킬 + 유튜브 파인더 신버전 배포. 조회수 공식(벤치마킹 → 퀄리티 → 대량 생산) 공유. 강사 프반 강의자료 제작 착수 선언 후 마무리.","topicTag":"이벤트"}],"glossary":[{"id":"term-1","term":"PD 에이전트","definition":"유튜브 대본 제작 파이프라인(레퍼런스 수집 → 분석 → 대본 작성 → 썸네일 → 메타데이터)을 상태 기반으로 자동 오케스트레이션하는 AI 에이전트. 'youtube-pd'라는 스킬 이름으로 공유됨.","category":"concept","aliases":["youtube-pd"]},{"id":"term-2","term":"커스텀 스타일","definition":"튜브워커에서 이미지 생성 시 인물 외형(동양인/서양인, 실사/애니 등)을 사용자가 직접 정의하는 기능. 기본 스타일(실사/시네마틱) 사용 시 외국인이 나올 수 있어 반드시 커스텀 스타일 생성 후 작업 권장.","category":"concept","aliases":[]},{"id":"term-3","term":"스토리보드","definition":"튜브워커에서 대본을 기반으로 장면별 이미지 시퀀스를 자동 생성하는 기능. 생성 시 크레딧이 차감되며, 확인 경고창에서 '확인'을 눌러야 차감됨.","category":"concept","aliases":[]},{"id":"term-4","term":"Whisk","definition":"구글에서 제공하는 이미지 생성 도구(labs.google/fx/tools/whisk). 쿠키 에디터를 통해 로그인 연동 후 사용 가능. 유명인 이미지에 민감한 제한이 있음.","category":"tool","aliases":["위스크"]},{"id":"term-5","term":"구글 AI 스튜디오","definition":"Google의 무료 AI 서비스. 영상 분석(레퍼런스 구조 파악, 말투 추출)에 강점이 있어 기획 단계에서 Claude Code보다 먼저 활용하면 토큰 절약과 효율 향상에 유리. Gemini API 접속 도구.","category":"tool","aliases":["Google AI Studio"]},{"id":"term-6","term":"Eleven V3","definition":"일레븐랩스의 최신 음성 생성 모델. 음성 품질과 발음이 우수하나 대본이 길어질 경우 음성 일관성이 깨질 수 있음. Multilingual v2 모델 대비 고품질.","category":"tool","aliases":["V3 모델"]},{"id":"term-7","term":"유튜브 파인더","definition":"벤치마킹할 유튜브 채널/영상을 검색·분석하는 도구. 3주차 정규강의에서 신버전 배포 예정으로 공지됨.","category":"tool","aliases":["YouTube Finder"]},{"id":"term-8","term":"겜스고","definition":"Claude MAX 등 유료 AI 서비스 구독을 저렴하게 이용할 수 있는 서비스. 채팅에서 이를 통한 할인 구독 가능 여부가 질문됨.","category":"tool","aliases":[]},{"id":"term-9","term":"깡통계정","definition":"유튜브 채널 다중 운영을 위해 만드는 빈 계정. 한 계정당 채널 수 제한이 있어 여러 개의 깡통계정을 만들어 다수 채널을 운영하는 전략으로 언급됨.","category":"community","aliases":[]},{"id":"term-10","term":"flux-schnell","definition":"이미지 생성 AI 모델. Whisk 대비 유명인 이미지 제한이 적어 대안으로 추천됨.","category":"tool","aliases":[]},{"id":"term-11","term":"FCPXML","definition":"Final Cut Pro XML의 약자. 프리미어 프로와 튜브워커 간 편집 데이터 연동을 위해 FCPXML 기반 연결이 가능한지 수강생이 문의함. 현재 미지원.","category":"concept","aliases":["Final Cut Pro XML"]},{"id":"term-12","term":"수창","definition":"유튜브 채널의 수익 창출 조건 달성(구독자 1,000명 + 시청 시간 4,000시간 등)을 뜻하는 커뮤니티 용어. '수창신'은 수익 창출에 성공한 사람을 높여 부르는 표현.","category":"community","aliases":["수창신","수익 창출"]}]},"2026-03-24":{"meta":{"date":"2026-03-24","dayOfWeek":"화요일","totalMessages":522,"totalAnswered":28,"activeHours":"오전 12:31~오후 11:26","mvpContributors":[{"nickname":"개발남 노씨(오토워커)","role":"강사","contributionCount":38},{"nickname":"구@기(쇼츠코인)","role":"일반","contributionCount":32},{"nickname":"이@헌(충사마)","role":"일반","contributionCount":28},{"nickname":"임@호(옥빛소리)","role":"일반","contributionCount":25},{"nickname":"조교 나물쓰","role":"조교","contributionCount":8},{"nickname":"비빔(조교)","role":"조교","contributionCount":6},{"nickname":"버터떡(조교)","role":"조교","contributionCount":4}]},"announcements":[{"id":"ann-1","content":"[1주차 프반 특강 공지] 화요일 19시~21시 줌 특강. 노씨 스킬 개선 과정 시연 + 수강생 스킬 공개 피드백. 원하는 분은 21시~24시 질문답변 연장 가능. 스킬 피드백 희망자는 사전 업로드 필요. https://forms.gle/8ZHuaetveHuKAdKN7","author":"개발남 노씨(오토워커)","time":"오전 12:41","priority":"high"},{"id":"ann-2","content":"튜브워커 사이트 재오픈 일정 변경: 수요일 오전 9시 → 목요일 저녁 7시. 사이트 화면 직관성 개선, 사용설명서 PDF, 따라하기 VOD 제작 예정. 1주차 과제 제출 불필요, 2주차 목요일 이후 새 과제 제공. 목요일까지 1주차 정규강의·스킬강의만 먼저 수강 권장. https://wiki.autoworkers.ai/1-32cc8b6667408004af2df97309e0d365","author":"개발남 노씨(오토워커)","time":"오후 1:09","priority":"high"},{"id":"ann-3","content":"카톡방 벽타기 정리본 업데이트: 3월 20일·21일자 질의응답 정리본 카페 게시. 나머지 일자도 순차 업로드 예정.","author":"비빔(조교)","time":"오후 5:16","priority":"medium"},{"id":"ann-4","content":"[3/24 화요일 프반 피드백 & AI 특강] 줌 링크: https://us06web.zoom.us/j/82115285088?pwd=9W7TEiKrcFAFsVjDbhrTRKAYbKRGFW.1 / 강의 녹화 후 프리미엄 전용 노션방 업로드 예정.","author":"개발남 노씨(오토워커)","time":"오후 6:55","priority":"high"},{"id":"ann-5","content":"추가 조교진 합류 공지: 시스템 완벽 숙지 전 단계이나 이번 주 내 1차 정리 완료 목표, 차주부터 원격지원 제공 예정.","author":"버터떡(조교)","time":"오후 8:21","priority":"medium"}],"topQA":[{"id":"qa-1","question":"프리미엄반 강의가 개발·바이브코딩 위주인가, 아니면 유튜브 수익화 실전 위주인가?","frequency":4,"answer":"1~2주차는 유튜브 자동화·수익화 실전(정보성 콘텐츠 포함) 집중. 3주차부터 바이브코딩 입문, 5주차에 n8n 예정대로 진행. 프반 특강(화요일)은 추가 보충 강의 성격.","answeredBy":"강사","tags":["커리큘럼","바이브코딩","수익화","n8n"]},{"id":"qa-2","question":"튜브워커 사이트가 접속이 안 된다 / 언제 다시 열리나?","frequency":5,"answer":"목요일 저녁 7시 정규강의와 함께 재오픈. 직관적 UI 개선·사용설명서 PDF·따라하기 VOD 준비 후 공개. 1주차 과제 제출 불필요.","answeredBy":"강사","tags":["튜브워커","점검","재오픈"]},{"id":"qa-3","question":"클로드 코드 실행 중 강제 중단하는 방법은?","frequency":2,"answer":"ESC 키를 누르면 즉시 중단 가능. 터미널 환경에서는 /btw XXX 명령 사용.","answeredBy":"강사","tags":["클로드코드","단축키","오류해결"]},{"id":"qa-4","question":"사무실 노트북에서 집 컴퓨터 터미널을 원격으로 사용하는 방법은?","frequency":1,"answer":"크롬 원격 데스크톱 사용 권장. 집 PC가 켜져 있으면 비밀번호만으로 원격 접속 가능하며 현장 승인 불필요.","answeredBy":"조교","tags":["원격접속","크롬 원격 데스크톱","터미널"]},{"id":"qa-5","question":"대본 글자수 오류를 사전에 방지하는 팁이 있나?","frequency":2,"answer":"글자수 대신 바이트 수로 요청(글자수 × 3배 = 바이트 수). 또는 클로드에게 글자수 카운트 후 재검수 반복 요청. Opus 모델 사용 시 준수율 높음.","answeredBy":"경험자","tags":["대본","글자수","프롬프트팁","클로드"]},{"id":"qa-6","question":"대본 생성 시 draft 병렬 작업 단계에서 Opus vs Sonnet 어느 모델을 써야 하나?","frequency":1,"answer":"핵심 에이전트(draft 포함)는 전부 Opus 권장. 팩트체크 단계는 Sonnet으로도 충분하나 강사 본인은 Opus로 통일.","answeredBy":"강사","tags":["Opus","Sonnet","대본","에이전트"]},{"id":"qa-7","question":"클로드와 제미나이를 연동해서 이미지 생성에 활용할 수 있나?","frequency":2,"answer":"Vertex AI API를 통해 Gemini 호출 가능. 구글 클라우드 신규 가입 시 300달러 크레딧 제공. 단, 구독 플랜과 API 과금은 별개이며, 브라우저 자동화를 통한 우회는 약관 위반으로 계정 삭제 위험.","answeredBy":"경험자","tags":["제미나이","Vertex AI","API","이미지생성"]},{"id":"qa-8","question":"강의 VOD 및 프리미엄반 노션 링크는 어디서 확인하나?","frequency":3,"answer":"강의 VOD 허브: https://wiki.autoworkers.ai/ / 프리미엄반 노션: https://hypnotic-concrete-dcf.notion.site/1-32dc8b666740805fae1df22c420b14eb","answeredBy":"강사","tags":["VOD","노션","강의링크"]}],"insights":[{"id":"ins-1","content":"클로드를 잘 쓰는 세 가지 핵심: ① '질문을 질문하라' — 목표를 먼저 던지고 클로드에게 단계별 방법을 되물어라. ② Context 관리 — 대화 맥락을 잘 유지해야 품질이 일정하다. ③ Workflow 설계 — 에이전트별 역할 분리와 병렬 실행이 시간·비용을 모두 줄인다.","author":"임@호(옥빛소리)","category":"도구추천"},{"id":"ins-2","content":"대본 글자수 준수율이 낮을 때는 글자수 대신 '바이트 수(글자수 × 3)'로 요청하면 정확도가 높아진다. Opus 모델 사용 시 준수율이 추가로 개선된다.","author":"이@훈(kokoro)","category":"문제해결"},{"id":"ins-3","content":"PDF·대용량 문서 분석 시 맥스 플랜이 아니면 토큰 소모가 극심하다. 구글 노트북LM(무료)을 전처리 단계로 활용해 핵심만 추출한 뒤 클로드에 투입하면 비용을 크게 절감할 수 있다.","author":"김@구(오슴오)","category":"수익화"},{"id":"ins-4","content":"클로드 2026년 업데이트에서 컴퓨터 직접 제어(앱 실행·브라우저 탐색·스프레드시트 작성) 기능이 공식 탑재됐다. 오픈클로 대비 성능 우위가 기대되므로 자동화 워크플로우 재설계 시점이다.","author":"구@기(쇼츠코인)","category":"도구추천"},{"id":"ins-5","content":"캡컷에 씨댄스(Sieverse) 2.0이 탑재됐다. 영상 제작 자동화 파이프라인에서 이미지→영상 변환 단계의 퀄리티 향상을 기대할 수 있다.","author":"최@원(리마인드)","category":"도구추천"},{"id":"ins-6","content":"스킬 개선 효과를 측정하는 실전 기준: 직접 결과물을 보고 판단한다. 평가 기준 자체도 클로드에게 물어보고, 시키고-판단하고-재시키는 반복 루프로 기준을 고도화한다.","author":"임@호(옥빛소리)","category":"전략"},{"id":"ins-7","content":"유튜브 채널 소개 영상(1분 내외)을 만들면 구글 채널 신뢰도 점수 향상에 도움이 된다. 스킬로 만들 필요 없이 단일 대본 작업으로 충분하며, 인트로는 초반보다 2~3분 뒤 훅 이후에 배치해야 이탈률이 낮아진다.","author":"변@원(돈방석)","category":"수익화"}],"links":[{"id":"link-1","url":"https://forms.gle/8ZHuaetveHuKAdKN7","title":"1주차 프반 특강 피드백 신청 폼","category":"reference","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-2","url":"https://wiki.autoworkers.ai/1-32cc8b6667408004af2df97309e0d365","title":"튜브워커 공지 — 사이트 점검 및 과제/챌린지 안내","category":"reference","sharedBy":"이@미(비브온)","status":"active"},{"id":"link-3","url":"https://wiki.autoworkers.ai/","title":"오토워커 강의 허브 (VOD·공지 통합)","category":"tutorial","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-4","url":"https://m.cafe.naver.com/ca-fe/web/cafes/dinohighclass/articles/219299","title":"nexlev 관련 카페 게시글 (유튜브 도구 비용 비교)","category":"reference","sharedBy":"조@욱(잼스)","status":"active"},{"id":"link-5","url":"https://www.nexlev.io/","title":"Nexlev — 유튜브 키워드 분석 도구","category":"tool","sharedBy":"조@욱(잼스)","status":"active"},{"id":"link-6","url":"https://youtu.be/zE-gV0doB9U","title":"클로드 원격제어 기능 소개 유튜브 영상","category":"tutorial","sharedBy":"이@헌(충사마)","status":"active"},{"id":"link-7","url":"https://us06web.zoom.us/j/82115285088?pwd=9W7TEiKrcFAFsVjDbhrTRKAYbKRGFW.1","title":"3/24 화요일 프반 피드백 & AI 특강 줌 링크","category":"zoom","sharedBy":"개발남 노씨(오토워커)","status":"expired"},{"id":"link-8","url":"https://hypnotic-concrete-dcf.notion.site/1-32dc8b666740805fae1df22c420b14eb","title":"프리미엄반 전용 노션 페이지","category":"reference","sharedBy":"개발남 노씨(오토워커)","status":"active"},{"id":"link-9","url":"https://cafe.naver.com/f-e/cafes/31687042/articles/450","title":"카톡방 벽타기 정리본 — 3월 20일자","category":"reference","sharedBy":"비빔(조교)","status":"active"},{"id":"link-10","url":"https://cafe.naver.com/f-e/cafes/31687042/articles/452","title":"카톡방 벽타기 정리본 — 3월 21일자","category":"reference","sharedBy":"비빔(조교)","status":"active"},{"id":"link-11","url":"https://x.com/capcutapp/status/2036202286809227635","title":"캡컷 씨댄스(Sieverse) 2.0 탑재 공식 트윗","category":"reference","sharedBy":"최@원(리마인드)","status":"active"}],"timeline":[{"time":"오전 12:31~오전 2:39","summary":"새벽 합류 인사 및 1주차 프반 특강 공지 발송. 강사가 오늘 저녁 특강 안내(줌 링크·구글 폼)와 함께 프반 커리큘럼 방향(수익화 위주)을 간략히 설명. 일부 수강생들이 바이브코딩 기대감·개발 진입 장벽에 대한 고민 공유.","topicTag":"공지"},{"time":"오전 11:20~오후 1:25","summary":"수강생들의 프반 방향성 우려 집중 분출. '개발·바이브코딩 비중이 너무 높은 것 아닌가' 질문에 강사가 반복 답변: 1~2주차는 유튜브 수익화 실전, 3주차 이후 바이브코딩, 5주차 n8n 순서. 튜브워커 점검 공지 공유 및 1주차 과제 제출 면제 안내.","topicTag":"공지"},{"time":"오후 1:25~오후 5:16","summary":"실무 Q&A 집중 시간대. 클로드 코드 강제 중단(ESC), 원격 데스크톱, 대본 글자수 오류 해결(바이트 수 활용), Opus vs Sonnet 모델 선택, 스킬 파일 관리 등 실전 운용 질문 활발. 조교 비빔이 벽타기 정리본(3/20·21일) 카페 업로드 안내.","topicTag":"질문"},{"time":"오후 5:30~오후 6:55","summary":"특강 직전 분위기 고조. 클로드 컴퓨터 제어 기능 업데이트 화제, 캡컷 씨댄스 2.0 탑재 정보 공유. 바이브코딩 더 심도 있게 배우고 싶다는 수강생 요청에 강사가 '5주 분량 무시무시하게 남았다'며 안심. 줌 특강 링크 최종 공유.","topicTag":"이벤트"},{"time":"오후 6:55~오후 9:00","summary":"줌 특강 병행 채팅방 활동. 초보 수강생들의 VSCode·클로드코드 세팅 오류 실시간 질문 폭증. 수강생 임@호(옥빛소리)가 클로드 활용 3대 원칙('질문을 질문하라·Context 관리·Workflow') 공유해 큰 호응. 프리미엄 노션 권한 미부여 문제 반복 접수.","topicTag":"학습"},{"time":"오후 9:00~오후 11:26","summary":"특강 사후 정리 및 추가 심화 논의. 수강생 이@헌(충사마)이 미스터비스트 시청 전략 MD 파일 자체 제작·공유. Vertex AI를 통한 Gemini API 연동 방법, API vs 구독 과금 구조 차이, 구글 클라우드 300달러 무료 크레딧 활용법 논의. 강사에게 실시간 화면 녹화 강의 방식 요청 접수.","topicTag":"학습"}],"glossary":[{"id":"term-1","term":"씨댄스","definition":"캡컷에 탑재된 AI 영상 생성 기능. 2.0 버전이 업데이트되어 이미지→영상 변환 퀄리티가 향상되었다고 채팅에서 언급됨.","category":"tool","aliases":["Sieverse","Sieverse 2.0","씨댄스 2.0"]},{"id":"term-2","term":"Nexlev","definition":"유튜브 키워드·조회수 분석 도구. 채팅에서 채널 분석·키워드 리서치에 활용하는 유료 서비스로 소개됨. 월 구독 비용 논의가 있었음.","category":"tool","aliases":["넥슬레브","nexlev"]},{"id":"term-3","term":"Vertex AI","definition":"구글 클라우드의 AI 플랫폼. 채팅에서는 Gemini API를 호출하기 위한 경로로 언급됨. 신규 가입 시 300달러 무료 크레딧이 제공된다는 정보 공유.","category":"tool","aliases":["버텍스","vertex"]},{"id":"term-4","term":"노트북LM","definition":"구글의 무료 PDF·문서 분석 도구. 채팅에서 대용량 문서를 전처리하여 핵심만 추출한 뒤 클로드에 투입하면 토큰 비용을 절감할 수 있다는 팁으로 언급됨.","category":"tool","aliases":["NotebookLM","노트북엘엠"]},{"id":"term-5","term":"크롬 원격 데스크톱","definition":"구글 크롬 브라우저 기반의 원격 접속 도구. 채팅에서 사무실 노트북으로 집 컴퓨터 터미널을 원격 제어하는 방법으로 추천됨.","category":"tool","aliases":["Chrome Remote Desktop","원격 데스크톱"]},{"id":"term-6","term":"바이트 수","definition":"대본 글자수 정확도를 높이기 위한 프롬프트 기법. 글자수 × 3배를 바이트 수로 환산하여 요청하면 클로드의 글자수 준수율이 개선된다는 팁으로 공유됨.","category":"concept","aliases":["byte count","바이트수"]},{"id":"term-7","term":"오픈클로","definition":"클로드의 경쟁 서비스(오픈소스 기반 AI). 채팅에서 클로드 컴퓨터 제어 기능 업데이트와 비교하며 성능 우위가 언급됨.","category":"tool","aliases":["OpenClaw"]},{"id":"term-8","term":"프반","definition":"프리미엄반의 줄임말. 채팅방에서 오토워커 프리미엄 수강반을 지칭할 때 사용하는 커뮤니티 용어.","category":"community","aliases":["프리미엄반"]},{"id":"term-9","term":"컨텍스트 관리","definition":"클로드 대화의 맥락을 유지·관리하는 기법. 채팅에서 클로드 활용 3대 원칙 중 하나로 소개됨. 맥락이 잘 유지돼야 출력 품질이 일정하다는 의미.","category":"concept","aliases":["Context 관리","컨텍스트"]},{"id":"term-10","term":"토큰","definition":"LLM(대규모 언어모델)의 입출력 소비 단위. 채팅에서는 클로드 사용 시 과금·제한량의 기준으로 빈번히 언급됨. 맥스 플랜이 아니면 토큰 소모가 극심하다는 논의가 있었음.","category":"concept","aliases":["token","토큰량"]},{"id":"term-11","term":"미스터비스트 MD","definition":"미스터비스트(MrBeast)의 시청자 유지 전략을 정리한 마크다운 파일. 수강생이 자체 제작하여 채팅방에 공유한 참고 자료. 스킬 프롬프트 폴더에 넣어 활용하는 방법이 논의됨.","category":"community","aliases":["미스터비스트 문서","MrBeast MD"]},{"id":"term-12","term":"워크플로우","definition":"에이전트별 역할 분리와 병렬 실행을 설계하는 자동화 작업 흐름. 채팅에서 클로드 활용 3대 원칙 중 하나로 소개되었으며, 시간과 비용을 모두 줄이는 핵심 개념으로 강조됨.","category":"concept","aliases":["Workflow","워크플로"]}]},"2026-03-25":{"meta":{"date":"2026-03-25","dayOfWeek":"수요일","totalMessages":1131,"totalAnswered":18,"activeHours":"오전 12:02~오후 10:51","mvpContributors":[{"nickname":"잼스","role":"일반","contributionCount":364},{"nickname":"미줌마파워","role":"일반","contributionCount":177},{"nickname":"옥빛소리","role":"일반","contributionCount":33},{"nickname":"쇼츠코인","role":"일반","contributionCount":33},{"nickname":"충사마","role":"일반","contributionCount":26},{"nickname":"개발남 노씨(오토워커)","role":"강사","contributionCount":21}]},"announcements":[{"id":"ann-1","content":"프리미엄반 전용 학습노트 노션 링크 공개. 이메일 취합 대신 우선 공개 배포하며, 사용설명서 VOD 제작이 우선 진행 예정.","author":"개발남 노씨(오토워커)","time":"오전 9:47","priority":"high"},{"id":"ann-2","content":"3월 25일 복지특강: '하루만에 마스터하는 캡컷' 오후 7시 라이브. 꿍디순디 강사 진행, 수강료 디하클 부담 무료 특강. VOD 제공 없음, 라이브로만 진행.","author":"김팀장","time":"오후 4:17","priority":"high"},{"id":"ann-3","content":"튜브워커 시스템 점검 중. 목요일 저녁 7시에 재오픈 예정이며 사용법 안내 예정.","author":"바글바글 / 충사마","time":"오후 12:57","priority":"medium"},{"id":"ann-4","content":"강의 링크 외부 공유 자제 요청. 허락 없이 공유 금지.","author":"주원(마케터 제이J)","time":"오후 5:23","priority":"high"},{"id":"ann-5","content":"정규강의 우선 수강 권고. 프리미엄반은 플러스알파이므로 기본(정규 라이브)만 제대로 하면 충분. 목요일 정규강의는 필수 참석.","author":"개발남 노씨(오토워커)","time":"오후 2:55","priority":"high"},{"id":"ann-6","content":"내일(목요일) 강의에서 경제, 심리학, 역사 위주 정보성 채널 스킬 공개 예정. 유튜브 URL만 주면 분석 후 대본 생성하는 파이썬 기반 클로드 스킬 배포 예정.","author":"개발남 노씨(오토워커)","time":"오전 10:20 / 오후 4:54","priority":"high"}],"topQA":[{"id":"qa-1","question":"유튜브 대본(자막) 추출은 어떻게 하나요? 벤치마킹 채널 분석 방법은?","frequency":12,"answer":"방법 1) grabbit 크롬 확장프로그램으로 자막 스크래핑. 방법 2) 유튜브 영상 URL을 NotebookLM에 넣어 자막 추출 요청. 방법 3) 잼스가 제작한 IVT_Pickup 도구로 채널 단위 일괄 대본 추출 가능. 방법 4) 바이브코딩으로 직접 도구 제작.","answeredBy":"경험자","tags":["대본추출","벤치마킹","grabbit","NotebookLM"]},{"id":"qa-2","question":"강의 진도를 못따라가서 초조하고 불안한데 어떻게 해야 하나요?","frequency":8,"answer":"정규 라이브 강의만 우선 수강하면 충분. 프리미엄반은 플러스알파이므로 기본만 제대로 하면 모든 것이 가능. 각자의 시간대와 페이스에 맞춰 진행하면 된다.","answeredBy":"강사","tags":["학습페이스","정규강의","멘탈관리"]},{"id":"qa-3","question":"유튜브 채널 카테고리(경제학 등) 경쟁이 치열한데 어떻게 차별화하나요?","frequency":7,"answer":"카테고리를 니치로 세분화하여 진입. 경제학이라면 금, 은, 주식, 거시경제 등으로 세분화. 뉴스 단순 스크래핑보다 고유한 결(톤)과 독자적 각도를 잡아야 한다. 롱폼 업로드 후 2주 정도 조회수 추이를 지켜볼 것.","answeredBy":"경험자","tags":["니치","카테고리","채널전략","롱폼"]},{"id":"qa-4","question":"VSCode에서 bypass permissions(권한 변경)이 안 되는데 어떻게 하나요?","frequency":4,"answer":"VSCode 확장프로그램 클로드코드 설치 후 설정 화면에서 바이패스 옵션 활성화. 가든 님이 작성한 PDF 가이드 참고.","answeredBy":"경험자","tags":["VSCode","클로드코드","bypass permissions"]},{"id":"qa-5","question":"유튜브 계정 분리와 애드센스 매칭은 어떻게 해야 하나요?","frequency":3,"answer":"기본 원칙은 1계정 1채널 1애드센스이며, 여러 가지 편법이 존재한다. 유랑 님의 유튜브 채널 영상 참고 권장.","answeredBy":"경험자","tags":["계정분리","애드센스","유튜브채널"]},{"id":"qa-6","question":"autoworkers-1st.zip과 autoworkers-1st-skill.zip은 동일한 파일인가요? 스킬 파일이 없어요.","frequency":3,"answer":"첫 번째 배포본은 채널명이 한국어로 되어 있어 오류가 발생하는 경우가 있었고, 두 번째 배포본은 영어로 변경된 버전. 큰 차이는 없으며, 다운로드 후 압축 해제하여 PC 클로드에서 폴더 경로 복사 후 설치 요청하면 된다.","answeredBy":"경험자","tags":["스킬파일","설치","윈도우"]},{"id":"qa-7","question":"클로드는 유튜브 영상 분석이 안 되는데, 제미나이처럼 링크만 넣으면 분석 가능하지 않나요?","frequency":2,"answer":"클로드는 유튜브 영상 직접 분석 불가. 제미나이는 구글 연동으로 가능하지만 클로드는 파이썬 코드를 이용해 더 정확하게 분석. 목요일 강의에서 URL만 주면 분석-대본 생성하는 스킬을 배울 예정.","answeredBy":"강사","tags":["클로드","제미나이","영상분석","파이썬"]},{"id":"qa-8","question":"클로드 메모리가 최신화했는데 계속 예전 내용을 사용합니다. 어떻게 해결하나요?","frequency":2,"answer":"에이전트와 스킬이 건너뛰며 이전 폼으로 결과물이 나오는 문제. 채팅에서 명확한 해결책은 제시되지 않았으나, 작업 지시를 강제하는 방법과 폼을 재구성하는 시도가 언급됨.","answeredBy":"채팅에서 명확한 답변 없음","tags":["클로드","메모리","에이전트","스킬"]},{"id":"qa-9","question":"구글 클라우드(버텍스AI) 무료 크레딧 $300은 어떻게 받나요?","frequency":2,"answer":"버텍스AI로 가입하면 구글 클라우드에서 90일간 $300 크레딧 제공. 버텍스에서 API를 받아 연결해야 크레딧으로 사용 가능하며, 구글AI스튜디오에서 연결하면 구글AI스튜디오 크레딧을 사용하게 됨.","answeredBy":"경험자","tags":["버텍스AI","구글클라우드","크레딧","API"]}],"insights":[{"id":"ins-1","content":"윈도우에서 클로드코드 팀메이트를 네이티브로 사용 가능한 psmux 도구 공유. psmux 설치 후 PowerShell에서 tmux 실행 -> claude --dangerously-skip-permissions 명령으로 클로드코드 구동. WSL 없이도 tmux 환경 구현 가능.","author":"잼스","category":"도구추천"},{"id":"ins-2","content":"벤치마킹 채널 분석 워크플로우: 벤치마킹 채널 선정 -> 대본 3~5개 스크래핑 -> 글의 특징/구조 분석 요청 -> 지침서(md파일)로 변환 -> 대본 생성. 이 과정이 유튜브 콘텐츠 제작의 기본이며 필수.","author":"잼스","category":"전략"},{"id":"ins-3","content":"MD 파일을 활용해 클로드에 작업 지시하면 토큰 절약 가능. 전체 페이지를 열면 그 자체가 토큰 소모이므로, 필요한 파일만 넣어서 효율적으로 사용할 것.","author":"충사마","category":"문제해결"},{"id":"ins-4","content":"유튜브 카테고리 세분화(니치) 전략 필수. 경제학 같은 큰 카테고리 대신 금/은/주식/거시경제 등으로 세분화하여 진입. 현재 유튜브 시장이 경쟁 심화 중이므로 정면돌파보다 우회 전략이 효과적.","author":"잼스","category":"전략"},{"id":"ins-5","content":"텔레그램으로 클로드 코드와 메시지 연결 가능. 작업 지시 후 완료 시 알림 수신, 이어서 다음 작업 지시하는 비동기 워크플로우 구축 가능.","author":"Miraflores","category":"도구추천"},{"id":"ins-6","content":"스킬과 에이전트의 관계 정리: 스킬은 작업 지시서, 에이전트는 파트별 담당 직원. md파일(지침서)이 대본을 변형시키는 역할이며, 서로 유기적으로 작동. 개발 지식 없어도 클로드코드가 알아서 처리해준다.","author":"잼스 / 눈치밥","category":"문제해결"},{"id":"ins-7","content":"클로드의 remote-control 기능으로 PC 클로드코드와 핸드폰 클로드 앱을 연결하면 별도 원격 프로그램 없이 작업 이어가기 가능.","author":"옥빛소리","category":"도구추천"},{"id":"ins-8","content":"해외 유튜브 시장 진출 고려. 일본, 독일 등 비영어권 타겟도 가능. 한국인 중 해외에서 조용히 성과 내는 크리에이터 다수 존재. 대본을 다국어로 변환할 수 있는 기술력이 강점.","author":"잼스","category":"전략"},{"id":"ins-9","content":"해외구매대행 자동화: 바이브코딩으로 기본 틀 제작 후 n8n으로 정기 자동검색 구현 가능. 웹페이지 제작, 로그인, 결제(페이팔) 기능 포함.","author":"쇼츠코인","category":"수익화"}],"links":[{"id":"link-1","url":"https://github.com/psmux/psmux","title":"psmux - 윈도우에서 tmux 실행 가능하게 해주는 도구","category":"tool","sharedBy":"잼스","status":"active"},{"id":"link-2
