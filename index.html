1733813023?pwd=zVIPKWmBa3xMQSdEb4YWIozdvjAY4a.1","title":"캡컷 특강 Zoom 링크 (공유 후 경고받아 삭제됨)","category":"zoom","sharedBy":"충사마","status":"expired"}],"timeline":[{"time":"오전 12:02~오전 1:00","summary":"전일 강의 마무리 인사 및 psmux/클로드코드 윈도우 tmux 설정, 버텍스AI $300 크레딧 정보 공유, 맥 vs 윈도우 개발환경 토론","topicTag":"학습"},{"time":"오전 2:06~오전 4:15","summary":"새벽반 활성화. 잼스 주도로 벤치마킹 대본추출 도구(IVT_Pickup) 공유, grabbit/NotebookLM 활용법 안내, 스킬/에이전트/md파일 개념 설명, 유튜브 카테고리 니치 탐색 도구 링크 공유","topicTag":"학습"},{"time":"오전 9:13~오전 10:44","summary":"아침 활동 시작. VSCode bypass permissions 해결 가이드(PDF) 공유 후 강사 감사 표시. 계정분리/애드센스 매칭 Q&A, 정보성 채널 스킬 예고(경제/심리학/역사)","topicTag":"질문"},{"time":"오후 12:05~오후 2:57","summary":"동기부여 글 공유(Personal TIME ZONE). 프리미엄반 카톡 정리 사이트 공개(충사마). 프리미엄반 노션 학습노트 공개(강사). 튜브워커 점검 안내. 학습 불안감 해소 조언(강사)","topicTag":"공지"},{"time":"오후 4:10~오후 5:53","summary":"캡컷 복지특강 공지(오후7시). 클로드 vs 제미나이 유튜브 분석 능력 비교 및 파이썬 기반 스킬 예고. 텔레그램-클로드코드 연결, 해외구매대행 자동화 논의. 강의 링크 외부 공유 금지 경고","topicTag":"학습"},{"time":"오후 7:24~오후 8:18","summary":"캡컷 특강 진행 중. 충사마 Zoom 링크 공유 후 경고받아 삭제. 프리미엄반 학습노트 및 벽타기 정리 사이트 재안내. 노션 Q&A 잘림 현상 제보","topicTag":"이벤트"},{"time":"오후 9:46~오후 10:51","summary":"유튜브 시장 경쟁 심화 논의. 카테고리 니치 세분화 전략, 시댄스2.0 실사급 영상 기술, Drawing Art 니치 사례 공유. 롱폼 조회수 2주 대기론, 해외(일본/독일) 시장 진출 제안","topicTag":"학습"}],"glossary":[{"id":"term-1","term":"psmux","definition":"윈도우 환경에서 tmux를 네이티브로 실행할 수 있게 해주는 도구. WSL 없이도 PowerShell에서 tmux 명령으로 클로드코드 팀메이트를 구동할 수 있음.","category":"tool","aliases":[]},{"id":"term-2","term":"tmux","definition":"터미널 멀티플렉서. 채팅에서는 클로드코드를 실행할 때 세션을 유지하거나 PC-모바일 간 작업 연속성을 위해 사용하는 도구로 언급됨.","category":"tool","aliases":[]},{"id":"term-3","term":"바이패스 퍼미션","definition":"VSCode 클로드코드 확장프로그램의 설정 옵션. 활성화하면 클로드가 파일 접근 등 권한 제한 없이 작업 가능. 많은 수강생이 설정에 어려움을 겪음.","category":"concept","aliases":["bypass permissions","바이패스"]},{"id":"term-4","term":"벤치마킹","definition":"유튜브 채널 운영 전략으로, 성공한 채널의 대본/구조/스타일을 분석하여 자신의 콘텐츠에 반영하는 과정. 대본 3~5개를 스크래핑하여 분석하는 것이 기본.","category":"concept","aliases":["벤치"]},{"id":"term-5","term":"니치","definition":"유튜브 카테고리의 세분화된 하위 분야. 예를 들어 '경제학'이라는 큰 카테고리 대신 '거시경제', '금/은 투자' 등 좁은 분야를 타겟팅하는 전략.","category":"concept","aliases":["niche"]},{"id":"term-6","term":"스킬","definition":"클로드코드에서 특정 작업을 수행하기 위한 지시서(md파일). 채팅에서는 '작업 지시서'로 비유되며, 대본 생성/스타일링 등의 자동화 워크플로우를 정의함.","category":"concept","aliases":["skill"]},{"id":"term-7","term":"에이전트","definition":"클로드코드에서 스킬을 실행하는 파트별 담당 역할. 채팅에서는 '파트별 직원'으로 비유됨. 스킬(지시서)에 따라 동작하며 서로 유기적으로 연결됨.","category":"concept","aliases":["agent"]},{"id":"term-8","term":"grabbit","definition":"유튜브 영상의 자막(대본)을 스크래핑할 수 있는 크롬 확장프로그램. 벤치마킹 채널 분석 시 대본 추출 도구로 사용됨.","category":"tool","aliases":[]},{"id":"term-9","term":"NotebookLM","definition":"구글의 AI 노트북 서비스. 유튜브 영상 URL을 넣으면 자막을 추출하고 분석할 수 있는 도구로 채팅에서 언급됨.","category":"tool","aliases":["노트북LM","notebook lm"]},{"id":"term-10","term":"버텍스AI","definition":"구글 클라우드의 AI 플랫폼. 신규 가입 시 90일간 $300 크레딧 제공. 여기서 API를 받아 클로드에 연결하면 크레딧으로 사용 가능.","category":"tool","aliases":["Vertex AI","구아스"]},{"id":"term-11","term":"오픈클로","definition":"클로드의 브라우저 자동 클릭/조작 기능의 하위 호환 버전으로 언급됨. 원조는 클로드이며, 오픈클로가 클로드의 기능을 따라 만든 것이라는 설명.","category":"tool","aliases":[]},{"id":"term-12","term":"바이브코딩","definition":"AI에게 자연어로 지시하여 코드를 생성하는 방식. 채팅에서는 클로드 Max 구독으로 도구 제작(유튜브 스크래퍼, 구매대행 자동화 등)에 활용하는 방법으로 언급됨.","category":"concept","aliases":["vibe coding"]},{"id":"term-13","term":"n8n","definition":"워크플로우 자동화 도구. 바이브코딩으로 기본 틀을 만든 후 n8n으로 정기 자동검색 등 자동화를 구현하는 방식으로 언급됨.","category":"tool","aliases":[]},{"id":"term-14","term":"새벽반","definition":"디하클 오토워커 채팅방에서 자정~새벽 시간대에 활발하게 활동하는 수강생 그룹을 지칭하는 커뮤니티 표현.","category":"community","aliases":[]},{"id":"term-15","term":"시댄스 2.0","definition":"실사급 AI 영상 생성 기술. 2D 애니메이션에 4D를 입히는 방식으로 언급되며, 프리픽(Freepik)에서 출시된 것으로 추정. 해외에서 먼저 공개됨.","category":"tool","aliases":["Cydance 2.0"]}]},"2026-03-26":{"meta":{"date":"2026-03-26","dayOfWeek":"목요일","totalMessages":180,"totalAnswered":9,"activeHours":"오전 12:23~오후 11:47","mvpContributors":[{"nickname":"이@헌(충사마)","role":"일반","contributionCount":14},{"nickname":"조교 나물쓰","role":"조교","contributionCount":6},{"nickname":"[조교] 대국밥","role":"조교","contributionCount":5},{"nickname":"이@연(미줌마파워)","role":"일반","contributionCount":13},{"nickname":"박@규(꽐라부엉이)","role":"일반","contributionCount":10}]},"announcements":[{"id":"ann-1","content":"오토워커1기 정규2강 줌 세션 안내. 회의 ID: 883 6734 5606, 암호: 575506","author":"크리스(디하클스태프)","time":"오후 6:51","priority":"high"},{"id":"ann-2","content":"2주차 정규강의 수업자료 모음이 업데이트되었으니 참고 바람. 네이버 카페 링크 공유. 장르: 경제·역사·심리학·과학·건강·직접입력 5+α","author":"이@헌(충사마)","time":"오후 6:47","priority":"high"},{"id":"ann-3","content":"튜브워커 점검 중. 오늘 19시(오후 7시)까지 점검 예정.","author":"이@훈(kokoro)","time":"오후 1:34","priority":"medium"},{"id":"ann-4","content":"채팅 다이제스트 안내 페이지는 공개 홈으로, 강의별 다이제스트는 직접 전달받은 전용 링크로만 접속 가능. 루트 주소에서는 강의별 정리 내용 미노출.","author":"시스템(사이트 안내문)","time":"오전 12:23","priority":"medium"}],"topQA":[{"id":"qa-1","question":"튜브워커 접속이 안 되는데 링크가 바뀐 건가요?","frequency":3,"answer":"오늘 오후 7시까지 점검 중. 약 5일간 점검이 진행 중이었음.","answeredBy":"경험자","tags":["튜브워커","점검"]},{"id":"qa-2","question":"유료 강의 스크립트(자막·텍스트)를 얻는 방법이 있나요?","frequency":2,"answer":"유료 강의는 Vimeo에서 다운로드 및 자막 추출을 차단함. 강사는 직접 동영상 음원을 추출한 뒤 네이버 클로바(mp3→txt)로 변환하는 방식을 사용했으나, 현재 유료 강의에는 적용 불가.","answeredBy":"강사","tags":["강의스크립트","클로바","Vimeo"]},{"id":"qa-3","question":"VSCode에서 탐색기 트리(폴더 구조)가 안 보여요.","frequency":2,"answer":"왼쪽 상단 '파일' 클릭 후 '폴더 열기'로 해당 폴더를 선택하면 됨.","answeredBy":"조교","tags":["VSCode","폴더트리","스킬설치"]},{"id":"qa-4","question":"text.md 파일이 다운로드가 안 되거나 이상한 화면(외계어)이 뜨는데요?","frequency":1,"answer":"봄동(조교)이 테스트 파일(TalkFile_test.md.md, test.md) 공유. 충사마가 올린 파일 참고하도록 안내.","answeredBy":"조교","tags":["text.md","파일다운로드"]},{"id":"qa-5","question":"줌 강의 다시 보기가 가능한가요?","frequency":1,"answer":"채팅에서 명확한 답변 없음. 정규강의 VOD는 다음날 12시에 올라온다는 언급 있음.","answeredBy":"조교","tags":["줌","다시보기","VOD"]},{"id":"qa-6","question":"크레딧 초기 세팅 금액이 얼마인가요?","frequency":1,"answer":"초기 1,000원으로 추정됨. 충사마는 600원, 해뚱은 890원 확인(100원 지급 후 11원 사용→89원, 이후 890원으로 리셋된 사례 공유).","answeredBy":"경험자","tags":["크레딧","API비용"]},{"id":"qa-7","question":"화요일 프리미엄 강의 노션 스킬 개선 자료 링크가 있나요?","frequency":1,"answer":"있다고 확인됨(주억남이 \"아 있네여\"라고 응답)했으나 구체적 링크는 채팅에 게시되지 않음.","answeredBy":"경험자","tags":["노션","스킬","수업자료"]},{"id":"qa-8","question":"유튜브 파인더는 어디서 볼 수 있나요?","frequency":1,"answer":"공지 게시판 12번 게시물 참고.","answeredBy":"경험자","tags":["유튜브파인더","공지게시판"]},{"id":"qa-9","question":"스킬 폴더·제목을 영어로 바꾸면 나중에 헷갈리지 않을까요?","frequency":1,"answer":"채팅에서 명확한 답변 없음.","answeredBy":"채팅에서 명확한 답변 없음","tags":["스킬","폴더명","영어"]}],"insights":[{"id":"ins-1","content":"충사마(이@헌)가 클로드 코드를 활용해 3/25일자 벽타기 요약 다이제스트를 제작·공유함. 초보자에게도 유익하도록 용어 섹션을 별도로 구성. 클로드 코드를 이용한 커뮤니티 기여 방식의 모범 사례.","author":"이@헌(충사마)","category":"도구추천"},{"id":"ins-2","content":"임@현(4000)이 클로드 코드를 이용해 전날 저녁부터 새벽까지 네이버 블로그 자동 프로그램을 완성함. 클로드가 직접 네이버 화면을 열어 작업을 수행했다고 언급. 완벽하진 않지만 가능성 확인.","author":"임@현(4000)","category":"수익화"},{"id":"ins-3","content":"네이버 블로그 자동 업로드는 이미지·업로드 완전 자동화가 어렵다는 경험담 공유(자유로운귀). 과거 쿠팡파트너스 블로그 자동화 도구는 네이버 감지로 계정정지 사례 다수 발생했다는 주의사항도 언급(아는아이).","author":"서@연(자유로운귀)","category":"문제해결"},{"id":"ins-4","content":"바이브코딩의 부상으로 워드프레스 대신 직접 홈페이지 도메인을 구매하는 방식이 대세로 전환 중이라는 트렌드 인사이트 공유. 기술적 장벽이 낮아지면서 수익화 전략도 변화 중임.","author":"조@욱(잼스)","category":"전략"},{"id":"ins-5","content":"클로드 프로(Pro) 사용 시 토큰 한도에 자주 걸리는 문제로 인해 Max 200 플랜 업그레이드를 권장. 미줌마파워는 여러 강의에서 거의 모든 작업을 클로드로 전환 후 체감 품질이 크게 향상됐다고 언급.","author":"이@연(미줌마파워)","category":"도구추천"},{"id":"ins-6","content":"강의 스크립트 추출: 강사 노씨는 동영상 음원을 추출한 뒤 네이버 클로바(mp3→txt)로 텍스트화하는 방법을 사용했으나, 현재 유료 강의(Vimeo)에는 적용 불가. 직접 요약 정리하는 대안을 권장.","author":"개발남 노씨(오토워커)","category":"문제해결"},{"id":"ins-7","content":"스킬 설치 시 오토워커 스크립트(2주차 분)만 바탕화면에 꺼내어 해당 폴더만 VSCode에서 열면 됨. 1st 폴더 전체를 풀면 시간과 토큰 낭비가 발생한다는 실전 팁 공유.","author":"이@헌(충사마)","category":"문제해결"}],"links":[{"id":"link-1","url":"https://flich0600-source.github.io/autoworker-premium-digest/","title":"3/25일자 오토워커 프리미엄반 벽타기 요약 다이제스트 (충사마 제작)","category":"reference","sharedBy":"이@헌(충사마)","status":"ok"},{"id":"link-2","url":"https://krroki.github.io/autoworker-digest/g/097205129dede3fd.html","title":"오토워커 공식 채팅 다이제스트 (전용 링크)","category":"reference","sharedBy":"조교 나물쓰","status":"ok"},{"id":"link-3","url":"https://cafe.naver.com/f-e/cafes/31687042/articles/464?boardtype=L&menuid=8&referrerAllArticles=false","title":"오토워커 1기 2주차 정규강의 수업자료 (네이버 카페)","category":"reference","sharedBy":"이@헌(충사마)","status":"ok"},{"id":"link-4","url":"https://cafe.naver.com/autoworker1/464","title":"2주차 정규강의 수업자료 모음 (네이버 카페 단축 URL)","category":"reference","sharedBy":"개발남 노씨(오토워커)","status":"ok"},{"id":"link-5","url":"https://goddaehee.tistory.com/370","title":"VSCode 관련 트러블슈팅 참고 블로그 (대국밥 조교 추천)","category":"tutorial","sharedBy":"박@기(폴리스톤)","status":"unknown"}],"timeline":[{"time":"오전 12:23","summary":"채팅 다이제스트 안내 페이지 접근 오류 문의 및 새벽반 수강자들의 늦은 밤 학습·잡담","topicTag":"질문"},{"time":"오전 7:31","summary":"충사마가 3/25일자 벽타기 요약 다이제스트 GitHub 링크 공유","topicTag":"공지"},{"time":"오전 9:53","summary":"클로드 코드를 이용한 네이버 블로그 자동화 프로그램 제작 성공 공유 및 바이브코딩 트렌드 토론","topicTag":"학습"},{"time":"오후 1:33","summary":"튜브워커 점검 문의 집중 (오후 7시까지 점검 예정 안내)","topicTag":"질문"},{"time":"오후 3:29","summary":"text.md 파일 다운로드 오류 문의 및 조교의 테스트 파일 공유","topicTag":"질문"},{"time":"오후 6:47","summary":"정규2강 수업자료 공유 및 줌 세션 링크 공지. 새 스킬 공개 예고.","topicTag":"공지"},{"time":"오후 8:36","summary":"VSCode 탐색기 트리 미표시 문의 및 조교 지원. 크레딧 초기 세팅 금액 문의.","topicTag":"질문"}],"glossary":[{"id":"term-1","term":"튜브워커","definition":"오토워커 강의에서 활용하는 유튜브 영상 관련 자동화 프로그램. 채팅에서 약 5일간 점검이 진행 중이었으며, 점검 중에는 접속 및 영상 제작 불가.","category":"tool","aliases":["TubeWorker","튜튜브워커"]},{"id":"term-2","term":"벽타기","definition":"채팅방 내에서 위로 쌓인 대화 내역을 스크롤하며 읽어 올라가는 행위. 전날 쌓인 대화를 정리한 요약본을 '벽타기 요약'이라고 지칭함.","category":"community","aliases":["벽타기 요약","벽타기 정리"]},{"id":"term-3","term":"바이브코딩","definition":"채팅에서 AI를 활용하여 코드 작성 및 서비스 구축을 수행하는 방식. 기술적 장벽을 낮춰 도메인 기반 홈페이지 직접 제작 등이 가능해진 트렌드로 언급됨.","category":"concept","aliases":["vibe coding"]},{"id":"term-4","term":"클로드 코드","definition":"Anthropic의 Claude AI를 터미널·VSCode 환경에서 코드 작성·실행·자동화에 활용하는 방식. 채팅에서 네이버 블로그 자동화, 다이제스트 사이트 제작 등 다양한 실습에 사용됨.","category":"tool","aliases":["클코","Claude Code"]},{"id":"term-5","term":"네이버 클로바","definition":"네이버에서 제공하는 AI 음성인식 서비스. 채팅에서는 mp3 파일을 txt(텍스트)로 변환하는 용도로 언급됨. 강사가 강의 음원을 스크립트화할 때 사용한 방법.","category":"tool","aliases":["CLOVA","클로바"]},{"id":"term-6","term":"Vimeo","definition":"유료 강의 동영상을 호스팅하는 플랫폼. 외부 유출 방지를 위해 다운로드 및 자막 추출이 차단되어 있어, 유료 강의 스크립트 추출이 불가함.","category":"tool","aliases":["비메오"]},{"id":"term-7","term":"스킬","definition":"오토워커 강의에서 제공하는 Claude Code용 사전 제작 프롬프트·설정 파일 묶음. VSCode에서 해당 폴더를 열어 설치·적용하는 방식으로 사용함.","category":"concept","aliases":["skill"]},{"id":"term-8","term":"유사클로드","definition":"실제 Claude가 아닌 것으로 착각하고 사용한 클로드 유사 서비스를 지칭하는 표현. 임@현(4000)이 강의 수강 후 자신이 작업에 사용한 도구가 실제 Claude가 아님을 인지했다고 언급.","category":"community","aliases":[]},{"id":"term-9","term":"VOD","definition":"정규 강의를 실시간으로 수강하지 못한 수강생을 위해 사후 제공되는 녹화 강의 영상. 채팅에서는 당일 정규강의 VOD가 다음날 12시에 업로드된다고 언급됨.","category":"concept","aliases":["다시보기","녹화강의"]},{"id":"term-10","term":"크레딧","definition":"오토워커 수강생에게 제공되는 AI 도구 사용 포인트. 초기 약 1,000원 상당이 지급되며, 사용 내역을 클릭하면 차감 이력을 확인할 수 있음.","category":"community","aliases":["API 크레딧"]},{"id":"term-11","term":"유튜브 파인더","definition":"유튜브 관련 데이터를 조회하거나 수집하는 도구로 추정. 채팅에서 공지 게시판 12번 게시물에서 확인 가능하다고 안내됨.","category":"tool","aliases":["YouTube Finder"]},{"id":"term-12","term":"프반","definition":"프리미엄반의 줄임말. 오토워커 1기 중 프리미엄 수강생이 참여하는 별도 강의·채팅방을 지칭.","category":"community","aliases":["프리미엄반"]}]},"2026-03-27":{"meta":{"date":"2026-03-27","dayOfWeek":"금요일","totalMessages":438,"totalAnswered":18,"activeHours":"오전 12:14~오후 11:49","mvpContributors":[{"nickname":"조교 나물쓰","role":"조교","contributionCount":38},{"nickname":"구@기(쇼츠코인)","role":"경험자","contributionCount":30},{"nickname":"비빔(조교)","role":"조교","contributionCount":12},{"nickname":"정@수(아는아이)","role":"경험자","contributionCount":15},{"nickname":"이@헌(충사마)","role":"경험자","contributionCount":25}]},"dailySummary":{"headline":"튜브워커 로그인 오류 폭주","keyPoints":["튜브워커 비밀번호 오류 다수 발생, 복붙 공백 주의","2주차 스킬 폴더명 한글→영문 변경 안내","크레딧 충전 구글폼 결제 시스템 안내","클로드 API 529 과부하 오류 오후 지속","조교진 1:1 원격지원 채널 운영 시작"],"sentiment":"활발","topicCount":9},"announcements":[{"id":"ann-1","content":"오토워커 정규강의 2주차 카페에 업로드 완료","author":"이@헌(충사마)","time":"오전 11:48","priority":"high"},{"id":"ann-2","content":"튜브워커 비밀번호 오류 다발 — 복붙 시 공백 포함 주의, 직접 입력 권장. 이전 비밀번호 변경 여부 확인 필요","author":"비빔(조교)","time":"오전 10:17","priority":"high"},{"id":"ann-3","content":"크레딧 충전 결제 시스템 구현 중. 즉시 충전 희망 시 구글폼 작성, 오전 9시~밤 12시 매시 정각 순차 지급","author":"정@수(아는아이)","time":"오후 2:20","priority":"high"},{"id":"ann-4","content":"2주차 스킬 폴더명이 클로드코드에서 인식 안 되는 문제 — 폴더명을 '2주차스킬' 등 다른 이름으로 변경 필요. 구글드라이브에 수정본 업로드 완료","author":"조교 나물쓰","time":"오후 4:35","priority":"high"},{"id":"ann-5","content":"VSCode/프로그램 관련 오류 1:1 원격지원 채널 오픈 (입장코드 1313, 10명 제한)","author":"버터떡(조교)","time":"오후 11:34","priority":"medium"},{"id":"ann-6","content":"3/26일 프리미엄반 벽타기 정리본 공유 — 기존 양식과 다른 새 형식","author":"이@헌(충사마)","time":"오후 2:12","priority":"low"}],"topQA":[{"id":"qa-1","question":"튜브워커 아이디/비밀번호를 입력해도 로그인이 안 되는데 어떻게 하나요?","frequency":8,"answer":"복붙 시 공백이 포함될 수 있으므로 직접 입력 권장. 이전에 비밀번호를 변경한 경우 변경된 비밀번호 입력. 그래도 안 되면 조교에게 초기화 요청.","answeredBy":"조교","tags":["튜브워커","로그인","비밀번호"]},{"id":"qa-2","question":"캡컷 프로젝트 다운로드 후 압축이 풀리지 않거나 빈 파일이 나옵니다","frequency":5,"answer":"윈도우 기본 프로그램은 파일명이 길면 압축해제 실패할 수 있음. 7-Zip 설치 후 시도 권장. 파일명을 영문 짧은 이름으로 변경 후 시도.","answeredBy":"경험자","tags":["캡컷","압축","7-Zip"]},{"id":"qa-3","question":"Whisk 쿠키를 넣었는데 이미지 생성이 안 되고 원위치로 돌아갑니다","frequency":4,"answer":"쿠키는 labs.google/fx/ko/tools/whisk 에서 생성해야 함. Cookie Editor 확장프로그램(검은 초코칩 쿠키 아이콘)에서 Export > Header String 선택하여 붙여넣기. API 키와 쿠키는 별개 개념.","answeredBy":"조교","tags":["쿠키","Whisk","이미지생성"]},{"id":"qa-4","question":"클로드코드에서 VS Code 입력창이 안 나오거나 오류가 납니다","frequency":3,"answer":"2주차 스킬 폴더명에 한글/특수기호가 있으면 인식 오류 발생. 폴더명을 '2주차스킬' 등 영문/숫자로 변경. 폴더 경로에 한글이 없는지 확인.","answeredBy":"조교","tags":["클로드코드","VS Code","폴더명"]},{"id":"qa-5","question":"클로드 API 529 오류가 계속 발생합니다","frequency":4,"answer":"Error 529는 Claude API 서버 과부하(overloaded_error) 상태. 트래픽이 몰려 요청 처리 불가. 잠시 기다렸다가 재시도 필요.","answeredBy":"경험자","tags":["클로드","API오류","529"]},{"id":"qa-6","question":"튜브워커에 API 키를 입력해야 하나요?","frequency":2,"answer":"일레븐랩스 등 개인적으로 사용하는 것이 없으면 넣지 않아도 됨. 영상 강의를 먼저 시청한 후 작업 권장.","answeredBy":"경험자","tags":["튜브워커","API키","일레븐랩스"]},{"id":"qa-7","question":"크레딧이 부족하다고 나오는데 충전은 어떻게 하나요?","frequency":2,"answer":"현재 PG사 연동 검토 중. 즉시 충전 희망 시 구글폼 작성하면 오전 9시~밤 12시 매시 정각에 순차 지급. 결제 2회 시 폼도 2번 작성.","answeredBy":"조교","tags":["크레딧","충전","결제"]},{"id":"qa-8","question":"캡컷에서 미디어 분실 오류가 나며 일부 파일만 못 찾습니다","frequency":2,"answer":"해당 구간에 영상을 수동으로 교체하여 해결 가능. 조교가 추후 공식 해결방법 안내 예정.","answeredBy":"경험자","tags":["캡컷","미디어분실","영상교체"]},{"id":"qa-9","question":"1주차 숙제(과제)는 어디서 확인하나요?","frequency":2,"answer":"공지톡방에 숙제 완료 릴레이 안내가 있음. 구글폼 작성 후 사담방 숙제릴레이에 기재. 채널에 영상 업로드하는 것까지가 과제.","answeredBy":"경험자","tags":["숙제","과제","릴레이"]}],"insights":[{"id":"ins-1","content":"클로드 모델 선택 시 소넷이 기본 설정될 수 있으므로, 작업 전 반드시 오퍼스(Opus) 모델로 설정되어 있는지 확인 필요. 눈으로 확인이 안 되어 당연히 오퍼스라고 생각했다가 소넷으로 작업하는 실수 발생.","author":"박@미(마리맘)","category":"문제해결"},{"id":"ins-2","content":"유튜브 채널 성장을 위해 롱폼만 올리기보다 숏폼(쇼츠)도 함께 올려 알고리즘에 노출 빈도를 높이는 전략 제안. 단, 경제 분야는 쇼츠 단가가 낮아 롱폼 중심 권장.","author":"이@헌(충사마)","category":"전략"},{"id":"ins-3","content":"일레븐랩스 V3는 감정이 풍부하나 2000자 이상이면 이음새가 튀므로 2000자 단위로 분할 권장. V2는 발음이 어눌함. 글자 수는 22~23 설정이 적정.","author":"이@헌(충사마)","category":"도구추천"},{"id":"ins-4","content":"1주차와 2주차 스킬 폴더를 비교 분석하면 차이점을 파악할 수 있음. 유튜브.md(제목/상세내용/해시태그) 파일이 2주차에 없으므로 클로드에게 추가 요청하면 생성 가능.","author":"구@기(쇼츠코인)","category":"도구추천"},{"id":"ins-5","content":"영상 첫 3개까지는 썸네일을 하나만 만들어서 올려보는 것이 중요. AB테스트는 그 이후에 진행. 우선 올리는 것 자체가 핵심.","author":"정@수(아는아이)","category":"전략"},{"id":"ins-6","content":"강의 영상을 충분히 시청하지 않고 바로 작업하면 크레딧만 소진됨. 크레딧은 복구 불가이므로 반드시 영상을 먼저 보고 작업할 것.","author":"구@기(쇼츠코인)","category":"문제해결"},{"id":"ins-7","content":"맥-윈도우 간 파일명 글자 깨짐 호환 문제로 클로드코드 오류가 발생할 수 있음. 파일명을 영문으로 수정하면 해결되는 사례 확인.","author":"김@도(능인)","category":"문제해결"}],"links":[{"id":"link-1","url":"https://tube.autoworkers.ai/","title":"튜브워커 접속 링크 (리뉴얼 후 새 주소)","category":"tool","sharedBy":"비빔(조교)","status":"ok"},{"id":"link-2","ur :00","summary":"쿠키 추출 방법 안내 및 Cookie Editor 확장프로그램 혼동 해결","topicTag":"학습"},{"time":"오전 11:48","summary":"2주차 정규강의 카페 업로드 안내, 캡컷 미디어분실 트러블슈팅","topicTag":"공지"},{"time":"오후 12:30","summary":"유튜브 채널 운영 전략 논의 (롱폼/쇼츠, 썸네일, 알고리즘), 벽타기 정리 업데이트","topicTag":"학습"},{"time":"오후 2:20","summary":"크레딧 충전 안내, VS Code 설치 오류 원격지원 시작","topicTag":"공지"},{"time":"오후 4:35","summary":"2주차 스킬 폴더명 변경 안내 (한글→영문), 구글드라이브 수정본 업로드","topicTag":"공지"},{"time":"오후 5:48","summary":"클로드 API 529 과부하 오류 발생, 다수 수강생 작업 중단","topicTag":"질문"},{"time":"오후 8:30","summary":"캡컷 압축파일 오류 트러블슈팅(7-Zip 권장), 조교 원격지원 진행","topicTag":"질문"},{"time":"오후 11:34","summary":"버터떡 조교 1:1 원격지원 채널 오픈, 숙제 안내 및 하루 마무리","topicTag":"공지"}],"glossary":[{"id":"term-1","term":"튜브워커","definition":"오토워커에서 제공하는 영상 자동 생성 플랫폼. 대본 입력부터 이미지 생성, 캡컷 프로젝트 출력까지 자동화. 리뉴얼 후 tube.autoworkers.ai 주소 사용.","category":"tool","aliases":["튜브워크","큐브워커"]},{"id":"term-2","term":"캡컷","definition":"영상 편집 프로그램. 튜브워커에서 생성된 프로젝트 파일(.zip)을 가져와 편집하는 용도로 사용. 드래프트 폴더에서 프로젝트를 관리.","category":"tool","aliases":["CapCut"]},{"id":"term-3","term":"Whisk","definition":"Google에서 제공하는 AI 이미지 생성 도구. 튜브워커에서 이미지 생성 시 이 사이트의 쿠키를 추출하여 사용해야 함.","category":"tool","aliases":["위스크"]},{"id":"term-4","term":"Cookie Editor","definition":"크롬 확장프로그램. Whisk 쿠키를 추출할 때 사용. 검은 초코칩 쿠키 모양 아이콘이 올바른 버전이며, 유사 확장프로그램과 혼동 주의.","category":"tool","aliases":["쿠키에디터"]},{"id":"term-5","term":"Header String","definition":"Cookie Editor에서 쿠키를 추출할 때 선택하는 Export 형식. 이 형식으로 복사한 값을 튜브워커 이미지 생성에 붙여넣기.","category":"concept","aliases":["헤드스트링"]},{"id":"term-6","term":"오퍼스","definition":"Claude AI의 최상위 모델(Opus). 튜브워커 스킬 실행 시 반드시 오퍼스 모델로 설정해야 정상 동작. 소넷으로 잘못 설정되는 경우 주의.","category":"tool","aliases":["Opus","오푸스"]},{"id":"term-7","term":"529 오류","definition":"Claude API 서버 과부하 상태(overloaded_error). 트래픽이 몰려 요청 처리 불가 시 발생. 시간을 두고 재시도 필요.","category":"concept","aliases":["Error 529","overloaded_error"]},{"id":"term-8","term":"크레딧","definition":"튜브워커에서 영상/이미지 생성 시 소진되는 사용권. 복구 불가이므로 강의를 먼저 시청 후 작업 권장. 구글폼으로 유료 충전 가능.","category":"concept","aliases":["크렛딧"]},{"id":"term-9","term":"일레븐랩스","definition":"AI 음성 생성(TTS) 서비스. V3는 감정 풍부하나 2000자 이상이면 이음새가 튀고, V2는 발음이 어눌함. 글자 수 22~23 설정 권장.","category":"tool","aliases":["ElevenLabs"]},{"id":"term-10","term":"벽타기","definition":"오픈채팅방에서 이전 대화를 위로 스크롤하며 읽는 행위. '벽타기 정리'는 놓친 대화의 핵심을 요약해 제공하는 서비스.","category":"community","aliases":[]},{"id":"term-11","term":"7-Zip","definition":"무료 압축/해제 프로그램. 윈도우 기본 압축 프로그램으로 캡컷 프로젝트 파일이 열리지 않을 때 대안으로 사용.","category":"tool","aliases":["7zip"]},{"id":"term-12","term":"클로드코드","definition":"VS Code에서 Claude AI를 활용하여 코드 및 스킬을 실행하는 환경. 폴더명에 한글/특수기호가 있으면 인식 오류 발생 가능.","category":"tool","aliases":["Claude Code"]},{"id":"term-13","term":"수창","definition":"유튜브 채널 수익 창출의 줄임말. 수익 창출 조건을 충족하여 광고 수익을 받을 수 있는 상태.","category":"community","aliases":["수익창출"]}]},"2026-03-28":{"meta":{"date":"2026-03-28","dayOfWeek":"토요일","totalMessages":103,"totalAnswered":8,"activeHours":"오전 12:02~오전 8:54","mvpContributors":[{"nickname":"임@호(옥빛소리)","role":"일반","contributionCount":32},{"nickname":"김@광/레라빠","role":"일반","contributionCount":20},{"nickname":"레몬버터 조교","role":"조교","contributionCount":6}]},"dailySummary":{"headline":"Claude 한도 & 서버 점검","keyPoints":["오전 6:45~6:55 서버 업데이트 공지","Claude Pro vs Max 사용량 한도 비교 논의","Claude 2배 이벤트 적용 시간대 정보 공유","자막 싱크·커스텀 음성 TTS 경험 공유"],"sentiment":"보통","topicCount":7},"announcements":[{"id":"ann-1","content":"오전 6:45~6:55 서버 업데이트 실시. 밤샘 작업자는 잠시 대기 요청. 6:56에 완료 공지.","author":"레몬버터 조교","time":"오전 6:40","priority":"high"}],"topQA":[{"id":"qa-1","question":"Claude Pro로 대본 1개도 완성 못 하는 건 정상인가?","frequency":3,"answer":"Pro 사용량으로는 긴 대본 생성이 어려움. Max($100)는 Pro의 5배 용량이며, 10분 영상 대본 기준 약 30% 소모. 대본 작업에는 Max 권장.","answeredBy":"경험자","tags":["Claude","대본생성","사용량"]},{"id":"qa-2","question":"Claude 사용량 초기화 시간은 언제인가?","frequency":2,"answer":"가입 시간이 아니라, 초기화 후 첫 대화를 시작한 시점부터 시간이 흘러감.","answeredBy":"경험자","tags":["Claude","초기화","한도"]},{"id":"qa-3","question":"오토워커에서 이전에 만든 커스텀 스타일 삭제 가능한가?","frequency":1,"answer":"스타일 만든 것의 오른쪽 상단에 이미지와 겹쳐진 빨간색 X 표시로 삭제 가능. 커스텀 스타일은 4개까지 제한.","answeredBy":"경험자","tags":["오토워커","커스텀스타일"]},{"id":"qa-4","question":"튜브워커에서 작업 중 컴퓨터 끄면 진행 상황 저장되나?","frequency":1,"answer":"조교 답변으로는 진행 가능하다고 안내했으나, 다른 참여자는 클로드 사용 시 컴퓨터 끄면 안 된다고 의견 제시. 테스트 권장.","answeredBy":"조교","tags":["튜브워커","작업저장"]},{"id":"qa-5","question":"본문 이미지를 영상으로 변환 시 자막 싱크가 잘 맞는가?","frequency":1,"answer":"아주 살짝 자막이 늦을 수 있으나 크게 차이나지 않음. 20분 기준 2번 정도 어긋남 발생. 커스텀 음성 사용 권장, 2000자 초과 시 음성 변화 주의.","answeredBy":"경험자","tags":["자막싱크","TTS","커스텀음성"]},{"id":"qa-6","question":"크레딧 충전 시 해외 수강생은 페이팔 결제 가능한가?","frequency":1,"answer":"채팅에서 명확한 답변 없음","answeredBy":"경험자","tags":["크레딧","결제","페이팔"]}],"insights":[{"id":"ins-1","content":"Claude Max($100)는 Pro의 5배 용량. 10분 영상 대본 기준 약 30% 소모. Pro로는 긴 대본 1개 생성도 어려우므로 대본 작업에는 Max 전환 권장.","author":"임@호(옥빛소리)","category":"도구추천"},{"id":"ins-2","content":"Claude 사용량 2배 이벤트는 미국 피크타임 외 시간에 적용. 한국 시간 기준 금요일 밤 9시~12시는 1배(미국 피크타임). Pro 사용자는 2배 이벤트 시간대에 작업하면 효율적.","author":"임@호(옥빛소리)","category":"전략"},{"id":"ins-3","content":"커스텀 음성 사용 권장. TTS에서 2000자 넘어가면 음성이 달라질 수 있으므로 주의. 20분 영상 기준 자막 어긋남 2회 정도 발생하나 심하지 않음.","author":"윤@수(브리 노마드)","category":"문제해결"},{"id":"ins-4","content":"Claude 대화 context를 유지하려면 껐다 켜지 말고 켜둔 상태로 유지하는 것이 좋음. 껐다 켜면 context가 날아감.","author":"임@호(옥빛소리)","category":"문제해결"}],"links":[],"timeline":[{"time":"오전 12:02","summary":"오토워커 커스텀 스타일 삭제 문의로 새벽 대화 시작","topicTag":"질문"},{"time":"오전 12:10","summary":"Claude Pro 사용량 한도 문제 및 Max 전환 논의 집중","topicTag":"질문"},{"time":"오전 12:20","summary":"Claude 2배 이벤트 적용 시간대 정보 공유 및 토론","topicTag":"학습"},{"time":"오전 12:34","summary":"AI 스타일 추출기, 자막 싱크, 커스텀 음성 관련 질의응답","topicTag":"질문"},{"time":"오전 6:40","summary":"조교 서버 업데이트 공지 (6:45~6:55), 6:56 완료","topicTag":"공지"},{"time":"오전 6:56","summary":"튜브워커 작업 저장 문의 및 크레딧 결제 관련 질문","topicTag":"질문"},{"time":"오전 8:54","summary":"프리미엄방이 질문방화 되었다는 소감으로 새벽 대화 마무리","topicTag":"일상"}],"glossary":[{"id":"term-1","term":"커스텀 스타일","definition":"오토워커에서 사용자가 직접 만드는 영상 스타일. 최대 4개까지 생성 가능하며, 오른쪽 상단 빨간 X로 삭제.","category":"tool","aliases":[]},{"id":"term-2","term":"Claude Max","definition":"Claude 유료 요금제 중 상위 플랜($100/월). Pro의 5배 사용량 제공. 대본 생성 등 고용량 작업에 적합.","category":"tool","aliases":["맥스","Max"]},{"id":"term-3","term":"2배 이벤트","definition":"Claude에서 미국 피크타임 외 시간대에 사용량 한도를 2배로 제공하는 이벤트. 한국 시간 기준 금요일 밤 9시~12시는 제외(1배).","category":"concept","aliases":["2배사용량 이벤트"]},{"id":"term-4","term":"커스텀 음성","definition":"TTS(텍스트 음성 변환)에서 기본 음성 대신 사용자가 설정한 음성. 2000자 초과 시 음성 톤이 변할 수 있음.","category":"tool","aliases":[]},{"id":"term-5","term":"스토리보드","definition":"영상 제작 시 각 장면의 이미지·자막 등을 미리 구성하는 단계. 튜브워커에서 스타일 적용 후 생성.","category":"concept","aliases":[]},{"id":"term-6","term":"AI 스타일 추출기","definition":"참고 영상의 스타일을 AI로 분석·추출하는 도구. 채팅에서 보유 여부를 묻는 질문으로 언급됨.","category":"tool","aliases":[]},{"id":"term-7","term":"일레븐랩스","definition":"AI 음성 합성(TTS) 서비스. 채팅에서 TTS 중간에 신음 같은 짧은 소리가 섞이는 버그가 보고됨.","category":"tool","aliases":["ElevenLabs"]},{"id":"term-8","term":"context","definition":"Claude 대화에서 이전 대화 내용(맥락). 브라우저를 껐다 켜면 날아가므로 켜둔 상태 유지 권장.","category":"concept","aliases":["컨텍스트"]}]},"2026-03-30":{"meta":{"date":"2026-03-30","dayOfWeek":"월요일","totalMessages":98,"totalAnswered":7,"activeHours":"18:51~23:57","mvpContributors":[{"nickname":"구@기(쇼츠코인)","role":"일반","contributionCount":19},{"nickname":"김@광/레라빠","role":"일반","contributionCount":17},{"nickname":"정@수(아는아이)","role":"일반","contributionCount":9},{"nickname":"조교 나물쓰","role":"조교","contributionCount":6},{"nickname":"개발남 노씨(오토워커)","role":"강사","contributionCount":6}]},"dailySummary":{"headline":"2주차 추가 특강 안내","keyPoints":["대본 퀄리티 개선은 방향성부터 잡고 클로드와 상의","그록 영상 생성 시 창 여러 개 병렬작업 가능","튜브워커 동시작업은 아직 미지원","위스크(Whisk) 한글 렌더링 불가","3/31 화요일 추가 프리미엄 특강 진행 안내"],"sentiment":"조용","topicCount":7},"announcements":[{"id":"ann-1","content":"2주차 프리미엄 추가 특강 안내 — 3/31(화) 19:00~21:00 영상 제작 전 과정 라이브 시연(스킬 보완, 벤치마킹, 대본, 튜브워커, 업로드, 썸네일 A/B 테스트, 채널 설정) + 21:00~24:00 QnA. 필수 참석 아님, 원하는 분만 참여.","author":"개발남 노씨(오토워커)","time":"오후 10:56","priority":"medium"}],"topQA":[{"id":"qa-1","question":"클로드로 대본 하나 뽑는 데 시간이 얼마나 걸리나요?","frequency":2,"answer":"레퍼런스 4~5개를 넣고 채널 2개로 병렬작업을 요청하면 효율적이다. 대본은 2개씩, 스타일은 다르게 뽑는 방식을 권장.","answeredBy":"경험자","tags":["클로드","대본","작업시간"]},{"id":"qa-2","question":"대본 퀄리티를 높이고 싶은데 어디서부터 수정해야 하나요?","frequency":1,"answer":"퀄리티가 낮다고 느끼는 구체적 부분(문맥, 흐름, 이탈방지, 후킹 등)을 먼저 파악한 뒤, 개선 방향을 클로드와 함께 논의하며 작업하는 것을 권장.","answeredBy":"조교","tags":["대본","퀄리티","개선"]},{"id":"qa-3","question":"그록에서 영상 만들 때 창 5개씩 켜놓고 하나씩 작업하는 게 맞나요?","frequency":1,"answer":"맞다. 컴퓨터 성능에 따라 10개 창도 가능하며, 하나 돌리고 뒤로 가기 후 다시 넣는 방식으로 동시 작업이 가능하다.","answeredBy":"경험자","tags":["그록","영상생성","병렬작업"]},{"id":"qa-4","question":"튜브워커에서 여러 작업을 동시에 진행할 수 있나요?","frequency":2,"answer":"현재 튜브워커는 동시작업이 지원되지 않는다. 하나 작동 중이면 다른 작업은 불가하며, 추후 풀어줄 예정이라고 안내됨.","answeredBy":"경험자","tags":["튜브워커","동시작업","제한"]},{"id":"qa-5","question":"위스크(Whisk)로 이미지 만들면 한글이 깨지는 건가요?","frequency":1,"answer":"위스크는 한글 렌더링을 지원하지 않으므로 한글 텍스트를 최대한 배제해야 한다.","answeredBy":"경험자","tags":["위스크","Whisk","한글","이미지"]},{"id":"qa-6","question":"맥미니 중고 구입 관련 추천이나 정보가 있나요?","frequency":1,"answer":"용도(영상 제작용 또는 오픈클로 같은 도구 상시 구동용)에 따라 선택 기준이 달라진다는 반응이 있었으나, 구체적 추천까지는 이어지지 않음.","answeredBy":"경험자","tags":["맥미니","하드웨어","구매"]},{"id":"qa-7","question":"VS Code를 컴퓨터 2대에서 연동할 수 있나요?","frequency":1,"answer":"가능은 하지만 설정이 조금 복잡하다.","answeredBy":"조교","tags":["VS Code","연동","멀티PC"]}],"insights":[{"id":"ins-1","content":"대본을 많이 뽑고 싶다면 레퍼런스 4~5개를 한꺼번에 분석시키되, 채널 2개 병렬작업으로 스타일이 다른 대본 2개를 동시에 받는 방식이 효율적이다.","author":"구@기(쇼츠코인)","category":"전략"},{"id":"ins-2","content":"대본 퀄리티 개선은 막연히 시작하지 말고, 문맥/흐름/이탈방지/후킹 등 구체적 개선 포인트 1~2개를 먼저 잡은 뒤 클로드와 대화하며 수정하는 것이 효과적이다.","author":"조교 나물쓰","category":"전략"},{"id":"ins-3","content":"그록에서 영상 생성 시 하나 돌리고 뒤로 가기를 누른 뒤 다음 작업을 넣으면 동시에 여러 영상이 진행된다. 화면을 나가도 생성은 계속된다.","author":"정@수(아는아이)","category":"도구추천"},{"id":"ins-4","content":"하루 3시간에 3개 업로드, 3~5개 채널 운영으로 채널당 월 200~300만 원, 전체 월 1천만 원을 목표로 하는 자동화 비전을 제시하며 오토워커 수강 동기를 공유.","author":"김@민(글로리)","category":"수익화"}],"links":[],"timeline":[{"time":"오후 6:51","summary":"클로드 대본 작성 소요 시간 및 퀄리티 개선 방법 논의","topicTag":"질문"},{"time":"오후 7:28","summary":"레퍼런스 병렬 대본 작업 팁 및 조회수·구독자 현황 공유","topicTag":"학습"},{"time":"오후 7:39","summary":"그록 영상 생성 시 창 여러 개 동시 작업 방법 논의","topicTag":"질문"},{"time":"오후 8:10","summary":"맥미니 중고 구매 관련 질문 및 용도 확인","topicTag":"질문"},{"time":"오후 8:34","summary":"튜브워커 동시작업 가능 여부 논의 — 현재 미지원 확인","topicTag":"질문"},{"time":"오후 10:47","summary":"영상 노출 부진 토로 및 에이전트 추가 사용법 재질문","topicTag":"일상"},{"time":"오후 10:55","summary":"오토워커 수강 비전 및 자동화 목표 공유","topicTag":"일상"},{"time":"오후 10:56","summary":"2주차 프리미엄 추가 특강(3/31) 안내 공지","topicTag":"공지"},{"time":"오후 11:11","summary":"위스크(Whisk) 한글 미지원 이슈 확인","topicTag":"질문"},{"time":"오후 11:30","summary":"숙제 제출 후 대본 작업 및 VS Code 연동 질문","topicTag":"질문"}],"glossary":[{"id":"term-1","term":"클로드","definition":"Anthropic사의 AI 대화 모델. 채팅방에서는 대본 작성 및 콘텐츠 기획 도구로 주로 활용됨.","category":"tool","aliases":["Claude"]},{"id":"term-2","term":"그록","definition":"AI 기반 영상 생성 플랫폼. 이미지를 업로드하면 영상으로 변환해주며, 창을 여러 개 열어 병렬 작업이 가능함.","category":"tool","aliases":["Grok"]},{"id":"term-3","term":"튜브워커","definition":"오토워커 강의에서 제공하는 유튜브 자동화 도구. 이미지 생성 등 기능을 제공하며, 현재 동시작업은 미지원 상태.","category":"tool","aliases":["TubeWorker"]},{"id":"term-4","term":"위스크","definition":"Google의 AI 이미지 생성 도구. 한글 텍스트 렌더링은 지원하지 않아 영문 위주로 사용해야 함.","category":"tool","aliases":["Whisk"]},{"id":"term-5","term":"레퍼런스","definition":"대본 작성 시 참고하는 기존 영상이나 콘텐츠. 4~5개를 한꺼번에 넣어 분석시키는 방식이 권장됨.","category":"concept","aliases":["레퍼"]},{"id":"term-6","term":"벤치마킹","definition":"성공한 유튜브 채널이나 영상을 분석하여 자신의 콘텐츠 전략에 반영하는 과정.","category":"concept","aliases":[]},{"id":"term-7","term":"썸네일 A/B 테스트","definition":"두 가지 이상의 썸네일을 동시에 테스트하여 클릭률이 높은 것을 선별하는 방법.","category":"concept","aliases":[]},{"id":"term-8","term":"스킬","definition":"오토워커 강의에서 사용하는 자동화 설정 파일 또는 프롬프트 세트. 설치·보완 과정을 거쳐 활용함.","category":"community","aliases":[]},{"id":"term-9","term":"오픈클로","definition":"오픈소스 기반 Claude 유사 서비스를 로컬에서 구동하는 방식. 맥미니 등 상시 구동 장비에서 활용 가능.","category":"tool","aliases":[]},{"id":"term-10","term":"프리미엄 특강","definition":"오토워커 프리미엄 수강생 대상 추가 라이브 강의. 영상 제작 전 과정 시연 및 QnA로 구성됨.","category":"community","aliases":["프반 강의"]},{"id":"term-11","term":"벽타기","definition":"카카오톡 오픈채팅방에서 이전 대화 내용을 위로 스크롤하며 읽는 행위.","category":"community","aliases":[]}]},"2026-03-31":{"meta":{"date":"2026-03-31","dayOfWeek":"화요일","totalMessages":160,"totalAnswered":10,"activeHours":"00:03~14:49","mvpContributors":[{"nickname":"조교 나물쓰","role":"조교","contributionCount":30},{"nickname":"개발남 노씨(오토워커)","role":"강사","contributionCount":4},{"nickname":"비빔(조교)","role":"조교","contributionCount":3},{"nickname":"정@수(아는아이)","role":"일반","contributionCount":5},{"nickname":"구@기(쇼츠코인)","role":"일반","contributionCount":7}]},"dailySummary":{"headline":"첫 영상 성과 공유 및 구독 문의","keyPoints":["첫 영상 노출 1만건 돌파 성과 공유 및 축하","Claude Pro→Max 업그레이드 후 VS Code 미반영 해결","스토리보드 중복 생성 방지 UI 개선 건의","반디집 설치로 캡컷 자막·음성 오류 해결","프리미엄 강의 일정 혼동 안내 (추가 강의)"],"sentiment":"보통","topicCount":9},"announcements":[{"id":"ann-1","content":"오늘 프리미엄 강의는 원래 없는 날이지만 추가로 진행합니다. 커리큘럼을 보고 필요하면 참여하시면 됩니다.","author":"개발남 노씨(오토워커)","time":"오후 1:49","priority":"medium"},{"id":"ann-2","content":"메인은 목요일 정규강의이며, 못 보신 분은 나머지 강의를 VOD로 차근차근 보시길 추천합니다.","author":"개발남 노씨(오토워커)","time":"오후 1:56","priority":"high"}],"topQA":[{"id":"qa-1","question":"스토리보드 생성 버튼을 두 번 눌러 중복 생성되는 실수를 방지할 수 있나요?","frequency":2,"answer":"한 번 생성 후 버튼이 '재생성'으로 변경되도록 UI 개선을 건의하겠습니다.","answeredBy":"조교","tags":["스토리보드","UI개선","튜브워커"]},{"id":"qa-2","question":"Claude Pro에서 Max로 업그레이드했는데 VS Code에서 여전히 Pro로 표시됩니다.","frequency":1,"answer":"VS Code 클로드 대화창에서 /logout → /login으로 재접속하면 Max로 인식됩니다. 기존 대화는 새 창에서 재로그인해도 유지됩니다.","answeredBy":"조교","tags":["클로드","Max업그레이드","VSCode"]},{"id":"qa-3","question":"커스텀 이미지 스타일을 만드는 것은 무제한인가요? 토큰이 소모되나요?","frequency":1,"answer":"해당 질문에 대한 직접적인 답변은 이 대화에서 제공되지 않았습니다.","answeredBy":"조교","tags":["커스텀스타일","이미지생성","토큰"]},{"id":"qa-4","question":"오늘 프리미엄 강의가 있나요? 강의 일정이 헷갈립니다.","frequency":3,"answer":"원래 오늘 프리미엄 강의는 없는 날이지만 추가로 진행합니다. 매주 화요일 고정이 아니며, 메인은 목요일 정규강의입니다.","answeredBy":"강사","tags":["프리미엄강의","일정","VOD"]},{"id":"qa-5","question":"프리미엄 강의도 VOD로 제공되나요?","frequency":1,"answer":"모든 강의는 VOD로 제공됩니다.","answeredBy":"경험자","tags":["VOD","강의","프리미엄"]},{"id":"qa-6","question":"안티그래비티에서 스킬 만들어서 대본 작성하면 품질이 많이 떨어지나요?","frequency":1,"answer":"크게 떨어지지 않습니다. 안티그래비티에도 Opus가 있으니 결과가 조금 다를 수는 있지만 충분히 활용 가능합니다.","answeredBy":"조교","tags":["안티그래비티","대본","클로드","Opus"]},{"id":"qa-7","question":"튜브워커 아이디/비밀번호가 안 오는데 어떻게 하나요?","frequency":1,"answer":"구글폼 작성 여부를 확인하고, 카페 닉네임을 알려주시면 확인해드립니다. 카톡방 프로필 이름도 변경 부탁드립니다.","answeredBy":"조교","tags":["튜브워커","계정","로그인"]},{"id":"qa-8","question":"첫 영상 노출 7600에 클릭률 5.8%이면 저조한 건가요?","frequency":1,"answer":"해당 질문에 대한 직접적인 답변은 이 대화에서 제공되지 않았습니다.","answeredBy":"경험자","tags":["유튜브","클릭률","노출","성과"]},{"id":"qa-9","question":"튜브워커 작업 중간에 컴퓨터를 꺼도 작업이 유지되나요?","frequency":1,"answer":"튜브워커는 서버에 저장되어 괜찮습니다. 다만 클코 대본 작업 중에는 끄지 마세요.","answeredBy":"경험자","tags":["튜브워커","서버저장","클코"]},{"id":"qa-10","question":"OpenAI에서 나온 코덱스(Codex)를 사용해보셨나요? 클로드와 비교하면 어떤가요?","frequency":1,"answer":"해당 질문에 대한 직접적인 답변은 이 대화에서 제공되지 않았습니다.","answeredBy":"강사","tags":["OpenAI","Codex","클로드","비교"]}],"insights":[{"id":"ins-1","content":"롱폼 영상은 하루 뒤, 1주일 뒤, 심지어 한 달 뒤에도 노출이 오를 수 있으므로 길게 보고 꾸준히 운영해야 합니다.","author":"정@수(아는아이)","category":"전략"},{"id":"ins-2","content":"윈도우 기본 압축 프로그램 대신 반디집을 사용하면 캡컷 자막 생성 및 음성 길이 오류가 해결됩니다. 파일명 길이 문제나 확장자 미지원 이슈를 방지할 수 있습니다.","author":"윤@호(치우킴)","category":"문제해결"},{"id":"ins-3","content":"안티그래비티에도 Opus 모델이 있어 클로드 토큰 부담 시 대체 활용이 가능합니다. 품질이 크게 떨어지지 않습니다.","author":"조교 나물쓰","category":"도구추천"},{"id":"ins-4","content":"VS Code, 데스크탑 앱, 웹 모두 같은 클로드 계정을 공유하며, 요금제도 동일하게 적용됩니다. 업그레이드 미반영 시 /logout → /login으로 재접속하면 됩니다.","author":"구@기(쇼츠코인)","category":"문제해결"}],"links":[],"timeline":[{"time":"오전 12:03","summary":"스토리보드 중복 생성 실수 공유 및 UI 개선 건의","topicTag":"질문"},{"time":"오전 1:54","summary":"클로드 대본 작업 중 아웃풋 이동 오류로 원격 지원 요청","topicTag":"질문"},{"time":"오전 2:10","summary":"마스코트·배경 커스텀 스타일 일관성 유지 방법 질문","topicTag":"질문"},{"time":"오전 9:16","summary":"첫 롱폼 영상 노출 1만 돌파 성과 공유 및 축하","topicTag":"일상"},{"time":"오전 9:59","summary":"또 다른 수강생 첫 영상 업로드 성과 공유","topicTag":"일상"},{"time":"오전 10:07","summary":"첫 영상 노출 7600·클릭률 5.8% 성과 및 저조 여부 질문","topicTag":"질문"},{"time":"오전 10:17","summary":"프리미엄 강의 VOD 제공 여부 및 수강 일정 문의","topicTag":"질문"},{"time":"오후 1:46","summary":"오늘 프리미엄 강의 유무 혼동, 강사가 추가 강의 진행 안내","topicTag":"공지"},{"time":"오후 2:11","summary":"OpenAI Codex 사용 경험 및 클로드 비교 질문","topicTag":"질문"},{"time":"오후 2:15","summary":"Claude Pro→Max 업그레이드 후 VS Code 미반영 문제 해결 논의","topicTag":"질문"},{"time":"오후 2:34","summary":"안티그래비티 대본 품질 문의 및 조교 답변","topicTag":"질문"},{"time":"오후 2:41","summary":"튜브워커 아이디·비번 미수신 문제 → 조교가 확인 절차 안내","topicTag":"질문"},{"time":"오후 2:47","summary":"반디집 설치로 캡컷 자막·음성 오류 해결 사례 공유","topicTag":"학습"}],"glossary":[{"id":"term-1","term":"스토리보드","definition":"튜브워커에서 영상 제작 시 장면별 구성을 생성하는 기능. 버튼 중복 클릭 시 이중 생성되는 이슈가 보고됨.","category":"tool","aliases":[]},{"id":"term-2","term":"튜브워커","definition":"유튜브 영상 자동 제작 플랫폼. 대본, 스토리보드, 영상 생성까지 자동화하며 서버에 작업이 저장됨.","category":"tool","aliases":["투브워커","유브워커"]},{"id":"term-3","term":"클로드 Max","definition":"Anthropic Claude의 최상위 구독 요금제. Pro에서 업그레이드 시 VS Code 반영이 지연될 수 있으며, /logout → /login으로 해결 가능.","category":"tool","aliases":["맥스","Claude Max"]},{"id":"term-4","term":"클로드코드","definition":"VS Code 터미널에서 Claude AI를 활용하여 코딩·자동화 작업을 수행하는 방식. 대본 작업 시에는 컴퓨터를 끄지 말 것이 권장됨.","category":"tool","aliases":["클코"]},{"id":"term-5","term":"안티그래비티","definition":"AI 기반 콘텐츠 생성 플랫폼. Opus 모델을 지원하며 클로드 토큰 부담 시 대본 작성 대안으로 활용 가능.","category":"tool","aliases":["antigravity","안티그래버티"]},{"id":"term-6","term":"캡컷","definition":"영상 편집 도구. 윈도우 기본 압축 프로그램으로 풀면 자막 생성·음성 길이 오류가 발생할 수 있으며, 반디집 사용으로 해결됨.","category":"tool","aliases":["CapCut"]},{"id":"term-7","term":"반디집","definition":"파일 압축·해제 프로그램. 윈도우 기본 압축 대신 사용하면 캡컷 관련 파일 오류가 해결됨.","category":"tool","aliases":["Bandizip"]},{"id":"term-8","term":"커스텀 스타일","definition":"AI 이미지 생성 시 원하는 그림체를 사전 설정하여 일관된 스타일을 유지하는 기능.","category":"concept","aliases":["커스텀이미지스타일"]},{"id":"term-9","term":"Codex","definition":"OpenAI에서 출시한 AI 코딩 도구. 채팅방에서 클로드와의 비교 질문이 제기됨.","category":"tool","aliases":["코덱스","OpenAI Codex"]},{"id":"term-10","term":"롱폼","definition":"긴 형식의 유튜브 영상. 숏폼과 달리 노출이 하루~한 달에 걸쳐 점진적으로 상승할 수 있음.","category":"concept","aliases":[]},{"id":"term-11","term":"그록","definition":"xAI의 AI 서비스. 이미지 생성 기능이 있으며 무료 사용 가능 여부에 대한 질문이 제기됨.","category":"tool","aliases":["Grok"]},{"id":"term-12","term":"Opus","definition":"Anthropic Claude의 최상위 모델. 안티그래비티에서도 Opus를 지원하여 높은 품질의 결과물 생성이 가능.","category":"concept","aliases":["오퍼스"]}]}};
window.__faqData__=[{"id":"faq-1","question":"클로드 Pro vs Max 요금제 — 어떤 플랜을 써야 하고, 사용량 한도는 어떻게 관리하나요?","totalFrequency":38,"category":"비용/결제","answer":"Pro는 Opus 사용 시 5시간 롤링 한도와 1주일 한도가 있어 스킬 1~2개 만들면 금방 소진됩니다. Max x5($100)는 Pro의 5배 용량으로 10분 영상 대본 기준 약 30% 소모합니다. Max x20은 동시 4개 이상 작업 시 해당됩니다. 낮은 플랜으로 시작 후 사용량 파악 뒤 차액만 내고 업그레이드 가능합니다. 연습 단계에서는 Sonnet으로 절약하고, 실제 제작에서만 Opus를 투입하는 혼용 전략이 효과적입니다. Pro에서 Max로 업그레이드 후 VS Code에서 미반영 시 /logout → /login으로 재접속하면 됩니다.","solution":"1. 처음에는 Pro($20)로 시작하여 사용 패턴 파악\n2. 대본 작업량이 많으면 Max x5($100)로 업그레이드 (차액만 결제)\n3. 연습·수정은 Sonnet, 핵심 작업만 Opus 사용\n4. /status 명령어로 사용량 수시 확인\n5. 미국 피크타임 외(한국 시간 새벽~오후) 2배 이벤트 시간대 활용\n6. Gemini AI 스튜디오(무료)로 기획 초별 작업 후 클로드에 투입하면 토큰 절감\n7. Pro→Max 업그레이드 후 VS Code 미반영 시 /logout → /login 재접속","answeredBy":["강사","조교","경험자"],"appearedDates":["2026-03-18","2026-03-20","2026-03-21","2026-03-22","2026-03-28","2026-03-30","2026-03-31"],"tags":["클로드","요금제","Pro","Max","Opus","Sonnet","토큰","사용량","VS Code"]},{"id":"faq-2","question":"튜브워커 접속/로그인이 안 되거나 프로그램을 수령하지 못했는데 어떻게 하나요?","totalFrequency":36,"category":"기술문제","answer":"튜브워커는 여러 차례 서버 점검과 주소 변경이 있었습니다. 최신 접속 주소는 tube.autoworkers.ai이며, 비밀번호 복붙 시 공백이 포함될 수 있으므로 직접 입력을 권장합니다. 최초 수령은 과제를 카페에 제출한 후 구글폼 작성 시 이메일로 접속 정보가 발송됩니다. 구글폼 작성 여부를 먼저 확인하고, 미수신 시 카페 닉네임을 조교에게 알려주면 확인 가능합니다.","solution":"1. 최신 접속 주소 확인: tube.autoworkers.ai\n2. 로그인 오류 시 비밀번호를 직접 타이핑 (복붙 공백 주의)\n3. 이전에 비밀번호를 변경했다면 변경된 비밀번호 입력\n4. 그래도 안 되면 조교에게 비밀번호 초기화 요청\n5. 최초 수령은 과제 제출 → 구글폼 작성 → 이메일 수신 순서\n6. 접속 불가 시 Ctrl+Shift+R(강제 새로고침) 시도\n7. 구글폼 미작성 시 카페 닉네임을 조교에게 전달하여 확인","answeredBy":["강사","조교"],"appearedDates":["2026-03-20","2026-03-21","2026-03-23","2026-03-24","2026-03-26","2026-03-27","2026-03-31"],"tags":["튜브워커","로그인","접속","비밀번호","서버점검","구글폼"]},{"id":"faq-3","question":"캡컷에서 튜브워커 프로젝트가 안 보이거나 미디어 분실/압축/자막 오류가 발생합니다","totalFrequency":19,"category":"기술문제","answer":"프로젝트 압축 파일을 반드시 풀어야 하며, 풀린 폴더를 캡컷 Draft 경로에 넣은 후 캡컷을 재시작해야 합니다. 폴더가 이중으로 생성되는 경우 내부 폴더를 한 단계 꺼내야 합니다. 윈도우 기본 압축 프로그램은 파일명이 길면 실패할 수 있으므로 7-Zip 또는 반디집 사용을 권장합니다. 반디집 설치로 캡컷 자막·음성 오류가 해결되는 사례도 있습니다.","solution":"1. 압축 해제 시 7-Zip 또는 반디집 프로그램 사용 권장\n2. 파일명을 영문 짧은 이름으로 변경 후 압축 해제\n3. 캡컷 Draft 경로에 프로젝트 폴더 이동 (윈도우: Local\\CapCut\\User Data\\Projects\\com.lveditor.draft)\n4. 폴더 안에 같은 이름의 폴더가 중첩되어 있으면 내부 폴더를 꺼냄\n5. 캡컷 재시작\n6. 미디어 분실 시 해당 구간에 영상을 수동으로 교체\n7. 자막·음성 오류 시 반디집으로 재압축 해제 시도","answeredBy":["조교","경험자"],"appearedDates":["2026-03-21","2026-03-22","2026-03-27","2026-03-31"],"tags":["캡컷","프로젝트연동","압축해제","7-Zip","반디집","미디어분실","Draft경로"]},{"id":"faq-4","question":"그록(Grok) 유료화 이후 영상 생성이 안 되는데 어떻게 하나요?","totalFrequency":17,"category":"기술문제","answer":"그록이 유료화되면서 외부 연동이 불안정해졌습니다. 유료 가입해도 영상 생성이 됐다 안됐다 반복합니다. 이미지만 전부 생성 완료되면 그록 영상 없이 캡컷 프로젝트 내보내기가 가능합니다. 영상 생성 시 브라우저 창 5~10개를 동시에 띄워 병렬작업하면 효율적입니다. 강사 측에서 우회 방법을 검토 중이므로 당장 그록 유료 결제는 보류하는 것이 좋습니다.","solution":"1. 당장 그록 유료 결제하지 말고 추가 공지 대기\n2. 훅 영상 생성 단계에서 '건너뛰기'로 넘어가기\n3. 이미지를 전부 생성 완료한 후 캡컷 프로젝트 내보내기 진행\n4. 영상 생성 시 브라우저 창 5~10개 동시 병렬작업 가능\n5. 쿠키에는 로그인 정보가 포함되므로 외부 노출 주의\n6. 조교 대국밥의 해결 방안 공지 대기","answeredBy":["조교","경험자"],"appearedDates":["2026-03-19","2026-03-20","2026-03-21","2026-03-22","2026-03-30"],"tags":["그록","Grok","유료화","영상생성","연동오류","병렬작업"]},{"id":"faq-5","question":"VSCode/클로드 데스크톱 설정 오류 (바이패스 권한, 폴더 트리, 파일 복사, 연동 등)","totalFrequency":17,"category":"도구사용","answer":"VSCode에서 바이패스 퍼미션은 클로드코드 확장프로그램 설치 후 설정 화면에서 활성화합니다. 클로드 데스크톱은 파일 복사·붙여넣기가 직접 지원되지 않으며, 코드 탭에서 작업 경로를 먼저 지정해야 합니다. VSCode에서 탐색기가 안 보이면 파일 → 폴더 열기로 선택합니다. VS Code를 2대 컴퓨터에서 연동하는 것은 가능하나 설정이 복잡합니다. Pro→Max 업그레이드 후 미반영 시 /logout → /login으로 재접속합니다.","solution":"1. VSCode 바이패스: 확장프로그램 설치 → 설정에서 bypass permissions 활성화\n2. VSCode 한국어: Ctrl+Shift+P → 'Configure Display Language' → 한국어\n3. 탐색기 안 보임: 파일 → 폴더 열기로 해당 폴더 선택\n4. Claude Desktop: 코드 탭에서 작업 경로(폴더) 먼저 지정\n5. 파일 직접 복사·붙여넣기 대신 폴더 경로로 작업\n6. 2대 컴퓨터 연동: 가능하나 크롬 원격 데스크톱이 더 편리\n7. Pro→Max 업그레이드 후 미반영 시 /logout → /login 재접속","answeredBy":["조교","경험자"],"appearedDates":["2026-03-19","2026-03-22","2026-03-23","2026-03-25","2026-03-26","2026-03-30","2026-03-31"],"tags":["VSCode","클로드데스크톱","바이패스","폴더열기","한국어설정","원격데스크톱"]},{"id":"faq-6","question":"스킬 폴더 다운로드 후 클로드 코드에서 인식/실행이 안 됩니다","totalFrequency":16,"category":"도구사용","answer":"스킬 폴더를 바탕화면에 저장 후 클로드 데스크톱 앱 좌측 '폴더 열기'로 해당 폴더를 지정합니다. 폴더명에 한글이나 특수기호가 포함되면 인식 오류가 발생하므로 영문/숫자로 변경해야 합니다. 새 창을 열 때마다 스킬 분석·실행을 명시적으로 요청하거나 CLAUDE.md에 고정 참조 설정이 필요합니다.","solution":"1. 스킬 폴더를 바탕화면에 압축 해제\n2. 폴더명이 한글이면 영문으로 변경 (예: '2주차스킬' → 'week2-skill')\n3. 폴더 경로 전체에 한글이 없는지 확인\n4. Claude Desktop 앱에서 '폴더 열기'로 해당 폴더 선택\n5. '이 폴더 분석하고 실행해줘' 명령 입력\n6. 2주차 스킬의 경우 구글드라이브 수정본 사용","answeredBy":["조교","경험자"],"appearedDates":["2026-03-21","2026-03-23","2026-03-25","2026-03-27"],"tags":["스킬","클로드코드","폴더설정","설치","한글오류"]},{"id":"faq-7","question":"강의 진도를 못 따라가겠는데 어떻게 해야 하나요? 강의 일정이 헷갈립니다.","totalFrequency":16,"category":"수강환경","answer":"정규 라이브 강의만 우선 수강하면 충분합니다. 프리미엄반은 플러스알파이므로 기본만 제대로 하면 됩니다. 1~2주차는 유튜브 자동화·수익화 실전 집중이며, 3주차부터 바이브코딩 입문, 5주차에 n8n 순서입니다. 메인은 목요일 정규강의이며, 프리미엄 강의는 매주 화요일 고정이 아니라 추가로 진행되는 경우가 있습니다. 각자의 시간대와 페이스에 맞춰 진행하면 됩니다.","solution":"1. 목요일 정규강의 필수 참석/VOD 시청\n2. 프리미엄반 특강은 추가 보충이므로 부담 갖지 않기\n3. 1주차 정규강의·스킬강의부터 먼저 수강\n4. 프리미엄 강의 일정은 공지방에서 수시 확인\n5. 벽타기 정리본·오토위키로 놓친 내용 보충\n6. 각자 페이스에 맞게 진행 (강사 권장)","answeredBy":["강사"],"appearedDates":["2026-03-24","2026-03-25","2026-03-31"],"tags":["학습페이스","커리큐럼","정규강의","멘탈관리","프리미엄강의일정"]},{"id":"faq-8","question":"노션 링크/강의 자료/VOD는 어디서 확인하나요?","totalFrequency":14,"category":"수강환경","answer":"강의 노션은 wiki.autoworkers.ai(오토위키)에서 확인합니다. 강의 영상(VOD)·과제는 네이버 카페 자료실에서 확인합니다. 정규강의 VOD는 다음날 점심 12시에 카페에 업로드됩니다. 프리미엄반 전용 노션은 별도 링크가 제공되며, 프리미엄 강의도 VOD로 제공됩니다. 노션과 카페 내용이 동일하지 않으므로 노션 먼저, 과제·강의는 카페에서 확인합니다.","solution":"1. 통합 위키: wiki.autoworkers.ai\n2. 강의 VOD·과제: 네이버 카페 자료실\n3. VOD 업로드: 정규강의 다음날 점심 12시\n4. 프리미엄반 노션: 별도 전달된 링크 사용\n5. 프리미엄 강의 포함 모든 강의 VOD 제공\n6. 카톡방에서 /오토위키 입력 시 위키 링크 자동 응답\n7. 질의응답 정리본: 카페 및 노션에 매일 업로드","answeredBy":["강사","조교"],"appearedDates":["2026-03-19","2026-03-21","2026-03-24","2026-03-26","2026-03-31"],"tags":["노션","오토위키","VOD","카페","강의자료","다시보기"]},{"id":"faq-9","question":"PC 사양은 얼마나 필요하고, 추가 장비(모니터 등)가 필요한가요?","totalFrequency":13,"category":"수강환경","answer":"렌더링은 로컨 캡컷에서 수행하며 최소 RAM 8GB 이상 권장, 16GB이면 충분합니다. 그래픽카드는 불필요합니다. 노트북 한 대로도 충분하며, 포터블 모니터(10만 원 초반)나 중고 태블릿을 외부 모니터로 연결하면 효율이 크게 올라갑니다. 실제 작업할 메인 기기로 실습하고, 다른 기기로 강의를 시청하는 방식을 권장합니다. 맥미니 중고 구입은 용도(영상 제작 vs 도구 상시 구동)에 따라 선택 기준이 달라집니다.","solution":"1. 최소 RAM 8GB 이상 (16GB 권장, 그래픽카드 불필요)\n2. 노트북 한 대로 충분, 듀얼 모니터 추천\n3. 포터블 모니터(10만 원 초반) 또는 태블릿 외부 모니터 활용\n4. 오토위키 공지의 최소/권장 사양을 클로드에 붙여넣고 구매 조건 질문\n5. 컴퓨터 교체보다 외부 모니터 우선 추천\n6. 메인 기기에서 실습, 보조 기기에서 강의 시청","answeredBy":["강사"],"appearedDates":["2026-03-18","2026-03-19","2026-03-30"],"tags":["PC사양","RAM","노트북","모니터","포터블모니터","장비","맥미니"]},{"id":"faq-10","question":"유튜브 대본(자막) 추출 및 벤치마킹 채널 분석 방법은?","totalFrequency":12,"category":"콘텐츠제작","answer":"벤치마킹 채널의 대본 추출 방법은 여러 가지입니다. grabbit 크롬 확장프로그램으로 자막을 스크래핑하거나, 유튜브 영상 URL을 NotebookLM에 넣어 자막을 추출할 수 있습니다. 쟼스가 제작한 IVT_Pickup 도구로 채널 단위 일괄 대본 추출도 가능합니다. 추출한 대본 3~5개를 AI에게 분석 요청하여 지침서(md파일)로 변환하는 것이 기본 워크플로우입니다.","solution":"1. grabbit 크롬 확장프로그램 설치 후 자막 스크래핑\n2. 또는 유튜브 URL을 NotebookLM에 넣어 자막 추출\n3. 대본 3~5개 수집 후 AI에 글의 특징/구조 분석 요청\n4. 분석 결과를 지침서(md파일)로 변환\n5. 지침서를 스킬에 적용하여 대본 자동 생성\n6. 바이브코딩으로 직접 도구 제작도 가능","answeredBy":["경험자"],"appearedDates":["2026-03-25"],"tags":["대본추출","벤치마킹","grabbit","NotebookLM","지침서"]},{"id":"faq-11","question":"유튜브 채널 개설/계정 분리/카테고리 차별화는 어떻게 하나요?","totalFrequency":12,"category":"콘텐츠제작","answer":"기존 유튜브 프리미엄 계정과 분리해 새 구글 계정으로 채널 개설을 권장합니다. 기본 원칙은 1계정 1채널 1애드센스입니다. 카테고리는 니치로 세분화하여 진입하는 것이 효과적입니다. 예를 들어 경제학이라면 금, 은, 주식, 거시경제 등으로 세분화합니다. 롱폼 업로드 후 2주 정도 조회수 추이를 지켜보는 것이 좋습니다.","solution":"1. 기존 계정과 분리하여 새 구글 계정으로 채널 개설\n2. 카페 유스타터 강의 선행 수강 권장\n3. 1계정 1채널 1애드센스 원칙 준수\n4. 큰 카테고리보다 니치(세분화된 하위 분야)로 진입\n5. 롱폼 업로드 후 2주간 조회수 추이 관찰\n6. 고급 인증(전화번호) 완료 → 15분 초과 롱폼 업로드 가능","answeredBy":["강사","경험자"],"appearedDates":["2026-03-18","2026-03-25"],"tags":["유튜브채널","계정분리","애드센스","니치","카테고리"]},{"id":"faq-12","question":"이미지에 외국인이 나오거나 싱크가 맞지 않는 문제는 어떻게 해결하나요?","totalFrequency":11,"category":"기술문제","answer":"기본 스타일(실사/시네마틱) 사용 시 외국인이 나올 수 있으므로 반드시 커스텀 스타일을 먼저 만들고 동양인(한국인)으로 명시해야 합니다. 이미지를 전부 생성 완료한 후 프로젝트를 생성해야 싱크가 맞습니다. 이미지 생성 실패 시 해당 이미지만 재생성하면 크레딧이 추가 차감되지 않습니다.","solution":"1. 커스텀 스타일 생성 시 '등장인물은 모두 한국인' 명시\n2. 이미지를 전부 생성 완료한 후 프로젝트 생성 (싱크 보장)\n3. 실사 이미지 거부 시 '등장인물은 모두 허구의 인물' 추가\n4. 이미지 생성 실패 시 해당 이미지만 재생성 (크레딧 미차감)\n5. 커스텀 스타일은 최대 4개까지 생성 가능 (오른쪽 상단 X로 삭제)\n6. 카메라 효과(움직임)는 캡컷 완성 단계에서 별도 설정","answeredBy":["강사","조교"],"appearedDates":["2026-03-21","2026-03-23","2026-03-28"],"tags":["이미지생성","커스텀스타일","한국인","싱크","크레딧"]},{"id":"faq-13","question":"스킬 제작 및 대본 생성은 Claude Code와 Claude.ai 중 어디서 해야 하나요?","totalFrequency":10,"category":"도구사용","answer":"기획·스킬 파일 작성·대본 생성 전 과정을 일반 Claude.ai에서 진행하고, 완성된 스킬 파일을 다운로드해 Claude Code에 설치만 하는 방식이 토큰 효율이 높습니다. Claude Code에서 Opus로 직접 작업하면 내부 추론 사이클이 8회 이상 돌아 사용량이 3~5배 빨리 소진됩니다. 안티그래비티(Antigravity)에서도 Opus가 있어 스킬·대본 작업이 가능하며, 품질이 크게 떨어지지 않습니다. 핵심 에이전트(draft 포함)는 Opus 권장, 팩트체크는 Sonnet으로도 충분합니다.","solution":"1. Claude.ai(일반 대화창)에서 스킬 기획·설계·파일 작성\n2. 완성 파일을 다운로드하여 Claude Code에 설치만 실행\n3. 핵심 에이전트는 Opus, 팩트체크는 Sonnet 사용\n4. 클로드 비밀(시크릿) 모드에서는 스킬 작업 불가 → 일반 창 사용\n5. 안티그래비티에서도 Opus로 스킬·대본 작업 가능\n6. ESC 키로 Claude Code 실행 중 강제 중단 가능","answeredBy":["강사","조교","경험자"],"appearedDates":["2026-03-20","2026-03-24","2026-03-31"],"tags":["클로드코드","Claude.ai","토큰최적화","스킬제작","Opus","Sonnet","안티그래비티"]},{"id":"faq-14","question":"클로드 구독 결제는 월결제와 연결제 중 무엇이 좋고, 사전에 준비할 것은?","totalFrequency":7,"category":"비용/결제","answer":"AI 업계의 판도가 단기간에 바뀌므로 연결제는 지양하고 월 20달러 월결제를 권장합니다. 수업 전에는 Claude만 결제하면 충분하며, API 발급 등 나머지는 강의 시간에 안내됩니다. Vertex AI 가입 시 구글 클라우드 300달러 무료 크레딧(90일)을 활용할 수도 있습니다.","solution":"1. Claude Pro 월결제($20/월)로 시작\n2. 연결제(1년 약정) 지양 — AI 시장 변화가 빠름\n3. API 발급·추가 도구는 강의 시간에 안내되므로 사전 준비 불필요\n4. Vertex AI 신규 가입 시 $300 무료 크레딧 활용 가능\n5. 브라우저 자동화 우회는 약관 위반이므로 주의","answeredBy":["강사"],"appearedDates":["2026-03-19"],"tags":["클로드","구독","월결제","API","Vertex AI"]},{"id":"faq-15","question":"튜브워커 크레딧이 부족한데 충전/환불은 어떻게 하나요?","totalFrequency":7,"category":"비용/결제","answer":"크레딧은 구글폼을 통해 충전 가능하며, 오전 9시~밤 12시 매시 정각에 순차 지급됩니다. 결제 2회 시 폼도 2번 작성해야 합니다. 크레딧 구매 시 사용 아이디(닉네임이 아닌 아이디)를 기재해야 합니다. 현금영수증은 카드결제 모듈 추가 후 일괄 처리 예정입니다. 크레딧은 복구 불가이므로 강의를 먼저 시청 후 작업하는 것이 중요합니다.","solution":"1. 크레딧 충전 구글폼 작성 (오전 9시~밤 12시 매시 정각 지급)\n2. 구매 시 사용 아이디(닉네임 아닌 아이디, 예: autoworker00) 기재\n3. 결제 2회 시 폼도 2번 작성\n4. 현금영수증은 카드결제 모듈 추가 후 일괄 처리 예정\n5. 크레딧은 복구 불가 → 강의 영상 먼저 시청 후 작업","answeredBy":["조교","경험자"],"appearedDates":["2026-03-23","2026-03-26","2026-03-27","2026-03-28"],"tags":["크레딧","충전","결제","구글폼","환불"]},{"id":"faq-16","question":"과제 제출은 어디서 어떻게 하나요?","totalFrequency":7,"category":"수강환경","answer":"스킬로 만든 대본을 카페 과제제출 게시판에 업로드합니다. 과제 영상 길이는 7~10분 기준입니다. 파일 업로드 서버 거부 오류 시 첨부파일 없이 제출 버튼 클릭으로 제출 가능합니다. 1주차 과제는 구글폼 작성 후 사담방 숙제 릴레이에 기재하며, 채널에 영상 업로드하는 것까지가 과제입니다.","solution":"1. 카페 과제제출 게시판에 대본 업로드\n2. 영상 길이 7~10분 기준\n3. 파일 업로드 오류 시 첨부파일 없이 제출 가능\n4. 구글폼 작성 후 사담방 숙제 릴레이에 기재\n5. 채널에 영상 업로드까지가 과제 완료","answeredBy":["강사","경험자"],"appearedDates":["2026-03-22","2026-03-27"],"tags":["과제","제출","카페","숙제릴레이"]},{"id":"faq-17","question":"대본 글자수/퀸리티가 만족스럽지 않은데 어떻게 개선하나요?","totalFrequency":7,"category":"콘텐츠제작","answer":"글자수 대신 바이트 수(글자수 x 3배)로 요청하면 클로드의 글자수 준수율이 개선됩니다. 또는 클로드에게 글자수 카운트 후 재검수를 반복 요청하는 방법도 있습니다. Opus 모델 사용 시 준수율이 높습니다. 퀸리티가 낮다고 느끼는 구체적 부분(문맥, 흐름, 이탈방지, 후킹 등)을 먼저 파악한 뒤, 개선 방향을 클로드와 함께 논의하며 작업하는 것을 권장합니다. 레퍼런스 4~5개를 넣고 채널 2개로 병렬작업하면 효율적입니다.","solution":"1. 글자수 대신 바이트 수(글자수 x 3)로 요청\n2. 클로드에게 글자수 카운트 후 재검수 반복 요청\n3. Opus 모델 사용으로 준수율 향상\n4. 퀸리티 개선 시 문맥·흐름·후킹 등 구체적 문제점 먼저 파악\n5. 레퍼런스 대본 4~5개 넣고 병렬작업으로 효율 향상\n6. 메모리 문제 시 작업 지시를 명시적으로 강제","answeredBy":["조교","경험자"],"appearedDates":["2026-03-24","2026-03-25","2026-03-30"],"tags":["대본","글자수","바이트수","프롬프트팁","퀸리티","병렬작업"]},{"id":"faq-18","question":"Whisk 쿠키 설정이 안 되거나 한글이 깨지는데 어떻게 하나요?","totalFrequency":6,"category":"도구사용","answer":"쿠키는 labs.google/fx/ko/tools/whisk에서 생성해야 합니다. Cookie Editor 크롬 확장프로그램(검은 초코칩 쿠키 아이콘이 올바른 버전)에서 Export → Header String을 선택하여 붙여넣기합니다. API 키와 쿠키는 별개 개념이므로 혼동에 주의합니다. 위스크는 한글 렌더링을 지원하지 않으므로 이미지에 한글 텍스트를 최대한 배제해야 합니다.","solution":"1. labs.google/fx/ko/tools/whisk 접속\n2. Cookie Editor 크롬 확장프로그램 설치 (검은 초코칩 쿠키 아이콘)\n3. Export → Header String 선택하여 복사\n4. 복사한 값을 튜브워커 이미지 생성에 붙여넣기\n5. API 키와 쿠키는 별개 → 혼동 주의\n6. 위스크는 한글 미지원 → 이미지에 한글 텍스트 배제","answeredBy":["조교","경험자"],"appearedDates":["2026-03-27","2026-03-30"],"tags":["Whisk","쿠키","Cookie Editor","이미지생성","한글"]},{"id":"faq-19","question":"일레븐랩스 API 키 연동/음성 설정은 어떻게 하나요?","totalFrequency":5,"category":"도구사용","answer":"워크스페이스 ID와 API 키는 별개입니다. 기존 API 키를 저장하지 않았다면 새 API 키를 발급받아야 합니다. 튜브워커 설정 메뉴(좌측 하단 계정 프로필 → 설정)에서 직접 입력합니다. V3 모델은 감정이 풍부하나 2000자 이상이면 이음새가 틀므로 2000자 단위 분할을 권장합니다. 개인 API 키가 없으면 입력하지 않아도 됩니다.","solution":"1. 일레븐랩스에서 새 API 키 발급\n2. 튜브워커 설정(좌측 하단 계정 프로필 → 설정)에서 API 키 입력\n3. 워크스페이스 ID와 API 키 혼동 주의\n4. V3 모델 사용 시 2000자 단위로 분할 권장\n5. 글자 수 22~23 설정이 적정\n6. 개인 API 없으면 입력 불필요 — 영상 강의 먼저 시청","answeredBy":["조교","경험자"],"appearedDates":["2026-03-23","2026-03-27"],"tags":["일레븐랩스","API키","음성생성","TTS","V3"]},{"id":"faq-20","question":"튜브워커에서 여러 작업을 동시에 진행하거나 컴퓨터를 꺼도 괜찮나요?","totalFrequency":5,"category":"기술문제","answer":"현재 튜브워커는 동시작업이 지원되지 않으며, 하나 작동 중이면 다른 작업은 불가합니다. 추후 동시작업 지원이 풀릴 예정입니다. 튜브워커 작업은 서버에 저장되므로 컴퓨터를 꺼도 진행 상황이 유지됩니다. 다만 클로드 코드(클코) 대본 작업 중에는 컴퓨터를 끄지 말아야 합니다.","solution":"1. 튜브워커는 현재 동시작업 미지원 (추후 풀릴 예정)\n2. 하나 작동 중이면 다른 작업 불가\n3. 튜브워커 작업은 서버 저장 → 컴퓨터 꺼도 유지\n4. 클로드 코드 대본 작업 중에는 컴퓨터 끄지 말 것","answeredBy":["조교","경험자"],"appearedDates":["2026-03-28","2026-03-30","2026-03-31"],"tags":["튜브워커","동시작업","서버저장","작업유지"]},{"id":"faq-21","question":"스토리보드 생성 버튼 중복 클릭 시 크레딧이 이중 차감되나요?","totalFrequency":5,"category":"기술문제","answer":"스토리보드 생성 시 크레딧 차감 확인 경고창이 뜨며, '확인' 버튼을 눌러야 차감됩니다. 확인창 없이 실수로 두 번 누른 경우는 서버·네트워크 오류 여부 확인 후 복구 가능합니다. 이미지 생성 단계는 크레딧 차감 없습니다. 한 번 생성 후 버튼이 '재생성'으로 변경되도록 UI 개선이 건의되었습니다.","solution":"1. 스토리보드 생성 전 크레딧 차감 확인창에서 신중히 확인\n2. 확인창 없이 중복 생성된 경우 조교에게 복구 요청\n3. 이미지 생성 단계는 크레딧 차감 없음\n4. UI 개선(재생성 버튼 변경)이 건의된 상태","answeredBy":["조교"],"appearedDates":["2026-03-23","2026-03-31"],"tags":["스토리보드","크레딧","중복생성","UI개선"]},{"id":"faq-22","question":"클로드 API 529 오류가 계속 발생합니다","totalFrequency":4,"category":"기술문제","answer":"Error 529는 Claude API 서버 과부하(overloaded_error) 상태로, 트래픽이 몰려 요청 처리가 불가한 상황입니다. 사용량 초과와는 다른 문제이며, 월 1~2회 발생 수준입니다. 잠시 기다렸다가 재시도하면 해결됩니다.","solution":"1. 529 에러는 서버 과부하 → 사용량 초과와 구분 필요\n2. 잠시(수 분~수십 분) 기다렸다가 재시도\n3. 월 1~2회 발생 수준으로 일시적 현상\n4. 지속 시 다른 AI(Gemini 등)로 임시 대체 작업","answeredBy":["경험자"],"appearedDates":["2026-03-18","2026-03-27"],"tags":["클로드","529오류","서버과부하","API"]},{"id":"faq-23","question":"자막 싱크가 안 맞을 때 해결 방법은?","totalFrequency":4,"category":"기술문제","answer":"캡컷 자동측션 대신 캡컷에서 자막을 제거한 뒤 브루(Vrew)로 가져가 자막을 재생성하는 방법이 최선입니다. 20분 영상 기준 자막 어긋남은 2회 정도 발생하나 심하지 않습니다. TTS 사용 시 2000자 초과하면 음성이 변할 수 있으므로 주의합니다.","solution":"1. 캡컷에서 자동측션 제거\n2. 브루(Vrew)로 가져가서 자막 재생성\n3. TTS 2000자 초과 시 음성 변화 주의 → 2000자 단위 분할\n4. 커스텀 음성 사용 권장\n5. 20분 기준 2회 정도 어긋남은 정상 범위","answeredBy":["경험자"],"appearedDates":["2026-03-22","2026-03-28"],"tags":["자막싱크","캡컷","브루","TTS","커스텀음성"]},{"id":"faq-24","question":"클로드와 제미나이를 연동해서 이미지 생성/영상 분석에 활용할 수 있나요?","totalFrequency":4,"category":"도구사용","answer":"Vertex AI API를 통해 Gemini 호출이 가능하며, 구글 클라우드 신규 가입 시 300달러 크레딧이 제공됩니다. 클로드는 유튜브 영상 직접 분석이 불가하지만 파이썬 코드를 이용해 더 정확하게 분석합니다. 제미나이는 구글 연동으로 영상 분석이 가능하며, 기획 단계에서 Gemini AI 스튜디오(무료)를 먼저 활용하면 토큰 절약에 효과적입니다.","solution":"1. Vertex AI 가입 → 구글 클라우드 $300 크레딧 90일 제공\n2. Vertex AI에서 API 발급 후 클로드에 연결\n3. 기획 단계: Gemini AI 스튜디오(무료) 활용\n4. 영상 분석: 제미나이에 유튜브 URL 입력\n5. 브라우저 자동화 우회는 약관 위반 주의","answeredBy":["강사","경험자"],"appearedDates":["2026-03-24","2026-03-25"],"tags":["제미나이","Vertex AI","API","영상분석","구글클라우드"]},{"id":"faq-25","question":"캡컷 유료 버전이 필요한가요? 줌(Zoom)은 무료인가요?","totalFrequency":3,"category":"비용/결제","answer":"캡컷 무료 버전으로 사용 가능합니다. 브루(Vrew)는 이번 강의 필수 도구 목록에 없습니다. 줌은 무료이며 강의 전 공지방에 링크가 올라오면 해당 링크로 입장하면 됩니다. 노션도 별도 구매 불필요합니다.","solution":"1. 캡컷: 무료 버전 사용 가능\n2. 줌: 무료 — 공지방 링크로 입장\n3. 노션: 별도 구매 불필요 (기존 계정 사용 가능)\n4. 브루(Vrew): 강의 필수 아님 — 기존 연결제 해지 고려 가능","answeredBy":["강사","조교"],"appearedDates":["2026-03-18"],"tags":["캡컷","줌","무료","노션","브루"]},{"id":"faq-26","question":"플레이리스트(플리) 자동화가 가능한가요?","totalFrequency":2,"category":"콘텐츠제작","answer":"현재 강사의 자동화 프로그램으로는 플레이리스트 자동화가 불가능하며, 완전히 다른 방식이 필요합니다. 추후 별도 검토 예정입니다.","solution":"채팅에서 구체적 해결방안 미제공. 강사가 추후 별도 검토 예정이라고 안내.","answeredBy":["강사"],"appearedDates":["2026-03-19"],"tags":["플레이리스트","자동화","유튜브"]},{"id":"faq-27","question":"유튜브에 유료 광고를 돌려야 조회수가 오르나요?","totalFrequency":2,"category":"콘텐츠제작","answer":"유튜브 숙폼·롱폼 모두 유료 광고 없이 알고리즘으로 조회수를 올리는 것이 일반적입니다. 광고는 제휴마케팅 등 특수 목적 외에는 효율이 낮습니다.","solution":"1. 유료 광고 없이 알고리즘 중심 전략 추천\n2. 콘텐츠 퀸리티와 일관성에 집중\n3. 채널 초기에는 1~2개 영상 업로드가 최적\n4. 유료 광고는 제휴마케팅 등 특수 목적에만 활용","answeredBy":["경험자"],"appearedDates":["2026-03-20"],"tags":["유튜브","광고","알고리즘","조회수"]}];
window.__glossaryData__=[{"id":"term-1","term":"튜브워커","definition":"오토워커 강사가 개발한 유튜브 영상 자동 제작 프로그램. Claude Code에서 폴더를 선택한 뒤 '유튜브 영상 만들어줘 [카테고리] 10분영상으로 [유튜브링크]' 형식으로 사용. 과제 제출 후 이메일로 접속 정보를 발송받는 방식으로 배포됨.","category":"tool","aliases":["영상제작기","오토워커 프로그램","TubeWorker","튜튜브워커","튜브워크","큐브워커","투브워커","유브워커"],"appearedDates":["2026-03-20","2026-03-26","2026-03-27","2026-03-30","2026-03-31"],"mentionRank":1},{"id":"term-2","term":"벽타기","definition":"카카오톡 채팅방에서 밀린 수백 건의 대화를 위로 스크롤하며 소급 확인하는 행위. 채팅방에서 고충으로 자주 언급되며, 오토위키나 AI 요약이 대안으로 제시됨.","category":"community","aliases":["벽타기 요약","벽타기 정리"],"appearedDates":["2026-03-18","2026-03-26","2026-03-27","2026-03-30"],"mentionRank":2},{"id":"term-3","term":"스킬","definition":"클로드코드에서 특정 작업을 수행하기 위한 지시서(md파일). 채팅에서는 '작업 지시서'로 비유되며, 대본 생성/스타일링 등의 자동화 워크플로우를 정의함.","category":"concept","aliases":["skill"],"appearedDates":["2026-03-18","2026-03-25","2026-03-26","2026-03-30"],"mentionRank":2},{"id":"term-4","term":"커스텀 스타일","definition":"튜브워커에서 이미지 생성 시 인물 외형(동양인/서양인, 실사/애니 등)을 사용자가 직접 정의하는 기능. 기본 스타일(실사/시네마틱) 사용 시 외국인이 나올 수 있어 반드시 커스텀 스타일 생성 후 작업 권장.","category":"concept","aliases":["커스텀이미지스타일"],"appearedDates":["2026-03-21","2026-03-23","2026-03-28","2026-03-31"],"mentionRank":2},{"id":"term-5","term":"클로드 코드","definition":"Anthropic의 Claude AI를 터미널·VSCode 환경에서 코드 작성·실행·자동화에 활용하는 방식. 채팅에서 네이버 블로그 자동화, 다이제스트 사이트 제작 등 다양한 실습에 사용됨.","category":"tool","aliases":["클코","Claude Code","클로드코드"],"appearedDates":["2026-03-18","2026-03-26","2026-03-27","2026-03-31"],"mentionRank":2},{"id":"term-6","term":"Opus","definition":"클로드의 최상위 AI 모델. 품질이 높지만 5시간 한도 소진이 빠르며, 로직까지 상세히 그려주는 장점이 있음. 실제 제작·완성 단계에서 사용 권장.","category":"concept","aliases":["오푸스","오퍼스"],"appearedDates":["2026-03-18","2026-03-27","2026-03-31"],"mentionRank":6},{"id":"term-7","term":"Whisk","definition":"구글에서 제공하는 이미지 생성 도구(labs.google/fx/tools/whisk). 쿠키 에디터를 통해 로그인 연동 후 사용 가능. 유명인 이미지에 민감한 제한이 있음.","category":"tool","aliases":["위스크"],"appearedDates":["2026-03-23","2026-03-27","2026-03-30"],"mentionRank":6},{"id":"term-8","term":"그록","definition":"AI 기반 영상 생성 플랫폼. 이미지를 업로드하면 영상으로 변환해주며, 창을 여러 개 열어 병렬 작업이 가능함.","category":"tool","aliases":["Grok"],"appearedDates":["2026-03-19","2026-03-30","2026-03-31"],"mentionRank":6},{"id":"term-9","term":"끌루","definition":"클로드(Claude)를 친근하게 부르는 애칭. 채팅에서 '클로에게 시키면 다 된다', '클로 갈구기' 등의 표현으로 사용됨.","category":"community","aliases":["클로드","Claude","끌로","클로"],"appearedDates":["2026-03-19","2026-03-21","2026-03-30"],"mentionRank":6},{"id":"term-10","term":"바이브코딩","definition":"AI에게 자연어로 지시하여 코드를 생성하는 방식. 채팅에서는 클로드 Max 구독으로 도구 제작(유튜브 스크래퍼, 구매대행 자동화 등)에 활용하는 방법으로 언급됨.","category":"concept","aliases":["바이브 코딩","vibe coding"],"appearedDates":["2026-03-18","2026-03-25","2026-03-26"],"mentionRank":6},{"id":"term-11","term":"수창","definition":"유튜브 채널에서 수익 창출 조건을 달성하는 것. 구독자 수·시청 시간 등 유튜브 파트너 프로그램 기준 충족을 의미하며, 채팅에서 '수창해서 신형 맥북 사자' 등의 목표로 자주 언급됨.","category":"community","aliases":["수익창출","수창신","수익 창출"],"appearedDates":["2026-03-20","2026-03-23","2026-03-27"],"mentionRank":6},{"id":"term-12","term":"스토리보드","definition":"튜브워커에서 대본을 기반으로 장면별 이미지 시퀀스를 자동 생성하는 기능. 생성 시 크레딧이 차감되며, 확인 경고창에서 '확인'을 눌러야 차감됨.","category":"concept","aliases":[],"appearedDates":["2026-03-23","2026-03-28","2026-03-31"],"mentionRank":6},{"id":"term-13","term":"오픈클로","definition":"클로드의 브라우저 자동 클릭/조작 기능의 하위 호환 버전으로 언급됨. 원조는 클로드이며, 오픈클로가 클로드의 기능을 따라 만든 것이라는 설명.","category":"tool","aliases":["OpenClaw"],"appearedDates":["2026-03-24","2026-03-25","2026-03-30"],"mentionRank":6},{"id":"term-14","term":"일레븐랩스","definition":"AI 음성 생성(TTS) 서비스. V3는 감정 풍부하나 2000자 이상이면 이음새가 튀고, V2는 발음이 어눌함. 글자 수 22~23 설정 권장.","category":"tool","aliases":["ElevenLabs","일레븐"],"appearedDates":["2026-03-19","2026-03-27","2026-03-28"],"mentionRank":6},{"id":"term-15","term":"캡컷","definition":"영상 렌더링에 사용되는 편집 프로그램. 채팅에서는 로컬에서 렌더링을 수행하는 도구로 언급되며, 동시 내보내기는 불가하고 순차 처리만 가능. 무료 버전으로도 사용 가능하다고 안내됨.","category":"tool","aliases":["CapCut"],"appearedDates":["2026-03-18","2026-03-27","2026-03-31"],"mentionRank":6},{"id":"term-16","term":"크레딧","definition":"튜브워커 이미지 생성 시 소모되는 사용량 단위. 이미지 생성 실패 시 해당 이미지를 재생성하면 크레딧이 추가 차감되지 않는다고 안내됨.","category":"concept","aliases":["API 크레딧","크렛딧"],"appearedDates":["2026-03-21","2026-03-26","2026-03-27"],"mentionRank":6},{"id":"term-17","term":"Claude Max","definition":"Anthropic Claude의 최상위 구독 요금제. Pro에서 업그레이드 시 VS Code 반영이 지연될 수 있으며, /logout → /login으로 해결 가능.","category":"tool","aliases":["맥스","Max"],"appearedDates":["2026-03-28","2026-03-31"],"mentionRank":17},{"id":"term-18","term":"Vertex AI","definition":"구글 클라우드의 AI 플랫폼. 채팅에서는 Gemini API를 호출하기 위한 경로로 언급됨. 신규 가입 시 300달러 무료 크레딧이 제공된다는 정보 공유.","category":"tool","aliases":["버텍스","vertex","구아스","버텍스AI"],"appearedDates":["2026-03-24","2026-03-25"],"mentionRank":17},{"id":"term-19","term":"n8n","definition":"오픈소스 워크플로우 자동화 플랫폼. 유튜브 댓글 자동 작성, 반복 작업 자동화 등에 활용 가능. 채팅에서는 회사 내부 AI 강의에서 다루는 도구로 언급됨.","category":"tool","aliases":[],"appearedDates":["2026-03-22","2026-03-25"],"mentionRank":17},{"id":"term-20","term":"노트북LM","definition":"구글의 무료 PDF·문서 분석 도구. 채팅에서 대용량 문서를 전처리하여 핵심만 추출한 뒤 클로드에 투입하면 토큰 비용을 절감할 수 있다는 팁으로 언급됨.","category":"tool","aliases":["NotebookLM","노트북엘엠","notebook lm"],"appearedDates":["2026-03-24","2026-03-25"],"mentionRank":17},{"id":"term-21","term":"벤치마킹","definition":"유튜브 채널 운영 전략으로, 성공한 채널의 대본/구조/스타일을 분석하여 자신의 콘텐츠에 반영하는 과정. 대본 3~5개를 스크래핑하여 분석하는 것이 기본.","category":"concept","aliases":["벤치"],"appearedDates":["2026-03-25","2026-03-30"],"mentionRank":17},{"id":"term-22","term":"씨댄스","definition":"실사급 AI 영상 생성 기술. 2D 애니메이션에 4D를 입히는 방식으로 언급되며, 프리픽(Freepik)에서 출시된 것으로 추정. 해외에서 먼저 공개됨.","category":"tool","aliases":["Sieverse","Sieverse 2.0","씨댄스 2.0","Cydance 2.0","시댄스 2.0"],"appearedDates":["2026-03-24","2026-03-25"],"mentionRank":17},{"id":"term-23","term":"안티그래비티","definition":"클로드 AI를 사용할 수 있는 서드파티 플랫폼. 울트라 요금제(월 18만 원)로 Opus를 여유 있게 사용 가능하며, 아이디를 돌려가며 쓸 수 있다고 언급됨. 입뮨, 울트라 등 요금제 구분이 존재.","category":"tool","aliases":["안티","antigravity","안티그래버티"],"appearedDates":["2026-03-18","2026-03-31"],"mentionRank":17},{"id":"term-24","term":"에이전트","definition":"클로드에서 스킬에 추가로 연결하여 복합적인 작업을 수행하게 하는 기능. 채팅에서 '에이전트를 잘 써야 한다', '에이전트 붙이려고 해도 프로는 벅차다'는 등 고급 활용 맥락으로 언급됨.","category":"concept","aliases":["에이션트","agent"],"appearedDates":["2026-03-20","2026-03-25"],"mentionRank":17},{"id":"term-25","term":"유튜브 파인더","definition":"벤치마킹할 유튜브 채널/영상을 검색·분석하는 도구. 3주차 정규강의에서 신버전 배포 예정으로 공지됨.","category":"tool","aliases":["YouTube Finder"],"appearedDates":["2026-03-23","2026-03-26"],"mentionRank":17},{"id":"term-26","term":"컨텍스트 관리","definition":"클로드 대화의 맥락을 유지·관리하는 기법. 채팅에서 클로드 활용 3대 원칙 중 하나로 소개됨. 맥락이 잘 유지돼야 출력 품질이 일정하다는 의미.","category":"concept","aliases":["Context 관리","컨텍스트"],"appearedDates":["2026-03-24","2026-03-28"],"mentionRank":17},{"id":"term-27","term":"쿠키에디터","definition":"크롬 확장프로그램. 채팅에서 그록 이미지 생성 우회 시 사용하는 도구로 언급됨. 여러 종류가 있으며 설치에 10초 정도 소요된다고 안내됨.","category":"tool","aliases":["Cookie Editor"],"appearedDates":["2026-03-20","2026-03-27"],"mentionRank":17},{"id":"term-28","term":"프반","definition":"프리미엄반의 줄임말. 오토워커 1기 중 프리미엄 수강생이 참여하는 별도 강의·채팅방을 지칭.","category":"community","aliases":["프리미엄반"],"appearedDates":["2026-03-24","2026-03-26"],"mentionRank":17},{"id":"term-29","term":"/resume","definition":"Claude Code에서 이전에 중단된 작업 화면을 다시 불러오는 명령어. 토큰 한도로 중단된 스킬 제작을 이어서 진행할 때 사용.","category":"tool","aliases":[],"appearedDates":["2026-03-20"],"mentionRank":29},{"id":"term-30","term":"/status","definition":"Claude Code에서 현재 토큰 사용량을 확인할 수 있는 명령어. 조교가 사용량 한도 관리 팁으로 안내함.","category":"tool","aliases":[],"appearedDates":["2026-03-20"],"mentionRank":29},{"id":"term-31","term":"2배 이벤트","definition":"Claude에서 미국 피크타임 외 시간대에 사용량 한도를 2배로 제공하는 이벤트. 한국 시간 기준 금요일 밤 9시~12시는 제외(1배).","category":"concept","aliases":["2배사용량 이벤트"],"appearedDates":["2026-03-28"],"mentionRank":29},{"id":"term-32","term":"529 오류","definition":"Claude API 서버 과부하 상태(overloaded_error). 트래픽이 몰려 요청 처리 불가 시 발생. 시간을 두고 재시도 필요.","category":"concept","aliases":["Error 529","overloaded_error"],"appearedDates":["2026-03-27"],"mentionRank":29},{"id":"term-33","term":"7-Zip","definition":"무료 압축/해제 프로그램. 윈도우 기본 압축 프로그램으로 캡컷 프로젝트 파일이 열리지 않을 때 대안으로 사용.","category":"tool","aliases":["7zip"],"appearedDates":["2026-03-27"],"mentionRank":29},{"id":"term-34","term":"AB테스트","definition":"두 가지 버전(A/B)을 비교하여 더 나은 결과물을 선택하는 전략. 채팅에서 Opus와 Sonnet으로 각각 대본을 생성하여 품질을 비교하겠다는 맥락으로 언급됨.","category":"concept","aliases":["A/B 테스트"],"appearedDates":["2026-03-20"],"mentionRank":29},{"id":"term-35","term":"AI 스타일 추출기","definition":"참고 영상의 스타일을 AI로 분석·추출하는 도구. 채팅에서 보유 여부를 묻는 질문으로 언급됨.","category":"tool","aliases":[],"appearedDates":["2026-03-28"],"mentionRank":29},{"id":"term-36","term":"Claude HUD","definition":"Claude Code의 실행 상태를 터미널 statusline에 표시하는 플러그인. PyTorch KR 포럼에 소개된 도구로, 잼스님이 공유함.","category":"tool","aliases":["클로드 HUD"],"appearedDates":["2026-03-22"],"mentionRank":29},{"term":"Codex","definition":"OpenAI에서 출시한 AI 코딩 도구. 채팅방에서 클로드와의 비교 질문이 제기됨.","category":"tool","aliases":["코덱스","OpenAI Codex"],"appearedDates":["2026-03-31"],"mentionRank":29,"id":"term-37"},{"id":"term-38","term":"Eleven V3","definition":"일레븐랩스의 최신 음성 생성 모델. 음성 품질과 발음이 우수하나 대본이 길어질 경우 음성 일관성이 깨질 수 있음. Multilingual v2 모델 대비 고품질.","category":"tool","aliases":["V3 모델"],"appearedDates":["2026-03-23"],"mentionRank":29},{"id":"term-39","term":"FCPXML","definition":"Final Cut Pro XML의 약자. 프리미어 프로와 튜브워커 간 편집 데이터 연동을 위해 FCPXML 기반 연결이 가능한지 수강생이 문의함. 현재 미지원.","category":"concept","aliases":["Final Cut Pro XML"],"appearedDates":["2026-03-23"],"mentionRank":29},{"id":"term-40","term":"Google API 키","definition":"웹 검색 기능 활용에 필요한 인증 키. 채팅에서 스킬 실행 시 Google API 키 없이도 진행 가능하며, 비활성화 상태에서 사용하면 된다고 안내됨.","category":"concept","aliases":["구글 API 키"],"appearedDates":["2026-03-21"],"mentionRank":29},{"id":"term-41","term":"Header String","definition":"Cookie Editor에서 쿠키를 추출할 때 선택하는 Export 형식. 이 형식으로 복사한 값을 튜브워커 이미지 생성에 붙여넣기.","category":"concept","aliases":["헤드스트링"],"appearedDates":["2026-03-27"],"mentionRank":29},{"id":"term-42","term":"Meshy AI","definition":"AI 기반 3D 모델링 서비스. 이미지나 텍스트로 3D 모델을 생성해 주며, 생성된 모델을 블렌더로 가져와 애니메이션 작업에 활용할 수 있음.","category":"tool","aliases":[],"appearedDates":["2026-03-22"],"mentionRank":29},{"id":"term-43","term":"Nexlev","definition":"유튜브 키워드·조회수 분석 도구. 채팅에서 채널 분석·키워드 리서치에 활용하는 유료 서비스로 소개됨. 월 구독 비용 논의가 있었음.","category":"tool","aliases":["넥슬레브","nexlev"],"appearedDates":["2026-03-24"],"mentionRank":29},{"id":"term-44","term":"PD 에이전트","definition":"유튜브 대본 제작 파이프라인(레퍼런스 수집 → 분석 → 대본 작성 → 썸네일 → 메타데이터)을 상태 기반으로 자동 오케스트레이션하는 AI 에이전트. 'youtube-pd'라는 스킬 이름으로 공유됨.","category":"concept","aliases":["youtube-pd"],"appearedDates":["2026-03-23"],"mentionRank":29},{"id":"term-45","term":"Qwen AI","definition":"중국 AI 플랫폼. 채팅에서는 무료로 5초 분량의 고퀄리티 영상 클립을 생성할 수 있는 서비스로 소개됨.","category":"tool","aliases":["큐웬"],"appearedDates":["2026-03-22"],"mentionRank":29},{"id":"term-46","term":"RPM","definition":"Revenue Per Mille, 조회수 1,000회당 수익. 채팅에서 유튜브는 RPM이 카테고리별로 비슷비슷하여 유료 광고 효율이 낮다고 설명됨.","category":"concept","aliases":[],"appearedDates":["2026-03-20"],"mentionRank":29},{"id":"term-47","term":"Remotion","definition":"React를 사용해 프로그래밍 방식으로 영상을 만드는 오픈소스 프레임워크. 채팅에서는 코드로 영상을 완성한 사례로 언급됨.","category":"tool","aliases":["리모션"],"appearedDates":["2026-03-22"],"mentionRank":29},{"id":"term-48","term":"SSO","definition":"Single Sign-On. 그록 유료화 이후 쿠키·SSO 연동이 불안정해지면서 영상 생성이 됐다 안됐다 반복하는 문제가 발생. 조교가 해결 방안을 모색 중이라고 안내됨.","category":"concept","aliases":[],"appearedDates":["2026-03-21"],"mentionRank":29},{"id":"term-49","term":"SUNO AI","definition":"AI 음악 생성 도구. 채팅에서 플레이리스트 병렬 운영과 수익 극대화 전략의 일부로 언급되었으나, 본 커리큘럼에는 포함되지 않음.","category":"tool","aliases":["수노"],"appearedDates":["2026-03-19"],"mentionRank":29},{"id":"term-50","term":"Sonnet","definition":"클로드의 중간 등급 AI 모델. Opus 대비 사용량 소진이 적어 연습·개발 단계에서 권장됨. 다만 수정이 안 된 부분이 발견되는 등 품질 차이가 있다고 언급됨.","category":"concept","aliases":["소넷","쏘넷"],"appearedDates":["2026-03-18"],"mentionRank":29},{"id":"term-51","term":"VOD","definition":"정규 강의를 실시간으로 수강하지 못한 수강생을 위해 사후 제공되는 녹화 강의 영상. 채팅에서는 당일 정규강의 VOD가 다음날 12시에 업로드된다고 언급됨.","category":"concept","aliases":["다시보기","녹화강의"],"appearedDates":["2026-03-26"],"mentionRank":29},{"id":"term-52","term":"VS Code","definition":"코드 편집기. 오토워커 강의에서 기본 개발 도구로 사용됨. 한국어 전환(Ctrl+Shift+P → Configure Display Language)이 가능하며, Add to PATH는 기본 설치 시 디폴트 체크되어 있음.","category":"tool","aliases":["VSCode","비에스코드"],"appearedDates":["2026-03-19"],"mentionRank":29},{"id":"term-53","term":"Vimeo","definition":"유료 강의 동영상을 호스팅하는 플랫폼. 외부 유출 방지를 위해 다운로드 및 자막 추출이 차단되어 있어, 유료 강의 스크립트 추출이 불가함.","category":"tool","aliases":["비메오"],"appearedDates":["2026-03-26"],"mentionRank":29},{"id":"term-54","term":"flux-schnell","definition":"이미지 생성 AI 모델. Whisk 대비 유명인 이미지 제한이 적어 대안으로 추천됨.","category":"tool","aliases":[],"appearedDates":["2026-03-23"],"mentionRank":29},{"id":"term-55","term":"grabbit","definition":"유튜브 영상의 자막(대본)을 스크래핑할 수 있는 크롬 확장프로그램. 벤치마킹 채널 분석 시 대본 추출 도구로 사용됨.","category":"tool","aliases":[],"appearedDates":["2026-03-25"],"mentionRank":29},{"id":"term-56","term":"psmux","definition":"윈도우 환경에서 tmux를 네이티브로 실행할 수 있게 해주는 도구. WSL 없이도 PowerShell에서 tmux 명령으로 클로드코드 팀메이트를 구동할 수 있음.","category":"tool","aliases":[],"appearedDates":["2026-03-25"],"mentionRank":29},{"id":"term-57","term":"tmux","definition":"터미널 멀티플렉서. 채팅에서는 클로드코드를 실행할 때 세션을 유지하거나 PC-모바일 간 작업 연속성을 위해 사용하는 도구로 언급됨.","category":"tool","aliases":[],"appearedDates":["2026-03-25"],"mentionRank":29},{"id":"term-58","term":"겜스고","definition":"Claude MAX 등 유료 AI 서비스 구독을 저렴하게 이용할 수 있는 서비스. 채팅에서 이를 통한 할인 구독 가능 여부가 질문됨.","category":"tool","aliases":[],"appearedDates":["2026-03-23"],"mentionRank":29},{"id":"term-59","term":"고급 인증","definition":"유튜브 채널의 고급 기능 활성화를 위한 인증 단계. 전화번호 인증을 완료해야 15분 초과 롱폼 업로드, 커스텀 썸네일, 실시간 스트리밍이 가능하다고 설명됨.","category":"concept","aliases":["고급 기능","표준 기능 + 전화번호 인증"],"appearedDates":["2026-03-19"],"mentionRank":29},{"id":"term-60","term":"구글 AI 스튜디오","definition":"Google의 무료 AI 서비스. 영상 분석(레퍼런스 구조 파악, 말투 추출)에 강점이 있어 기획 단계에서 Claude Code보다 먼저 활용하면 토큰 절약과 효율 향상에 유리. Gemini API 접속 도구.","category":"tool","aliases":["Google AI Studio"],"appearedDates":["2026-03-23"],"mentionRank":29},{"id":"term-61","term":"깡통계정","definition":"유튜브 채널 다중 운영을 위해 만드는 빈 계정. 한 계정당 채널 수 제한이 있어 여러 개의 깡통계정을 만들어 다수 채널을 운영하는 전략으로 언급됨.","category":"community","aliases":[],"appearedDates":["2026-03-23"],"mentionRank":29},{"id":"term-62","term":"나노바나나","definition":"Gemini를 활용한 썸네일 제작 방식을 지칭하는 별칭. 강사가 썸네일 제작 시 유일하게 Gemini를 사용하며 나노바나나라고 언급함.","category":"tool","aliases":[],"appearedDates":["2026-03-20"],"mentionRank":29},{"id":"term-63","term":"네이버 클로바","definition":"네이버에서 제공하는 AI 음성인식 서비스. 채팅에서는 mp3 파일을 txt(텍스트)로 변환하는 용도로 언급됨. 강사가 강의 음원을 스크립트화할 때 사용한 방법.","category":"tool","aliases":["CLOVA","클로바"],"appearedDates":["2026-03-26"],"mentionRank":29},{"id":"term-64","term":"니치","definition":"유튜브 카테고리의 세분화된 하위 분야. 예를 들어 '경제학'이라는 큰 카테고리 대신 '거시경제', '금/은 투자' 등 좁은 분야를 타겟팅하는 전략.","category":"concept","aliases":["niche"],"appearedDates":["2026-03-25"],"mentionRank":29},{"id":"term-65","term":"대시보드","definition":"워크플로우·에이전트·스킬 구성을 웹 UI(HTML)로 시각화한 관리 페이지. 클로드에게 스크린샷을 보여주며 요청하면 자동 생성해 주며, 웹에서 직접 스킬 수정도 가능.","category":"concept","aliases":[],"appearedDates":["2026-03-22"],"mentionRank":29},{"term":"레퍼런스","definition":"대본 작성 시 참고하는 기존 영상이나 콘텐츠. 4~5개를 한꺼번에 넣어 분석시키는 방식이 권장됨.","category":"concept","aliases":["레퍼"],"appearedDates":["2026-03-30"],"mentionRank":29,"id":"term-66"},{"term":"롱폼","definition":"긴 형식의 유튜브 영상. 숏폼과 달리 노출이 하루~한 달에 걸쳐 점진적으로 상승할 수 있음.","category":"concept","aliases":[],"appearedDates":["2026-03-31"],"mentionRank":29,"id":"term-67"},{"id":"term-68","term":"리밋","definition":"클로드의 사용량 제한(limit). Pro 플랜 기준 5시간 롤링 한도로 Opus 사용 시 빠르게 소진됨. 맥스 플랜으로 업그레이드하거나 컴퓨터 재부팅·재로그인으로 일시 해결 가능하다고 안내됨.","category":"concept","aliases":["limit","사용량 제한","토큰 리밋"],"appearedDates":["2026-03-21"],"mentionRank":29},{"id":"term-69","term":"맥스 x5","definition":"클로드 맥스 요금제 중 5배 사용량 등급. 채팅에서 '중소기업 수준'이라 표현되었으며, 동시에 4개 이상 작업하지 않는다면 충분하다고 안내됨.","category":"concept","aliases":["x5"],"appearedDates":["2026-03-20"],"mentionRank":29},{"id":"term-70","term":"미리캔버스","definition":"이미지·디자인 편집 도구. 채팅에서 이미지 일부 텍스트 오류 수정 시 미리캔버스에서 도형을 입히고 글자를 수정하는 방식으로 토큰 절약 가능하다는 팁이 공유됨.","category":"tool","aliases":[],"appearedDates":["2026-03-21"],"mentionRank":29},{"id":"term-71","term":"미스터비스트 MD","definition":"미스터비스트(MrBeast)의 시청자 유지 전략을 정리한 마크다운 파일. 수강생이 자체 제작하여 채팅방에 공유한 참고 자료. 스킬 프롬프트 폴더에 넣어 활용하는 방법이 논의됨.","category":"community","aliases":["미스터비스트 문서","MrBeast MD"],"appearedDates":["2026-03-24"],"mentionRank":29},{"id":"term-72","term":"바이트 수","definition":"대본 글자수 정확도를 높이기 위한 프롬프트 기법. 글자수 × 3배를 바이트 수로 환산하여 요청하면 클로드의 글자수 준수율이 개선된다는 팁으로 공유됨.","category":"concept","aliases":["byte count","바이트수"],"appearedDates":["2026-03-24"],"mentionRank":29},{"id":"term-73","term":"바이패스 퍼미션","definition":"VSCode 클로드코드 확장프로그램의 설정 옵션. 활성화하면 클로드가 파일 접근 등 권한 제한 없이 작업 가능. 많은 수강생이 설정에 어려움을 겪음.","category":"concept","aliases":["bypass permissions","바이패스"],"appearedDates":["2026-03-25"],"mentionRank":29},{"term":"반디집","definition":"파일 압축·해제 프로그램. 윈도우 기본 압축 대신 사용하면 캡컷 관련 파일 오류가 해결됨.","category":"tool","aliases":["Bandizip"],"appearedDates":["2026-03-31"],"mentionRank":29,"id":"term-74"},{"id":"term-75","term":"보강수업","definition":"정규강의 외 별도로 진행하는 줌 라이브 추가 강의. 3/21 오후 2시에 1강 미이수자·튜브워커 미수령자를 포함한 전원 대상으로 스킬 다운로드 실습, 대본→영상 제작, Q&A를 다루는 보강이 진행됨.","category":"community","aliases":["추가 수업","보충수업"],"appearedDates":["2026-03-21"],"mentionRank":29},{"id":"term-76","term":"브루","definition":"영상 편집 도구. 이번 오토워커 강의 필수 도구 목록에는 포함되지 않는다고 안내되어, 기존 연결제 이용자는 해지 고려 가능.","category":"tool","aliases":["Vrew"],"appearedDates":["2026-03-18"],"mentionRank":29},{"id":"term-77","term":"블렌더","definition":"무료 오픈소스 3D 애니메이션·모델링 프로그램. Meshy AI 등으로 만든 3D 모델을 불러와 움직임을 추가하는 용도로 언급됨. 롱폼 해외 채널에서 3D 영상으로 떡상한 사례가 많다고 소개됨.","category":"tool","aliases":["Blender"],"appearedDates":["2026-03-22"],"mentionRank":29},{"id":"term-78","term":"새벽반","definition":"디하클 오토워커 채팅방에서 자정~새벽 시간대에 활발하게 활동하는 수강생 그룹을 지칭하는 커뮤니티 표현.","category":"community","aliases":[],"appearedDates":["2026-03-25"],"mentionRank":29},{"id":"term-79","term":"세컨드 브레인","definition":"노션 등을 활용하여 정보를 체계적으로 정리·저장하는 시스템. 강의에서는 노션과 로컬 파일 시스템을 병행 활용할 예정이며, 별도 구매는 불필요하다고 안내됨.","category":"concept","aliases":["세컨드브레인"],"appearedDates":["2026-03-18"],"mentionRank":29},{"term":"썸네일 A/B 테스트","definition":"두 가지 이상의 썸네일을 동시에 테스트하여 클릭률이 높은 것을 선별하는 방법.","category":"concept","aliases":[],"appearedDates":["2026-03-30"],"mentionRank":29,"id":"term-80"},{"id":"term-81","term":"야담채널","definition":"유튜브에서 야담(이야기) 콘텐츠를 다루는 채널 유형. 허위 콘텐츠 정책 위반으로 대규모 삭제 조치를 받고 있다고 채팅에서 경고됨.","category":"concept","aliases":["야담"],"appearedDates":["2026-03-19"],"mentionRank":29},{"id":"term-82","term":"역프롬프트","definition":"잘된 유튜브 채널의 완성된 스크립트를 AI에 넣어, 해당 스크립트를 만들어낸 원본 프롬프트(지침)를 역추출하는 기법. 채널 고유 대본 스타일(SKILL.md)을 자동 생성하는 데 활용.","category":"concept","aliases":[],"appearedDates":["2026-03-22"],"mentionRank":29},{"id":"term-83","term":"오토그록","definition":"그록 사이트에 직접 들어가지 않고도 이미지를 생성할 수 있게 하는 우회 전략. 유튜브에서 설치·사용법을 검색할 수 있으나, 강의에서 소개된 방식과는 다름. 본인 그록 계정이 필요함.","category":"tool","aliases":["AutoGrok"],"appearedDates":["2026-03-20"],"mentionRank":29},{"id":"term-84","term":"오토봇","definition":"카카오톡 채팅방에서 정해진 키워드(오토위키, 로그, 롱타임, 닉네임양식 등)에 자동으로 응답하는 봇. 후파님이 제작하였으며, '/질문' 등의 명령어로 학습된 명령어 목록을 확인할 수 있음.","category":"tool","aliases":[],"appearedDates":["2026-03-19"],"mentionRank":29},{"id":"term-85","term":"오토위키","definition":"강사가 카톡방 대화 내용과 공지사항(컴퓨터 사양 안내 등)을 정리하여 게시하는 위키 사이트(wiki.autoworkers.ai). 벽타기 대신 핵심 정보를 검색할 수 있는 대안으로 제시됨.","category":"tool","aliases":["오토 위키"],"appearedDates":["2026-03-18"],"mentionRank":29},{"id":"term-86","term":"워크플로우","definition":"에이전트별 역할 분리와 병렬 실행을 설계하는 자동화 작업 흐름. 채팅에서 클로드 활용 3대 원칙 중 하나로 소개되었으며, 시간과 비용을 모두 줄이는 핵심 개념으로 강조됨.","category":"concept","aliases":["Workflow","워크플로"],"appearedDates":["2026-03-24"],"mentionRank":29},{"id":"term-87","term":"유사클로드","definition":"실제 Claude가 아닌 것으로 착각하고 사용한 클로드 유사 서비스를 지칭하는 표현. 임@현(4000)이 강의 수강 후 자신이 작업에 사용한 도구가 실제 Claude가 아님을 인지했다고 언급.","category":"community","aliases":[],"appearedDates":["2026-03-26"],"mentionRank":29},{"id":"term-88","term":"유스타터","definition":"네이버 카페에 게시된 유튜브 시작 가이드 강의. 강사가 유튜브 채널 개설 전에 선행 학습으로 권장함.","category":"community","aliases":[],"appearedDates":["2026-03-18"],"mentionRank":29},{"id":"term-89","term":"유플레이어","definition":"유튜브 영상 및 자막(스크립트) 다운로드 프로그램. 벤치마킹 채널의 스크립트를 수집하여 역프롬프트·대본 지침서 작성에 활용하는 용도로 언급됨.","category":"tool","aliases":["YTD"],"appearedDates":["2026-03-22"],"mentionRank":29},{"id":"term-90","term":"장르 에디터","definition":"Claude Code에게 요청하여 만든 GUI 기반 편집기. 대본 스타일 변수(장르, 채널 특성 등)를 시각적으로 수정할 수 있어, 스킬 파라미터를 일일이 타이핑하지 않고도 대본 고도화가 가능함.","category":"tool","aliases":[],"appearedDates":["2026-03-22"],"mentionRank":29},{"id":"term-91","term":"잼민이","definition":"Google Gemini AI를 지칭하는 채팅방 내 별칭. 영상·이미지 분석 능력이 뛰어나 유튜브 영상 분석이나 스크립트 뼈대 작성 시 활용됨.","category":"community","aliases":["제미나이","Gemini"],"appearedDates":["2026-03-22"],"mentionRank":29},{"id":"term-92","term":"젠스파크","definition":"Claude Opus를 무제한으로 사용 가능한 서드파티 플랫폼. 채팅에서 공식 Claude.ai보다 결과물 품질이 다소 낮지만, 적당한 품질의 작업에 비용 절감 대안으로 활용 가능하다고 언급됨.","category":"tool","aliases":["Genspark"],"appearedDates":["2026-03-20"],"mentionRank":29},{"id":"term-93","term":"채널 탐색기","definition":"유튜브 채널을 탐색·분석하는 도구. 3주차 강의에서 직접 만드는 과정을 다룰 예정. 엔터키로 탐색 시작이 되도록 기능 개선 요청이 있었음.","category":"tool","aliases":[],"appearedDates":["2026-03-18"],"mentionRank":29},{"id":"term-94","term":"캡컷 Draft","definition":"캡컷 프로젝트 파일이 저장되는 로컬 경로. 윈도우 기준 'Local\\CapCut\\User Data\\Projects\\com.lveditor.draft'에 프로젝트 폴더를 넣어야 캡컷에서 인식됨. 압축 파일은 반드시 해제 후 이동해야 함.","category":"tool","aliases":["드래프트 경로","캡컷 프로젝트 경로"],"appearedDates":["2026-03-21"],"mentionRank":29},{"id":"term-95","term":"커서 AI","definition":"VS Code 대안으로 언급된 코드 편집기. 일부 수강생이 선호한다고 언급되었으나, 강사는 VS Code를 기본으로 사용하는 이유를 본강의에서 설명하겠다고 답변함.","category":"tool","aliases":["Cursor AI","커서"],"appearedDates":["2026-03-19"],"mentionRank":29},{"id":"term-96","term":"커스텀 음성","definition":"TTS(텍스트 음성 변환)에서 기본 음성 대신 사용자가 설정한 음성. 2000자 초과 시 음성 톤이 변할 수 있음.","category":"tool","aliases":[],"appearedDates":["2026-03-28"],"mentionRank":29},{"id":"term-97","term":"크롬 원격 데스크톱","definition":"구글 크롬 브라우저 기반의 원격 접속 도구. 채팅에서 사무실 노트북으로 집 컴퓨터 터미널을 원격 제어하는 방법으로 추천됨.","category":"tool","aliases":["Chrome Remote Desktop","원격 데스크톱"],"appearedDates":["2026-03-24"],"mentionRank":29},{"id":"term-98","term":"타입캐스트","definition":"AI 음성 합성 서비스. 채팅에서 쇼츠에서는 강세이지만 일레븐랩스와 비교하여 자연스러움이 떨어진다고 언급됨.","category":"tool","aliases":[],"appearedDates":["2026-03-19"],"mentionRank":29},{"id":"term-99","term":"토큰","definition":"LLM(대규모 언어모델)의 입출력 소비 단위. 채팅에서는 클로드 사용 시 과금·제한량의 기준으로 빈번히 언급됨. 맥스 플랜이 아니면 토큰 소모가 극심하다는 논의가 있었음.","category":"concept","aliases":["token","토큰량"],"appearedDates":["2026-03-24"],"mentionRank":29},{"id":"term-100","term":"프로젝트 싱크","definition":"이미지·자막·음성이 캡컷 프로젝트 내에서 시간축으로 정렬되어 일치하는 상태. 이미지가 전부 생성 완료된 후에 프로젝트를 생성해야 싱크가 맞음. 미완성 상태에서 생성하면 불일치 발생.","category":"concept","aliases":["싱크"],"appearedDates":["2026-03-21"],"mentionRank":29},{"term":"프리미엄 특강","definition":"오토워커 프리미엄 수강생 대상 추가 라이브 강의. 영상 제작 전 과정 시연 및 QnA로 구성됨.","category":"community","aliases":["프반 강의"],"appearedDates":["2026-03-30"],"mentionRank":29,"id":"term-101"},{"id":"term-102","term":"프프","definition":"Adobe Premiere Pro의 줄임말. 자막 정확도가 높다고 평가되며, 컷백(Cutback) 기능과 함께 영상 편집 도구로 언급됨.","category":"tool","aliases":["프리미어 프로","Premiere Pro"],"appearedDates":["2026-03-22"],"mentionRank":29},{"id":"term-103","term":"플리","definition":"플레이리스트의 줄임말. 음악 관련 유튜브 콘텐츠 형식. 현재 강사의 자동화 프로그램으로는 불가능하며, 완전히 다른 방식이 필요하다고 답변됨.","category":"concept","aliases":["플레이리스트"],"appearedDates":["2026-03-19"],"mentionRank":29},{"id":"term-104","term":"하이쿠","definition":"클로드의 경량 AI 모델(Claude Haiku). 채팅에서 단순 반복 작업에 적합하며 크레딧 소모가 가장 적다고 언급됨. 대본 품질도 '본인이 직접 쓴 것보다 낫다'는 후기가 공유됨.","category":"concept","aliases":["Haiku"],"appearedDates":["2026-03-21"],"mentionRank":29},{"id":"term-105","term":"휴먼터치","definition":"자동화 과정에서 사람이 직접 개입하여 자유도를 높이는 것. 렌더링을 로컬 캡컷에서 수행하는 이유 중 하나로 강사가 언급함.","category":"concept","aliases":[],"appearedDates":["2026-03-18"],"mentionRank":29}];
