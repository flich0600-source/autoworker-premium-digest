1.json"}],"aggregatedFAQ":[{"id":"faq-1","question":"클로드 Pro vs Max 요금제 — 어떤 플랜을 써야 하고, 사용량 한도는 어떻게 관리하나요?","totalFrequency":38,"category":"비용/결제","answer":"Pro는 Opus 사용 시 5시간 롤링 한도와 1주일 한도가 있어 스킬 1~2개 만들면 금방 소진됩니다. Max x5($100)는 Pro의 5배 용량으로 10분 영상 대본 기준 약 30% 소모합니다. Max x20은 동시 4개 이상 작업 시 해당됩니다. 낮은 플랜으로 시작 후 사용량 파악 뒤 차액만 내고 업그레이드 가능합니다. 연습 단계에서는 Sonnet으로 절약하고, 실제 제작에서만 Opus를 투입하는 혼용 전략이 효과적입니다. Pro에서 Max로 업그레이드 후 VS Code에서 미반영 시 /logout → /login으로 재접속하면 됩니다.","solution":"1. 처음에는 Pro($20)로 시작하여 사용 패턴 파악\n2. 대본 작업량이 많으면 Max x5($100)로 업그레이드 (차액만 결제)\n3. 연습·수정은 Sonnet, 핵심 작업만 Opus 사용\n4. /status 명령어로 사용량 수시 확인\n5. 미국 피크타임 외(한국 시간 새벽~오후) 2배 이벤트 시간대 활용\n6. Gemini AI 스튜디오(무료)로 기획 초별 작업 후 클로드에 투입하면 토큰 절감\n7. Pro→Max 업그레이드 후 VS Code 미반영 시 /logout → /login 재접속","answeredBy":["강사","조교","경험자"],"appearedDates":["2026-03-18","2026-03-20","2026-03-21","2026-03-22","2026-03-28","2026-03-30","2026-03-31"],"tags":["클로드","요금제","Pro","Max","Opus","Sonnet","토큰","사용량","VS Code"]},{"id":"faq-2","question":"튜브워커 접속/로그인이 안 되거나 프로그램을 수령하지 못했는데 어떻게 하나요?","totalFrequency":36,"category":"기술문제","answer":"튜브워커는 여러 차례 서버 점검과 주소 변경이 있었습니다. 최신 접속 주소는 tube.autoworkers.ai이며, 비밀번호 복붙 시 공백이 포함될 수 있으므로 직접 입력을 권장합니다. 최초 수령은 과제를 카페에 제출한 후 구글폼 작성 시 이메일로 접속 정보가 발송됩니다. 구글폼 작성 여부를 먼저 확인하고, 미수신 시 카페 닉네임을 조교에게 알려주면 확인 가능합니다.","solution":"1. 최신 접속 주소 확인: tube.autoworkers.ai\n2. 로그인 오류 시 비밀번호를 직접 타이핑 (복붙 공백 주의)\n3. 이전에 비밀번호를 변경했다면 변경된 비밀번호 입력\n4. 그래도 안 되면 조교에게 비밀번호 초기화 요청\n5. 최초 수령은 과제 제출 → 구글폼 작성 → 이메일 수신 순서\n6. 접속 불가 시 Ctrl+Shift+R(강제 새로고침) 시도\n7. 구글폼 미작성 시 카페 닉네임을 조교에게 전달하여 확인","answeredBy":["강사","조교"],"appearedDates":["2026-03-20","2026-03-21","2026-03-23","2026-03-24","2026-03-26","2026-03-27","2026-03-31"],"tags":["튜브워커","로그인","접속","비밀번호","서버점검","구글폼"]},{"id":"faq-3","question":"캡컷에서 튜브워커 프로젝트가 안 보이거나 미디어 분실/압축/자막 오류가 발생합니다","totalFrequency":19,"category":"기술문제","answer":"프로젝트 압축 파일을 반드시 풀어야 하며, 풀린 폴더를 캡컷 Draft 경로에 넣은 후 캡컷을 재시작해야 합니다. 폴더가 이중으로 생성되는 경우 내부 폴더를 한 단계 꺼내야 합니다. 윈도우 기본 압축 프로그램은 파일명이 길면 실패할 수 있으므로 7-Zip 또는 반디집 사용을 권장합니다. 반디집 설치로 캡컷 자막·음성 오류가 해결되는 사례도 있습니다.","solution":"1. 압축 해제 시 7-Zip 또는 반디집 프로그램 사용 권장\n2. 파일명을 영문 짧은 이름으로 변경 후 압축 해제\n3. 캡컷 Draft 경로에 프로젝트 폴더 이동 (윈도우: Local\\CapCut\\User Data\\Projects\\com.lveditor.draft)\n4. 폴더 안에 같은 이름의 폴더가 중첩되어 있으면 내부 폴더를 꺼냄\n5. 캡컷 재시작\n6. 미디어 분실 시 해당 구간에 영상을 수동으로 교체\n7. 자막·음성 오류 시 반디집으로 재압축 해제 시도","answeredBy":["조교","경험자"],"appearedDates":["2026-03-21","2026-03-22","2026-03-27","2026-03-31"],"tags":["캡컷","프로젝트연동","압축해제","7-Zip","반디집","미디어분실","Draft경로"]},{"id":"faq-4","question":"그록(Grok) 유료화 이후 영상 생성이 안 되는데 어떻게 하나요?","totalFrequency":17,"category":"기술문제","answer":"그록이 유료화되면서 외부 연동이 불안정해졌습니다. 유료 가입해도 영상 생성이 됐다 안됐다 반복합니다. 이미지만 전부 생성 완료되면 그록 영상 없이 캡컷 프로젝트 내보내기가 가능합니다. 영상 생성 시 브라우저 창 5~10개를 동시에 띄워 병렬작업하면 효율적입니다. 강사 측에서 우회 방법을 검토 중이므로 당장 그록 유료 결제는 보류하는 것이 좋습니다.","solution":"1. 당장 그록 유료 결제하지 말고 추가 공지 대기\n2. 훅 영상 생성 단계에서 '건너뛰기'로 넘어가기\n3. 이미지를 전부 생성 완료한 후 캡컷 프로젝트 내보내기 진행\n4. 영상 생성 시 브라우저 창 5~10개 동시 병렬작업 가능\n5. 쿠키에는 로그인 정보가 포함되므로 외부 노출 주의\n6. 조교 대국밥의 해결 방안 공지 대기","answeredBy":["조교","경험자"],"appearedDates":["2026-03-19","2026-03-20","2026-03-21","2026-03-22","2026-03-30"],"tags":["그록","Grok","유료화","영상생성","연동오류","병렬작업"]},{"id":"faq-5","question":"VSCode/클로드 데스크톱 설정 오류 (바이패스 권한, 폴더 트리, 파일 복사, 연동 등)","totalFrequency":17,"category":"도구사용","answer":"VSCode에서 바이패스 퍼미션은 클로드코드 확장프로그램 설치 후 설정 화면에서 활성화합니다. 클로드 데스크톱은 파일 복사·붙여넣기가 직접 지원되지 않으며, 코드 탭에서 작업 경로를 먼저 지정해야 합니다. VSCode에서 탐색기가 안 보이면 파일 → 폴더 열기로 선택합니다. VS Code를 2대 컴퓨터에서 연동하는 것은 가능하나 설정이 복잡합니다. Pro→Max 업그레이드 후 미반영 시 /logout → /login으로 재접속합니다.","solution":"1. VSCode 바이패스: 확장프로그램 설치 → 설정에서 bypass permissions 활성화\n2. VSCode 한국어: Ctrl+Shift+P → 'Configure Display Language' → 한국어\n3. 탐색기 안 보임: 파일 → 폴더 열기로 해당 폴더 선택\n4. Claude Desktop: 코드 탭에서 작업 경로(폴더) 먼저 지정\n5. 파일 직접 복사·붙여넣기 대신 폴더 경로로 작업\n6. 2대 컴퓨터 연동: 가능하나 크롬 원격 데스크톱이 더 편리\n7. Pro→Max 업그레이드 후 미반영 시 /logout → /login 재접속","answeredBy":["조교","경험자"],"appearedDates":["2026-03-19","2026-03-22","2026-03-23","2026-03-25","2026-03-26","2026-03-30","2026-03-31"],"tags":["VSCode","클로드데스크톱","바이패스","폴더열기","한국어설정","원격데스크톱"]},{"id":"faq-6","question":"스킬 폴더 다운로드 후 클로드 코드에서 인식/실행이 안 됩니다","totalFrequency":16,"category":"도구사용","answer":"스킬 폴더를 바탕화면에 저장 후 클로드 데스크톱 앱 좌측 '폴더 열기'로 해당 폴더를 지정합니다. 폴더명에 한글이나 특수기호가 포함되면 인식 오류가 발생하므로 영문/숫자로 변경해야 합니다. 새 창을 열 때마다 스킬 분석·실행을 명시적으로 요청하거나 CLAUDE.md에 고정 참조 설정이 필요합니다.","solution":"1. 스킬 폴더를 바탕화면에 압축 해제\n2. 폴더명이 한글이면 영문으로 변경 (예: '2주차스킬' → 'week2-skill')\n3. 폴더 경로 전체에 한글이 없는지 확인\n4. Claude Desktop 앱에서 '폴더 열기'로 해당 폴더 선택\n5. '이 폴더 분석하고 실행해줘' 명령 입력\n6. 2주차 스킬의 경우 구글드라이브 수정본 사용","answeredBy":["조교","경험자"],"appearedDates":["2026-03-21","2026-03-23","2026-03-25","2026-03-27"],"tags":["스킬","클로드코드","폴더설정","설치","한글오류"]},{"id":"faq-7","question":"강의 진도를 못 따라가겠는데 어떻게 해야 하나요? 강의 일정이 헷갈립니다.","totalFrequency":16,"category":"수강환경","answer":"정규 라이브 강의만 우선 수강하면 충분합니다. 프리미엄반은 플러스알파이므로 기본만 제대로 하면 됩니다. 1~2주차는 유튜브 자동화·수익화 실전 집중이며, 3주차부터 바이브코딩 입문, 5주차에 n8n 순서입니다. 메인은 목요일 정규강의이며, 프리미엄 강의는 매주 화요일 고정이 아니라 추가로 진행되는 경우가 있습니다. 각자의 시간대와 페이스에 맞춰 진행하면 됩니다.","solution":"1. 목요일 정규강의 필수 참석/VOD 시청\n2. 프리미엄반 특강은 추가 보충이므로 부담 갖지 않기\n3. 1주차 정규강의·스킬강의부터 먼저 수강\n4. 프리미엄 강의 일정은 공지방에서 수시 확인\n5. 벽타기 정리본·오토위키로 놓친 내용 보충\n6. 각자 페이스에 맞게 진행 (강사 권장)","answeredBy":["강사"],"appearedDates":["2026-03-24","2026-03-25","2026-03-31"],"tags":["학습페이스","커리큐럼","정규강의","멘탈관리","프리미엄강의일정"]},{"id":"faq-8","question":"노션 링크/강의 자료/VOD는 어디서 확인하나요?","totalFrequency":14,"category":"수강환경","answer":"강의 노션은 wiki.autoworkers.ai(오토위키)에서 확인합니다. 강의 영상(VOD)·과제는 네이버 카페 자료실에서 확인합니다. 정규강의 VOD는 다음날 점심 12시에 카페에 업로드됩니다. 프리미엄반 전용 노션은 별도 링크가 제공되며, 프리미엄 강의도 VOD로 제공됩니다. 노션과 카페 내용이 동일하지 않으므로 노션 먼저, 과제·강의는 카페에서 확인합니다.","solution":"1. 통합 위키: wiki.autoworkers.ai\n2. 강의 VOD·과제: 네이버 카페 자료실\n3. VOD 업로드: 정규강의 다음날 점심 12시\n4. 프리미엄반 노션: 별도 전달된 링크 사용\n5. 프리미엄 강의 포함 모든 강의 VOD 제공\n6. 카톡방에서 /오토위키 입력 시 위키 링크 자동 응답\n7. 질의응답 정리본: 카페 및 노션에 매일 업로드","answeredBy":["강사","조교"],"appearedDates":["2026-03-19","2026-03-21","2026-03-24","2026-03-26","2026-03-31"],"tags":["노션","오토위키","VOD","카페","강의자료","다시보기"]},{"id":"faq-9","question":"PC 사양은 얼마나 필요하고, 추가 장비(모니터 등)가 필요한가요?","totalFrequency":13,"category":"수강환경","answer":"렌더링은 로컨 캡컷에서 수행하며 최소 RAM 8GB 이상 권장, 16GB이면 충분합니다. 그래픽카드는 불필요합니다. 노트북 한 대로도 충분하며, 포터블 모니터(10만 원 초반)나 중고 태블릿을 외부 모니터로 연결하면 효율이 크게 올라갑니다. 실제 작업할 메인 기기로 실습하고, 다른 기기로 강의를 시청하는 방식을 권장합니다. 맥미니 중고 구입은 용도(영상 제작 vs 도구 상시 구동)에 따라 선택 기준이 달라집니다.","solution":"1. 최소 RAM 8GB 이상 (16GB 권장, 그래픽카드 불필요)\n2. 노트북 한 대로 충분, 듀얼 모니터 추천\n3. 포터블 모니터(10만 원 초반) 또는 태블릿 외부 모니터 활용\n4. 오토위키 공지의 최소/권장 사양을 클로드에 붙여넣고 구매 조건 질문\n5. 컴퓨터 교체보다 외부 모니터 우선 추천\n6. 메인 기기에서 실습, 보조 기기에서 강의 시청","answeredBy":["강사"],"appearedDates":["2026-03-18","2026-03-19","2026-03-30"],"tags":["PC사양","RAM","노트북","모니터","포터블모니터","장비","맥미니"]},{"id":"faq-10","question":"유튜브 대본(자막) 추출 및 벤치마킹 채널 분석 방법은?","totalFrequency":12,"category":"콘텐츠제작","answer":"벤치마킹 채널의 대본 추출 방법은 여러 가지입니다. grabbit 크롬 확장프로그램으로 자막을 스크래핑하거나, 유튜브 영상 URL을 NotebookLM에 넣어 자막을 추출할 수 있습니다. 쟼스가 제작한 IVT_Pickup 도구로 채널 단위 일괄 대본 추출도 가능합니다. 추출한 대본 3~5개를 AI에게 분석 요청하여 지침서(md파일)로 변환하는 것이 기본 워크플로우입니다.","solution":"1. grabbit 크롬 확장프로그램 설치 후 자막 스크래핑\n2. 또는 유튜브 URL을 NotebookLM에 넣어 자막 추출\n3. 대본 3~5개 수집 후 AI에 글의 특징/구조 분석 요청\n4. 분석 결과를 지침서(md파일)로 변환\n5. 지침서를 스킬에 적용하여 대본 자동 생성\n6. 바이브코딩으로 직접 도구 제작도 가능","answeredBy":["경험자"],"appearedDates":["2026-03-25"],"tags":["대본추출","벤치마킹","grabbit","NotebookLM","지침서"]},{"id":"faq-11","question":"유튜브 채널 개설/계정 분리/카테고리 차별화는 어떻게 하나요?","totalFrequency":12,"category":"콘텐츠제작","answer":"기존 유튜브 프리미엄 계정과 분리해 새 구글 계정으로 채널 개설을 권장합니다. 기본 원칙은 1계정 1채널 1애드센스입니다. 카테고리는 니치로 세분화하여 진입하는 것이 효과적입니다. 예를 들어 경제학이라면 금, 은, 주식, 거시경제 등으로 세분화합니다. 롱폼 업로드 후 2주 정도 조회수 추이를 지켜보는 것이 좋습니다.","solution":"1. 기존 계정과 분리하여 새 구글 계정으로 채널 개설\n2. 카페 유스타터 강의 선행 수강 권장\n3. 1계정 1채널 1애드센스 원칙 준수\n4. 큰 카테고리보다 니치(세분화된 하위 분야)로 진입\n5. 롱폼 업로드 후 2주간 조회수 추이 관찰\n6. 고급 인증(전화번호) 완료 → 15분 초과 롱폼 업로드 가능","answeredBy":["강사","경험자"],"appearedDates":["2026-03-18","2026-03-25"],"tags":["유튜브채널","계정분리","애드센스","니치","카테고리"]},{"id":"faq-12","question":"이미지에 외국인이 나오거나 싱크가 맞지 않는 문제는 어떻게 해결하나요?","totalFrequency":11,"category":"기술문제","answer":"기본 스타일(실사/시네마틱) 사용 시 외국인이 나올 수 있으므로 반드시 커스텀 스타일을 먼저 만들고 동양인(한국인)으로 명시해야 합니다. 이미지를 전부 생성 완료한 후 프로젝트를 생성해야 싱크가 맞습니다. 이미지 생성 실패 시 해당 이미지만 재생성하면 크레딧이 추가 차감되지 않습니다.","solution":"1. 커스텀 스타일 생성 시 '등장인물은 모두 한국인' 명시\n2. 이미지를 전부 생성 완료한 후 프로젝트 생성 (싱크 보장)\n3. 실사 이미지 거부 시 '등장인물은 모두 허구의 인물' 추가\n4. 이미지 생성 실패 시 해당 이미지만 재생성 (크레딧 미차감)\n5. 커스텀 스타일은 최대 4개까지 생성 가능 (오른쪽 상단 X로 삭제)\n6. 카메라 효과(움직임)는 캡컷 완성 단계에서 별도 설정","answeredBy":["강사","조교"],"appearedDates":["2026-03-21","2026-03-23","2026-03-28"],"tags":["이미지생성","커스텀스타일","한국인","싱크","크레딧"]},{"id":"faq-13","question":"스킬 제작 및 대본 생성은 Claude Code와 Claude.ai 중 어디서 해야 하나요?","totalFrequency":10,"category":"도구사용","answer":"기획·스킬 파일 작성·대본 생성 전 과정을 일반 Claude.ai에서 진행하고, 완성된 스킬 파일을 다운로드해 Claude Code에 설치만 하는 방식이 토큰 효율이 높습니다. Claude Code에서 Opus로 직접 작업하면 내부 추론 사이클이 8회 이상 돌아 사용량이 3~5배 빨리 소진됩니다. 안티그래비티(Antigravity)에서도 Opus가 있어 스킬·대본 작업이 가능하며, 품질이 크게 떨어지지 않습니다. 핵심 에이전트(draft 포함)는 Opus 권장, 팩트체크는 Sonnet으로도 충분합니다.","solution":"1. Claude.ai(일반 대화창)에서 스킬 기획·설계·파일 작성\n2. 완성 파일을 다운로드하여 Claude Code에 설치만 실행\n3. 핵심 에이전트는 Opus, 팩트체크는 Sonnet 사용\n4. 클로드 비밀(시크릿) 모드에서는 스킬 작업 불가 → 일반 창 사용\n5. 안티그래비티에서도 Opus로 스킬·대본 작업 가능\n6. ESC 키로 Claude Code 실행 중 강제 중단 가능","answeredBy":["강사","조교","경험자"],"appearedDates":["2026-03-20","2026-03-24","2026-03-31"],"tags":["클로드코드","Claude.ai","토큰최적화","스킬제작","Opus","Sonnet","안티그래비티"]},{"id":"faq-14","question":"클로드 구독 결제는 월결제와 연결제 중 무엇이 좋고, 사전에 준비할 것은?","totalFrequency":7,"category":"비용/결제","answer":"AI 업계의 판도가 단기간에 바뀌므로 연결제는 지양하고 월 20달러 월결제를 권장합니다. 수업 전에는 Claude만 결제하면 충분하며, API 발급 등 나머지는 강의 시간에 안내됩니다. Vertex AI 가입 시 구글 클라우드 300달러 무료 크레딧(90일)을 활용할 수도 있습니다.","solution":"1. Claude Pro 월결제($20/월)로 시작\n2. 연결제(1년 약정) 지양 — AI 시장 변화가 빠름\n3. API 발급·추가 도구는 강의 시간에 안내되므로 사전 준비 불필요\n4. Vertex AI 신규 가입 시 $300 무료 크레딧 활용 가능\n5. 브라우저 자동화 우회는 약관 위반이므로 주의","answeredBy":["강사"],"appearedDates":["2026-03-19"],"tags":["클로드","구독","월결제","API","Vertex AI"]},{"id":"faq-15","question":"튜브워커 크레딧이 부족한데 충전/환불은 어떻게 하나요?","totalFrequency":7,"category":"비용/결제","answer":"크레딧은 구글폼을 통해 충전 가능하며, 오전 9시~밤 12시 매시 정각에 순차 지급됩니다. 결제 2회 시 폼도 2번 작성해야 합니다. 크레딧 구매 시 사용 아이디(닉네임이 아닌 아이디)를 기재해야 합니다. 현금영수증은 카드결제 모듈 추가 후 일괄 처리 예정입니다. 크레딧은 복구 불가이므로 강의를 먼저 시청 후 작업하는 것이 중요합니다.","solution":"1. 크레딧 충전 구글폼 작성 (오전 9시~밤 12시 매시 정각 지급)\n2. 구매 시 사용 아이디(닉네임 아닌 아이디, 예: autoworker00) 기재\n3. 결제 2회 시 폼도 2번 작성\n4. 현금영수증은 카드결제 모듈 추가 후 일괄 처리 예정\n5. 크레딧은 복구 불가 → 강의 영상 먼저 시청 후 작업","answeredBy":["조교","경험자"],"appearedDates":["2026-03-23","2026-03-26","2026-03-27","2026-03-28"],"tags":["크레딧","충전","결제","구글폼","환불"]},{"id":"faq-16","question":"과제 제출은 어디서 어떻게 하나요?","totalFrequency":7,"category":"수강환경","answer":"스킬로 만든 대본을 카페 과제제출 게시판에 업로드합니다. 과제 영상 길이는 7~10분 기준입니다. 파일 업로드 서버 거부 오류 시 첨부파일 없이 제출 버튼 클릭으로 제출 가능합니다. 1주차 과제는 구글폼 작성 후 사담방 숙제 릴레이에 기재하며, 채널에 영상 업로드하는 것까지가 과제입니다.","solution":"1. 카페 과제제출 게시판에 대본 업로드\n2. 영상 길이 7~10분 기준\n3. 파일 업로드 오류 시 첨부파일 없이 제출 가능\n4. 구글폼 작성 후 사담방 숙제 릴레이에 기재\n5. 채널에 영상 업로드까지가 과제 완료","answeredBy":["강사","경험자"],"appearedDates":["2026-03-22","2026-03-27"],"tags":["과제","제출","카페","숙제릴레이"]},{"id":"faq-17","question":"대본 글자수/퀸리티가 만족스럽지 않은데 어떻게 개선하나요?","totalFrequency":7,"category":"콘텐츠제작","answer":"글자수 대신 바이트 수(글자수 x 3배)로 요청하면 클로드의 글자수 준수율이 개선됩니다. 또는 클로드에게 글자수 카운트 후 재검수를 반복 요청하는 방법도 있습니다. Opus 모델 사용 시 준수율이 높습니다. 퀸리티가 낮다고 느끼는 구체적 부분(문맥, 흐름, 이탈방지, 후킹 등)을 먼저 파악한 뒤, 개선 방향을 클로드와 함께 논의하며 작업하는 것을 권장합니다. 레퍼런스 4~5개를 넣고 채널 2개로 병렬작업하면 효율적입니다.","solution":"1. 글자수 대신 바이트 수(글자수 x 3)로 요청\n2. 클로드에게 글자수 카운트 후 재검수 반복 요청\n3. Opus 모델 사용으로 준수율 향상\n4. 퀸리티 개선 시 문맥·흐름·후킹 등 구체적 문제점 먼저 파악\n5. 레퍼런스 대본 4~5개 넣고 병렬작업으로 효율 향상\n6. 메모리 문제 시 작업 지시를 명시적으로 강제","answeredBy":["조교","경험자"],"appearedDates":["2026-03-24","2026-03-25","2026-03-30"],"tags":["대본","글자수","바이트수","프롬프트팁","퀸리티","병렬작업"]},{"id":"faq-18","question":"Whisk 쿠키 설정이 안 되거나 한글이 깨지는데 어떻게 하나요?","totalFrequency":6,"category":"도구사용","answer":"쿠키는 labs.google/fx/ko/tools/whisk에서 생성해야 합니다. Cookie Editor 크롬 확장프로그램(검은 초코칩 쿠키 아이콘이 올바른 버전)에서 Export → Header String을 선택하여 붙여넣기합니다. API 키와 쿠키는 별개 개념이므로 혼동에 주의합니다. 위스크는 한글 렌더링을 지원하지 않으므로 이미지에 한글 텍스트를 최대한 배제해야 합니다.","solution":"1. labs.google/fx/ko/tools/whisk 접속\n2. Cookie Editor 크롬 확장프로그램 설치 (검은 초코칩 쿠키 아이콘)\n3. Export → Header String 선택하여 복사\n4. 복사한 값을 튜브워커 이미지 생성에 붙여넣기\n5. API 키와 쿠키는 별개 → 혼동 주의\n6. 위스크는 한글 미지원 → 이미지에 한글 텍스트 배제","answeredBy":["조교","경험자"],"appearedDates":["2026-03-27","2026-03-30"],"tags":["Whisk","쿠키","Cookie Editor","이미지생성","한글"]},{"id":"faq-19","question":"일레븐랩스 API 키 연동/음성 설정은 어떻게 하나요?","totalFrequency":5,"category":"도구사용","answer":"워크스페이스 ID와 API 키는 별개입니다. 기존 API 키를 저장하지 않았다면 새 API 키를 발급받아야 합니다. 튜브워커 설정 메뉴(좌측 하단 계정 프로필 → 설정)에서 직접 입력합니다. V3 모델은 감정이 풍부하나 2000자 이상이면 이음새가 틀므로 2000자 단위 분할을 권장합니다. 개인 API 키가 없으면 입력하지 않아도 됩니다.","solution":"1. 일레븐랩스에서 새 API 키 발급\n2. 튜브워커 설정(좌측 하단 계정 프로필 → 설정)에서 API 키 입력\n3. 워크스페이스 ID와 API 키 혼동 주의\n4. V3 모델 사용 시 2000자 단위로 분할 권장\n5. 글자 수 22~23 설정이 적정\n6. 개인 API 없으면 입력 불필요 — 영상 강의 먼저 시청","answeredBy":["조교","경험자"],"appearedDates":["2026-03-23","2026-03-27"],"tags":["일레븐랩스","API키","음성생성","TTS","V3"]},{"id":"faq-20","question":"튜브워커에서 여러 작업을 동시에 진행하거나 컴퓨터를 꺼도 괜찮나요?","totalFrequency":5,"category":"기술문제","answer":"현재 튜브워커는 동시작업이 지원되지 않으며, 하나 작동 중이면 다른 작업은 불가합니다. 추후 동시작업 지원이 풀릴 예정입니다. 튜브워커 작업은 서버에 저장되므로 컴퓨터를 꺼도 진행 상황이 유지됩니다. 다만 클로드 코드(클코) 대본 작업 중에는 컴퓨터를 끄지 말아야 합니다.","solution":"1. 튜브워커는 현재 동시작업 미지원 (추후 풀릴 예정)\n2. 하나 작동 중이면 다른 작업 불가\n3. 튜브워커 작업은 서버 저장 → 컴퓨터 꺼도 유지\n4. 클로드 코드 대본 작업 중에는 컴퓨터 끄지 말 것","answeredBy":["조교","경험자"],"appearedDates":["2026-03-28","2026-03-30","2026-03-31"],"tags":["튜브워커","동시작업","서버저장","작업유지"]},{"id":"faq-21","question":"스토리보드 생성 버튼 중복 클릭 시 크레딧이 이중 차감되나요?","totalFrequency":5,"category":"기술문제","answer":"스토리보드 생성 시 크레딧 차감 확인 경고창이 뜨며, '확인' 버튼을 눌러야 차감됩니다. 확인창 없이 실수로 두 번 누른 경우는 서버·네트워크 오류 여부 확인 후 복구 가능합니다. 이미지 생성 단계는 크레딧 차감 없습니다. 한 번 생성 후 버튼이 '재생성'으로 변경되도록 UI 개선이 건의되었습니다.","solution":"1. 스토리보드 생성 전 크레딧 차감 확인창에서 신중히 확인\n2. 확인창 없이 중복 생성된 경우 조교에게 복구 요청\n3. 이미지 생성 단계는 크레딧 차감 없음\n4. UI 개선(재생성 버튼 변경)이 건의된 상태","answeredBy":["조교"],"appearedDates":["2026-03-23","2026-03-31"],"tags":["스토리보드","크레딧","중복생성","UI개선"]},{"id":"faq-22","question":"클로드 API 529 오류가 계속 발생합니다","totalFrequency":4,"category":"기술문제","answer":"Error 529는 Claude API 서버 과부하(overloaded_error) 상태로, 트래픽이 몰려 요청 처리가 불가한 상황입니다. 사용량 초과와는 다른 문제이며, 월 1~2회 발생 수준입니다. 잠시 기다렸다가 재시도하면 해결됩니다.","solution":"1. 529 에러는 서버 과부하 → 사용량 초과와 구분 필요\n2. 잠시(수 분~수십 분) 기다렸다가 재시도\n3. 월 1~2회 발생 수준으로 일시적 현상\n4. 지속 시 다른 AI(Gemini 등)로 임시 대체 작업","answeredBy":["경험자"],"appearedDates":["2026-03-18","2026-03-27"],"tags":["클로드","529오류","서버과부하","API"]},{"id":"faq-23","question":"자막 싱크가 안 맞을 때 해결 방법은?","totalFrequency":4,"category":"기술문제","answer":"캡컷 자동측션 대신 캡컷에서 자막을 제거한 뒤 브루(Vrew)로 가져가 자막을 재생성하는 방법이 최선입니다. 20분 영상 기준 자막 어긋남은 2회 정도 발생하나 심하지 않습니다. TTS 사용 시 2000자 초과하면 음성이 변할 수 있으므로 주의합니다.","solution":"1. 캡컷에서 자동측션 제거\n2. 브루(Vrew)로 가져가서 자막 재생성\n3. TTS 2000자 초과 시 음성 변화 주의 → 2000자 단위 분할\n4. 커스텀 음성 사용 권장\n5. 20분 기준 2회 정도 어긋남은 정상 범위","answeredBy":["경험자"],"appearedDates":["2026-03-22","2026-03-28"],"tags":["자막싱크","캡컷","브루","TTS","커스텀음성"]},{"id":"faq-24","question":"클로드와 제미나이를 연동해서 이미지 생성/영상 분석에 활용할 수 있나요?","totalFrequency":4,"category":"도구사용","answer":"Vertex AI API를 통해 Gemini 호출이 가능하며, 구글 클라우드 신규 가입 시 300달러 크레딧이 제공됩니다. 클로드는 유튜브 영상 직접 분석이 불가하지만 파이썬 코드를 이용해 더 정확하게 분석합니다. 제미나이는 구글 연동으로 영상 분석이 가능하며, 기획 단계에서 Gemini AI 스튜디오(무료)를 먼저 활용하면 토큰 절약에 효과적입니다.","solution":"1. Vertex AI 가입 → 구글 클라우드 $300 크레딧 90일 제공\n2. Vertex AI에서 API 발급 후 클로드에 연결\n3. 기획 단계: Gemini AI 스튜디오(무료) 활용\n4. 영상 분석: 제미나이에 유튜브 URL 입력\n5. 브라우저 자동화 우회는 약관 위반 주의","answeredBy":["강사","경험자"],"appearedDates":["2026-03-24","2026-03-25"],"tags":["제미나이","Vertex AI","API","영상분석","구글클라우드"]},{"id":"faq-25","question":"캡컷 유료 버전이 필요한가요? 줌(Zoom)은 무료인가요?","totalFrequency":3,"category":"비용/결제","answer":"캡컷 무료 버전으로 사용 가능합니다. 브루(Vrew)는 이번 강의 필수 도구 목록에 없습니다. 줌은 무료이며 강의 전 공지방에 링크가 올라오면 해당 링크로 입장하면 됩니다. 노션도 별도 구매 불필요합니다.","solution":"1. 캡컷: 무료 버전 사용 가능\n2. 줌: 무료 — 공지방 링크로 입장\n3. 노션: 별도 구매 불필요 (기존 계정 사용 가능)\n4. 브루(Vrew): 강의 필수 아님 — 기존 연결제 해지 고려 가능","answeredBy":["강사","조교"],"appearedDates":["2026-03-18"],"tags":["캡컷","줌","무료","노션","브루"]},{"id":"faq-26","question":"플레이리스트(플리) 자동화가 가능한가요?","totalFrequency":2,"category":"콘텐츠제작","answer":"현재 강사의 자동화 프로그램으로는 플레이리스트 자동화가 불가능하며, 완전히 다른 방식이 필요합니다. 추후 별도 검토 예정입니다.","solution":"채팅에서 구체적 해결방안 미제공. 강사가 추후 별도 검토 예정이라고 안내.","answeredBy":["강사"],"appearedDates":["2026-03-19"],"tags":["플레이리스트","자동화","유튜브"]},{"id":"faq-27","question":"유튜브에 유료 광고를 돌려야 조회수가 오르나요?","totalFrequency":2,"category":"콘텐츠제작","answer":"유튜브 숙폼·롱폼 모두 유료 광고 없이 알고리즘으로 조회수를 올리는 것이 일반적입니다. 광고는 제휴마케팅 등 특수 목적 외에는 효율이 낮습니다.","solution":"1. 유료 광고 없이 알고리즘 중심 전략 추천\n2. 콘텐츠 퀸리티와 일관성에 집중\n3. 채널 초기에는 1~2개 영상 업로드가 최적\n4. 유료 광고는 제휴마케팅 등 특수 목적에만 활용","answeredBy":["경험자"],"appearedDates":["2026-03-20"],"tags":["유튜브","광고","알고리즘","조회수"]}]};
</script>

window.switchTab=switchTab;
function initTabScrollHint(){var wrap=document.getElementById('tabBarWrap'),bar=document.getElementById('tabBar');if(!bar||!wrap)return;bar.addEventListener('scroll',function(){if(bar.scrollLeft+bar.clientWidth>=bar.scrollWidth-10)wrap.classList.add('scroll-end');else wrap.classList.remove('scroll-end')})}
function renderDateGrid(){var grid=document.getElementById('dateGrid'),dates=Object.keys(window.__dateData__).sort();grid.innerHTML=dates.map(function(d,i){var data=window.__dateData__[d],meta=data.meta,summary=data.dailySummary||{},isLatest=i===dates.length-1,sentiment=summary.sentiment||'보통',sc=sentiment==='활발'?'active-dot':sentiment==='조용'?'quiet-dot':'moderate-dot';return'<button class="date-btn'+(isLatest?' active':'')+'" data-date="'+d+'" onclick="selectDate(\''+d+'\',this)"><span class="date-sentiment-dot '+sc+'"></span><span class="date-btn-label">'+fds(d)+'</span>'+(isLatest?'<span class="date-btn-badge">\u2605 최신</span>':'')+'<span class="date-btn-count">'+meta.totalMessages+'</span></button>'}).join('');var latestDate=dates[dates.length-1];selectDate(latestDate,grid.querySelector('.date-btn.active'))}
function selectDate(date,btn){document.querySelectorAll('.date-btn').forEach(function(b){b.classList.remove('active')});if(btn)btn.classList.add('active');var data=window.__dateData__[date];if(!data)return;renderDailySummary(data.dailySummary,data.meta);renderDayContent(data);observeAll()}
window.selectDate=selectDate;
function navigateDate(dir){var dates=Object.keys(window.__dateData__).sort(),cb=document.querySelector('.date-btn.active');if(!cb)return;var cd=cb.dataset.date,idx=dates.indexOf(cd),ni=Math.max(0,Math.min(dates.length-1,idx+dir));if(ni!==idx){var nb=document.querySelector('.date-btn[data-date="'+dates[ni]+'"]');selectDate(dates[ni],nb);nb.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'})}}
window.navigateDate=navigateDate;
function renderDailySummary(summary,meta){var el=document.getElementById('dailySummary');if(!summary||!summary.headline){el.innerHTML='';return}var s=summary.sentiment||'보통',sc=s==='활발'?'active':s==='조용'?'quiet':'moderate';el.innerHTML='<div class="daily-summary-card"><div class="summary-headline"><span class="icon-badge summary">\ud83d\udccb</span><h3>'+esc(summary.headline)+'</h3></div><div class="summary-sentiment"><span class="sentiment-badge '+sc+'">'+esc(s)+'</span><span class="summary-meta">주제 '+(summary.topicCount||0)+'개 \xb7 메시지 '+meta.totalMessages+'개</span></div><ul class="summary-keypoints">'+(summary.keyPoints||[]).map(function(p){return'<li>'+esc(p)+'</li>'}).join('')+'</ul></div>'}
function renderDayContent(data){var el=document.getElementById('dayContent'),h='';h+='<div class="stats-row fade-in"><div class="stat-pill"><div class="num" data-count="'+data.meta.totalMessages+'">0</div><div class="stat-label">메시지</div></div><div class="stat-pill"><div class="num" data-count="'+(data.meta.totalAnswered||0)+'">0</div><div class="stat-label">답변</div></div><div class="stat-pill"><div class="num" data-count="'+(data.topQA?data.topQA.length:0)+'">0</div><div class="stat-label">Q&A</div></div><div class="stat-pill"><div class="num" data-count="'+(data.insights?data.insights.length:0)+'">0</div><div class="stat-label">인사이트</div></div></div>';if(data.announcements&&data.announcements.length){h+='<h2 class="section-title"><span class="icon-badge ann">\ud83d\udce2</span> 주요 공지</h2>';data.announcements.forEach(function(a){h+='<div class="ann-card fade-in"><span class="ann-priority-badge '+(a.priority||'medium')+'">'+esc(a.priority==='high'?'중요':a.priority==='medium'?'참고':'정보')+'</span><div class="ann-content">'+esc(a.content)+'</div><div class="ann-meta">'+esc(a.author)+' \xb7 '+esc(a.time)+'</div></div>'})}if(data.insights&&data.insights.length){h+='<h2 class="section-title"><span class="icon-badge ins">\ud83d\udca1</span> 인사이트</h2>';data.insights.forEach(function(ins){h+='<div class="ins-card fade-in"><div class="ins-content">'+esc(ins.content)+'</div><div class="ins-meta"><span class="ins-category">'+esc(ins.category)+'</span> '+esc(ins.author)+'</div></div>'})}if(data.timeline&&data.timeline.length){h+='<h2 class="section-title"><span class="icon-badge tl">\u23f0</span> 타임라인</h2><div class="timeline">';data.timeline.forEach(function(t){h+='<div class="tl-item fade-in"><div class="tl-dot"></div><div class="tl-time">'+esc(t.time)+'</div><div class="tl-content">'+esc(t.summary)+(t.topicTag?'<span class="tl-tag">'+esc(t.topicTag)+'</span>':'')+'</div></div>'});h+='</div>'}if(data.topQA&&data.topQA.length){h+='<div class="qa-preview-section"><h2 class="section-title"><span class="icon-badge qa">\u2753</span> 오늘의 질문</h2><div class="qa-preview-list">';data.topQA.forEach(function(q){h+='<div class="qa-preview-item"><span class="qa-q-icon">Q</span><span class="qa-preview-text">'+esc(q.question)+'</span><span class="qa-count">'+q.frequency+'회</span></div>'});h+='</div><button class="qa-goto-faq" onclick="switchTab(\'tab-faq\',document.querySelector(\'[data-tab=tab-faq]\'))"><span class="icon-badge faq" style="width:22px;height:22px;font-size:0.8em;border-radius:6px">\ud83d\udcac</span> FAQ 탭에서 전체 답변 보기 \u2192</button></div>'}el.innerHTML=h;animateCounts();triggerTimelinePulse();observeAll()}
function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function animateCount(el,target){var dur=800,start=null;function step(ts){if(!start)start=ts;var p=Math.min((ts-start)/dur,1);el.textContent=Math.floor(easeOutCubic(p)*target);if(p<1)requestAnimationFrame(step);else el.textContent=target}requestAnimationFrame(step)}
function animateCounts(){document.querySelectorAll('.stat-pill .num[data-count]').forEach(function(el){animateCount(el,parseInt(el.dataset.count)||0)})}
function triggerTimelinePulse(){document.querySelectorAll('.tl-item').forEach(function(item,i){setTimeout(function(){item.classList.add('tl-pulse')},i*150)})}
function observeAll(){var obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target)}})},{threshold:0.1});document.querySelectorAll('.fade-in:not(.visible)').forEach(function(el){obs.observe(el)})}
function renderFaqChart(fd){var chart=document.getElementById('faqChart');if(!chart||!fd||!fd.length)return;var top10=fd.slice(0,10),mx=Math.max.apply(null,top10.map(function(f){return f.totalFrequency}));chart.innerHTML=top10.map(function(faq){var pct=mx>0?Math.round((faq.totalFrequency/mx)*100):0,label=faq.question.length>20?faq.question.substring(0,20)+'...':faq.question;return'<div class="faq-bar-item fade-in"><div class="faq-bar-label" title="'+esc(faq.question)+'">'+esc(label)+'</div><div class="faq-bar-track"><div class="faq-bar-fill" style="width:0%" data-width="'+pct+'%"><div class="faq-tooltip">'+esc(faq.question)+'</div></div></div><div class="faq-bar-count">'+faq.totalFrequency+'</div></div>'}).join('');setTimeout(function(){chart.querySelectorAll('.faq-bar-fill').forEach(function(bar){bar.style.width=bar.dataset.width})},100)}
function renderFaqList(fd){var list=document.getElementById('faqList');if(!list||!fd||!fd.length)return;list.innerHTML=fd.map(function(faq){var sh='';if(faq.solution){var lines=faq.solution.split('\n').filter(function(l){return l.trim()}),allNum=lines.every(function(l){return/^\d+\./.test(l.trim())});if(allNum)sh='<ol>'+lines.map(function(l){return'<li>'+esc(l.replace(/^\d+\.\s*/,''))+'</li>'}).join('')+'</ol>';else sh='<p>'+esc(faq.solution)+'</p>'}return'<div class="faq-card fade-in" data-category="'+esc(faq.category)+'" onclick="this.classList.toggle(\'open\')"><div class="faq-card-header"><div class="faq-q-icon">Q</div><div class="faq-question">'+esc(faq.question)+'</div><div class="faq-meta-wrap"><span class="faq-category-badge">'+esc(faq.category)+'</span><span class="faq-count-badge">'+faq.totalFrequency+'회</span></div></div><div class="faq-card-body"><div class="faq-answer"><div class="faq-answer-label"><span class="icon-badge ans">\ud83d\udca1</span> 답변'+(faq.answeredBy&&faq.answeredBy.length?' <span class="faq-answered-by">'+esc(faq.answeredBy.join(', '))+'</span>':'')+'</div><p>'+esc(faq.answer)+'</p></div>'+(faq.solution?'<div class="faq-solution"><div class="faq-solution-label"><span class="icon-badge sol">\ud83d\udd27</span> 해결방안</div><div class="faq-solution-content">'+sh+'</div></div>':'')+'<div class="faq-dates">등장: '+(faq.appearedDates||[]).map(function(d){return fds(d)}).join(', ')+'</div></div></div>'}).join('')}
function filterFAQ(category,btn){document.querySelectorAll('.faq-filter-btn').forEach(function(b){b.classList.remove('active')});btn.classList.add('active');document.querySelectorAll('.faq-card').forEach(function(card){if(category==='all'||card.dataset.category===category)card.style.display='';else card.style.display='none'})}
window.filterFAQ=filterFAQ;
function renderGlossary(){var grid=document.getElementById('glossaryGrid');if(!grid)return;var terms=window.__glossaryData__.slice().sort(function(a,b){return(a.mentionRank||999)-(b.mentionRank||999)});grid.innerHTML=terms.map(function(t){var aliases=(t.aliases||[]).filter(function(a){return a}).join(', '),dates=(t.appearedDates||[]).map(function(d){return fds(d)}).join(', '),dc=(t.appearedDates||[]).length;return'<div class="gloss-card fade-in" data-term="'+esc(t.term)+'" data-aliases="'+esc(aliases)+'" data-def="'+esc(t.definition)+'"><div style="display:flex;align-items:center;gap:8px"><span class="gloss-rank">#'+t.mentionRank+'</span><div class="icon-badge gloss">\ud83d\udcd6</div><span class="gloss-term">'+esc(t.term)+'</span>'+(aliases?'<span class="gloss-alias">'+esc(aliases)+'</span>':'')+'</div><span class="gloss-category-badge">'+esc(t.category)+'</span><p class="gloss-def">'+esc(t.definition)+'</p><div style="display:flex;justify-content:space-between;align-items:center"><span class="gloss-dates">등장: '+dates+'</span><span class="gloss-mention-count">'+dc+'일 등장</span></div></div>'}).join('')}
function filterGlossary(val){var v=val.toLowerCase();document.querySelectorAll('.gloss-card').forEach(function(card){var term=(card.dataset.term||'').toLowerCase(),aliases=(card.dataset.aliases||'').toLowerCase(),def=(card.dataset.def||'').toLowerCase();card.style.display=(term.includes(v)||aliases.includes(v)||def.includes(v))?'':'none'})}
window.filterGlossary=filterGlossary;
function renderLinks(){var el=document.getElementById('linksList');if(!el)return;var allLinks=[],seen=new Set(),dates=Object.keys(window.__dateData__).sort().reverse();dates.forEach(function(d){var data=window.__dateData__[d];if(data.links)data.links.forEach(function(link){var key=link.url;if(!seen.has(key)){seen.add(key);allLinks.push(Object.assign({},link,{date:d}))}});});if(!allLinks.length){el.innerHTML='<p style="color:var(--text-sub);font-size:0.9em">링크가 없습니다.</p>';return}el.innerHTML=allLinks.map(function(link){var status=link.status||'unknown',sl=status==='active'||status==='ok'?'OK':status==='expired'?'EXPIRED':status==='outdated'?'OUTDATED':status.toUpperCase();return'<div class="link-card fade-in"><span class="icon-badge link">\ud83d\udd17</span><div class="link-card-body"><div class="link-card-title">'+esc(link.title)+'</div><div class="link-card-url"><a href="'+esc(link.url)+'" target="_blank" rel="noopener">'+esc(link.url)+'</a></div><div style="margin-top:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="link-status '+status+'">'+sl+'</span><span style="font-size:0.72em;color:var(--text-sub)">'+esc(link.sharedBy||'')+' \xb7 '+fds(link.date)+'</span></div></div></div>'}).join('')}
function renderZoom(){var el=document.getElementById('zoomList');if(!el)return;var zl=[],dates=Object.keys(window.__dateData__).sort();dates.forEach(function(d){var data=window.__dateData__[d];if(data.links)data.links.forEach(function(link){if(link.category==='zoom'||link.url.indexOf('zoom.us')>=0)zl.push(Object.assign({},link,{date:d}))});});if(!zl.length){el.innerHTML='<p style="color:var(--text-sub);font-size:0.9em">Zoom 세션 정보가 없습니다.</p>';return}el.innerHTML=zl.map(function(z){return'<div class="zoom-card past"><div class="zoom-past-stamp">PAST</div><div class="zoom-card-header"><span class="icon-badge zoom">\ud83c\udfa5</span><span class="zoom-title">'+esc(z.title)+'</span></div><div class="zoom-info-row"><span class="zoom-info-item">'+fds(z.date)+'</span></div><div class="zoom-desc">'+esc(z.title)+'</div></div>'}).join('')}
function shareDigest(){var url=window.location.href;if(navigator.clipboard)navigator.clipboard.writeText(url).then(function(){showToast('링크가 복사되었습니다!');spawnConfetti()});else showToast('클립보드 복사 실패')}
window.shareDigest=shareDigest;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}
function spawnConfetti(){var emojis=['\ud83c\udf89','\u2728','\ud83c\udf8a','\ud83d\udcab','\u2b50'];for(var i=0;i<12;i++){var p=document.createElement('div');p.className='confetti-particle';p.textContent=emojis[Math.floor(Math.random()*emojis.length)];p.style.left=(window.innerWidth/2+Math.random()*100-50)+'px';p.style.top=(window.innerHeight/2)+'px';p.style.setProperty('--tx',(Math.random()*200-100)+'px');p.style.setProperty('--ty',(-80-Math.random()*120)+'px');p.style.setProperty('--rot',(Math.random()*720)+'deg');p.style.setProperty('--dur',(0.6+Math.random()*0.5)+'s');document.body.appendChild(p);setTimeout(function(el){return function(){el.remove()}}(p),1200)}}
document.addEventListener('DOMContentLoaded',function(){spawnHeroParticles();initTabScrollHint();renderDateGrid();renderFaqChart(window.__faqData__);renderFaqList(window.__faqData__);renderGlossary();renderLinks();renderZoom();observeAll()});
})();
</script>
</body>
</html>
